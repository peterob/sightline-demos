<!-- ============================================================
     ZONE A — MICRO TEST FRAMEWORK
     ~60 lines, zero dependencies, renders dark-themed HTML
     ============================================================ -->
<script>
(function () {
  const registry = [];
  let currentSuite = null;
  let totalPass = 0, totalFail = 0, totalPend = 0;

  /* ── Public API ── */
  window.suite = function (name, fn) {
    currentSuite = { name, tests: [] };
    registry.push(currentSuite);
    try { fn(); } catch (e) { /* individual tests catch their own errors */ }
    currentSuite = null;
  };

  window.test = function (label, fn) {
    const entry = { label, kind: 'runnable', pass: false, error: null };
    try {
      fn();
      entry.pass = true;
      totalPass++;
    } catch (e) {
      entry.error = e.message || String(e);
      totalFail++;
    }
    currentSuite.tests.push(entry);
  };

  window.spec = function (label) {
    currentSuite.tests.push({ label, kind: 'spec', pass: false, error: null });
    totalPend++;
  };

  window.expect = function (actual) {
    return {
      toBe(expected) {
        if (actual !== expected)
          throw new Error('Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
      },
      toEqual(expected) {
        if (JSON.stringify(actual) !== JSON.stringify(expected))
          throw new Error('Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
      },
      toBeCloseTo(expected, digits) {
        if (digits === undefined) digits = 5;
        const f = Math.pow(10, digits);
        if (Math.round(actual * f) !== Math.round(expected * f))
          throw new Error('Expected ≈' + expected + ' (' + digits + 'dp), got ' + actual);
      },
      toBeTruthy() {
        if (!actual) throw new Error('Expected truthy, got ' + JSON.stringify(actual));
      },
      toBeFalsy() {
        if (actual) throw new Error('Expected falsy, got ' + JSON.stringify(actual));
      },
      toBe_true() { // alias
        if (actual !== true) throw new Error('Expected true, got ' + JSON.stringify(actual));
      },
      toBeGreaterThan(n) {
        if (!(actual > n)) throw new Error('Expected ' + actual + ' > ' + n);
      },
      toBeLessThan(n) {
        if (!(actual < n)) throw new Error('Expected ' + actual + ' < ' + n);
      },
      toThrow() {
        if (typeof actual !== 'function') throw new Error('expect(fn).toThrow() requires a function');
        let threw = false;
        try { actual(); } catch (e) { threw = true; }
        if (!threw) throw new Error('Expected function to throw, but it did not');
      }
    };
  };

  /* ── Render results into DOM ── */
  window._renderResults = function () {
    document.getElementById('sum-pass').textContent = totalPass;
    document.getElementById('sum-fail').textContent = totalFail;
    document.getElementById('sum-pend').textContent = totalPend;

    const container = document.getElementById('results');

    registry.forEach(function (s) {
      const sp = s.tests.filter(function (t) { return t.kind === 'runnable' && t.pass; }).length;
      const sf = s.tests.filter(function (t) { return t.kind === 'runnable' && !t.pass; }).length;
      const sk = s.tests.filter(function (t) { return t.kind === 'spec'; }).length;

      const el = document.createElement('div');
      el.className = 'suite';

      /* Header */
      const hdr = document.createElement('div');
      hdr.className = 'suite-header';
      hdr.textContent = s.name;

      const badge = document.createElement('span');
      badge.className = 'suite-badge ' + (sf > 0 ? 'badge-fail' : sk > 0 && sp === 0 ? 'badge-pend' : 'badge-pass');
      if (sk > 0 && sp === 0 && sf === 0) {
        badge.textContent = sk + ' pending';
      } else {
        badge.textContent = sp + ' passed' + (sf ? ' · ' + sf + ' failed' : '') + (sk ? ' · ' + sk + ' pending' : '');
      }
      hdr.appendChild(badge);
      el.appendChild(hdr);

      /* Tier 2 note */
      if (sk > 0 && sp === 0 && sf === 0) {
        const note = document.createElement('div');
        note.className = 'tier2-note';
        note.textContent = 'Tier 2 — specification stubs documenting intended production backend behaviour';
        el.appendChild(note);
      }

      /* Test rows */
      s.tests.forEach(function (t) {
        const row = document.createElement('div');
        row.className = 'test-row';

        if (t.kind === 'spec') {
          row.innerHTML = '<span class="test-icon" style="color:var(--ac-orange)">⏸</span>' +
            '<span class="test-label pend-label">' + t.label + '</span>';
        } else if (t.pass) {
          row.innerHTML = '<span class="test-icon" style="color:var(--ac-green)">✓</span>' +
            '<span class="test-label pass-label">' + t.label + '</span>';
        } else {
          row.innerHTML = '<span class="test-icon" style="color:var(--ac-red)">✗</span>' +
            '<div class="test-label fail-label">' + t.label +
            (t.error ? '<span class="test-error">' + t.error + '</span>' : '') +
            '</div>';
        }
        el.appendChild(row);
      });

      container.appendChild(el);
    });
  };
})();
</script>

<!-- ============================================================
     ZONE B — PURE FUNCTIONS
     Duplicated verbatim from source HTML files.
     memberAutoRate / memberHumanHours / memberAllHours adapted to
     accept `tasks` as 2nd param instead of using global closure —
     this is the only intentional signature change.
     ============================================================ -->
<script>

/* ── From Sightline_Onboarding_Configuration.html ── */
const freqMult = {daily:22, weekly:4.33, monthly:1, quarterly:0.33};

function calcHours(t) { return (t.volume * t.time / 60) * (freqMult[t.frequency] || 1); }
function calcGoalHours(t) { return (t.volume * (t.goalTime || t.time) / 60) * (freqMult[t.frequency] || 1); }
function calcMonthlyVolume(t) { return t.volume * (freqMult[t.frequency] || 1); }
function utilClass(u) { return u < 70 ? 'utilization-good' : u < 90 ? 'utilization-warning' : 'utilization-critical'; }

/* Adapted for testability — accepts tasks array as 2nd parameter */
function memberAutoRate(mid, tasks) {
  const mt = tasks.filter(function (t) { return t.memberId === mid; });
  if (!mt.length) return 0;
  const auto = mt.filter(function (t) { return t.automation === 'auto'; }).length;
  return Math.round(auto / mt.length * 100);
}
function memberHumanHours(mid, tasks) {
  return tasks.filter(function (t) { return t.memberId === mid && t.automation === 'human'; })
              .reduce(function (s, t) { return s + calcHours(t); }, 0);
}
function memberAllHours(mid, tasks) {
  return tasks.filter(function (t) { return t.memberId === mid; })
              .reduce(function (s, t) { return s + calcHours(t); }, 0);
}

/* ── From Sightline_Final_Prototype.html ── */
const titles = {
  dashboard: 'Dashboard',
  cash:      'Cash Position',
  forecast:  '13-Week Forecast',
  ar:        'Collections (AR)',
  ap:        'Payables (AP)',
  po:        'Purchase Orders',
  approvals: 'Approvals',
  exceptions:'Exceptions',
  payments:  'Payment Runs',
  jobs:      'Jobs & Tasks',
  agents:    'Agents & Skills',
  policies:  'Policies',
  integrity: 'Integrity',
  events:    'Event Log',
  config:    'Configuration'
};

/* ── New business logic functions (specified in PRD & critical assessment) ── */

/**
 * Classify AP invoice variance against policy tolerance tiers.
 * < 1%  → auto-approve
 * 1–3%  → human-review
 * > 3%  → reject
 */
function classifyVariance(pct) {
  if (pct < 1)  return 'auto-approve';
  if (pct <= 3) return 'human-review';
  return 'reject';
}

/**
 * Classify required approval authority by dollar amount.
 * < $10k    → manager
 * $10k–50k  → vp
 * > $50k    → cfo-required
 */
function classifyAuthority(amount) {
  if (amount < 10000)  return 'manager';
  if (amount <= 50000) return 'vp';
  return 'cfo-required';
}

/**
 * Determine whether an early-payment discount is worth capturing
 * by comparing effective APR against a 36% hurdle rate.
 *
 * APR = (discountPct / (100 - discountPct)) × (360 / daysEarly)
 *
 * Example: 2/10 net 30  → APR ≈ 73.5% → true  (capture it)
 *          2/30 net 60  → APR ≈ 24.5% → false (don't bother)
 */
function discountWorthCapturing(discountPct, daysEarly /*, netDays */) {
  var apr = (discountPct / (100 - discountPct)) * (360 / daysEarly);
  return apr > 0.36;
}

/* ── Test fixtures ── */
const FX = {
  // Six tasks across four members — used by Suites E, F, G
  tasks: [
    { id: 't1', memberId: 'm1', volume: 10, time: 60, frequency: 'monthly', automation: 'human' },
    { id: 't2', memberId: 'm1', volume:  5, time: 60, frequency: 'monthly', automation: 'auto'  },
    { id: 't3', memberId: 'm2', volume:  8, time: 60, frequency: 'monthly', automation: 'human' },
    { id: 't4', memberId: 'm3', volume: 20, time: 60, frequency: 'monthly', automation: 'auto'  },
    { id: 't5', memberId: 'm4', volume:  3, time: 60, frequency: 'monthly', automation: 'human' },
    { id: 't6', memberId: 'm4', volume:  3, time: 60, frequency: 'monthly', automation: 'auto'  },
  ]
};

</script>

suite('B · calcGoalHours — goalTime override & falsy edge case', function () {

  test('goalTime set: uses goalTime not time  (1×30min daily → 11 h)', function () {
    expect(calcGoalHours({volume:1, time:60, goalTime:30, frequency:'daily'})).toBeCloseTo(11, 4);

  test('goalTime equals time: same result as calcHours', function () {
    expect(calcGoalHours({volume:1, time:60, goalTime:60, frequency:'daily'})).toBeCloseTo(22, 4);
  });
  test('goalTime undefined: falls back to time', function () {
    expect(calcGoalHours({volume:1, time:60, frequency:'daily'})).toBeCloseTo(22, 4);
  });
  test('⚠ REGRESSION GUARD — goalTime:0 is falsy → falls back to t.time', function () {
    // `t.goalTime || t.time` evaluates goalTime:0 as falsy.
    // If a 0-minute goal is ever intentional, the expression must change to:
    //   t.goalTime !== undefined ? t.goalTime : t.time

    expect(calcGoalHours({volume:1, time:60, goalTime:0, frequency:'daily'})).toBeCloseTo(22, 4);
  });
  test('monthly with goal reduction: 1×30min → 0.5 h', function () {
    expect(calcGoalHours({volume:1, time:60, goalTime:30, frequency:'monthly'})).toBeCloseTo(0.5, 4);

  test('weekly with goal reduction: (1×30/60)×4.33 ≈ 2.165 h', function () {
    expect(calcGoalHours({volume:1, time:60, goalTime:30, frequency:'weekly'})).toBeCloseTo(2.165, 2);

  test('zero volume → 0 regardless of goalTime', function () {

  spec('replay of N events produces identical hash sequence');
  spec('chain validation returns true for unmodified event sequence');
  spec('chain validation returns false and reports first bad index for tampered chain');
  spec('hash function uses SHA-256 (not MD5, SHA-1, or CRC32)');
  spec('event_id is globally unique (UUID v4 format)');
});
