t\n\nThe hash chain was recognized early as the system's core differentiator: any modification to past events invalidates the entire subsequent chain. Tamper-evidence is architectural, not procedural.\n\n## What ZTA Got Right\n\nZTA correctly identified that:\n- Trust is a s"},{"id":"zta-to-event-sourcing","label":"Zta To Event Sourcing","description":"The architectural evolution from zero trust accounting (secure the journal) to event sourcing (make the journal unnecessary). ZTA was the first frame \u2014 necessary but insufficient. ","cluster":"Origins \u2014 Zero Trust Accounting","color":"#e8b4b8","stub":false,"links":["reconciliation-as-architecture"],"sections":["The Limitation ZTA Hit","The Reframe","The Three-Layer Insight","What Changed Architecturally","What ZTA Got Right That Carried Forward"],"words":762,"content":"# From Zero Trust Accounting to Event Sourcing\n\n## The Limitation ZTA Hit\n\nZero trust accounting was the first frame: apply zero trust security principles to financial systems. Control everything. Verify everything. Hash chain every event. Multi-signature every disbursement.\n\nThis works perfectly for securing **one party's records**. It does not solve the multi-party coordination problem:\n\n- HOA Board has a cryptographically immutable audit trail of their financial events\n- The vendor has their own accounting of the same transactions\n- The two records may be inconsistent\n- ZTA gives you no way to resolve the inconsistency \u2014 it just makes each party's records tamper-evident\n\nThe tamper-evident record of your own truth does not constitute shared truth. Two parties with perfect, immutable, cryptographically signed records of their own version of events can still have a dispute about which version is correct.\n\n## The Reframe\n\nThe shift happened when the question changed:\n\n**ZTA question**: \"How do we secure one party's financial records so they can't be tampered with?\"\n\n**Event sourcing question**: \"How do multiple parties agree on what happened *before* any party writes their own records?\"\n\nThis is a fundamentally different problem. The ZTA solution (hash chain within one party's system) doesn't address it. The event sourcing solution (shared event layer with bilateral signatures before individual ledgers are written) does.\n\n## The Three-Layer Insight\n\nThe insight that resolved this:\n\n1. **Events are physical facts** \u2014 when a truck arrived, when bytes moved, when a signature was applied. These are not interpretations; they are observations of state changes in the world.\n\n2. **Accounting treatments are interpretations** \u2014 which period does this belong to? Is this revenue or a liability? What account does this hit? These questions don't have a single right answer \u2014 they depend on policy.\n\n3. **Keeping events and interpretations separate** allows multiple parties to agree on events (the physical facts) while maintaining independent accounting treatments (their own interpretations).\n\nZTA tried to make the interpretation layer secure. Event sourcing moves the agreement upstream, to the event layer, and lets the interpretation layer remain party-specific.\n\n## What Changed Architecturally\n\n| ZTA | Event Sourcing |\n|-----|---------------|\n| Hash chain within one system | Hash chain across multiple parties |\n| Verify integrity of your own records | Verify agreement on shared events |\n| Controls prevent tampering with the past | Contr"}],"clusters":["Origins \u2014 Zero Trust Accounting","The Core Architectural Thesis","The Event Grammar","Physics and Mathematical Foundations","The Seven Primitives (CAST Kernel)","Standard Functions and the Contract Layer","Implementation Architecture","The Ledger Engineer Role","Agentic Infrastructure","Bilateral Coordination Protocol","Go-to-Market and Positioning","Intellectual Precedents"],"cluster_colors":{"Origins \u2014 Zero Trust Accounting":"#e8b4b8","The Core Architectural Thesis":"#b4c8e8","The Event Gramma // ── State ──
let history = [];
let historyIdx = -1;
let activeNodeId = null;
const collapsedClusters = new Set();

// ── Helpers ──
function getNode(id) { return GRAPH.nodes.find(n => n.id === id); }
function getClusterColor(cluster) { return GRAPH.cluster_colors[cluster] || '#888'; }

// ── Markdown renderer (minimal, no dependencies) ──
function renderMarkdown(text) {
  if (!text) return '<p class="text-muted">No content yet.</p>';

  // Process wikilinks before other transforms
  text = text.replace(/\[\[([^\]]+)\]\]/g, (_, id) => {
    const node = getNode(id);
    const label = node ? node.label : id;
    return `<a class="wikilink" data-id="${id}" href="#">${label}</a>`;
  });

  const lines = text.split('\n');
  const out = [];
  let inPre = false, inTable = false, listBuf = [], tableRows = [];

  function flushList() {
    if (!listBuf.length) return;
    out.push('<ul>' + listBuf.map(l => `<li>${l}</li>`).join('') + '</ul>');
    listBuf = [];
  }
  function flushTable() {
    if (!tableRows.length) return;
    const [header, , ...body] = tableRows;
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const trs = body.map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    out.push(`<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`);
    tableRows = []; inTable = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('```')) {
      flushList();
      if (inPre) { out.push('</code></pre>'); inPre = false; }
      else { out.push('<pre><code>'); inPre = true; }
      continue;
    }
    if (inPre) { out.push(escapeHtml(line) + '\n'); continue; }

    if (line.startsWith('|')) {
      flushList();
      inTable = true;
      tableRows.push(line);
      continue;
    }
    if (inTable) { flushTable(); }

    if (!line.trim()) { flushList(); out.push(''); continue; }

    if (line.startsWith('# ')) { flushList(); out.push(`<h1>${inline(line.slice(2))}</h1>`); continue; }
    if (line.startsWith('## ')) { flushList(); out.push(`<h2>${inline(line.slice(3))}</h2>`); continue; }
    if (line.startsWith('### ')) { flushList(); out.push(`<h3>${inline(line.slice(4))}</h3>`); continue; }
    if (line.startsWith('> ')) { flushList(); out.push(`<blockquote><p>${inline(line.slice(2))}</p></blockquote>`); continue; }

    const liMatch = line.match(/^[-*] (.+)/);
    if (liMatch) { listBuf.push(inline(liMatch[1])); continue; }

    const numMatch = line.match(/^\d+\. (.+)/);
    if (numMatch) { listBuf.push(inline(numMatch[1])); continue; }

    flushList();
    out.push(`<p>${inline(line)}</p>`);
  }
  flushList();
  if (inTable) flushTable();
  if (inPre) out.push('</code></pre>');

  return out.join('\n');
}

function inline(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<em>$1</em>');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Sidebar ──
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const grouped = {};
  GRAPH.nodes.forEach(n => {
    if (!grouped[n.cluster]) grouped[n.cluster] = [];
    grouped[n.cluster].push(n);
  });

  GRAPH.clusters.forEach(cluster => {
    const nodes = grouped[cluster] || [];
    const color = getClusterColor(cluster);
    const section = document.createElement('div');
    section.className = 'cluster-section';

    const header = document.createElement('div');
    header.className = 'cluster-header';
    header.innerHTML = `
      <div class="cluster-dot" style="background:${color}"></div>
      <span class="cluster-name">${cluster}</span>
      <span class="cluster-count">${nodes.length}</span>
      <span class="cluster-toggle">▼</span>
    `;
    header.addEventListener('click', () => {
      const nodesDiv = section.querySelector('.cluster-nodes');
      const toggle = header.querySelector('.cluster-toggle');
      if (collapsedClusters.has(cluster)) {
        collapsedClusters.delete(cluster);
        nodesDiv.classList.remove('hidden');
        toggle.classList.remove('collapsed');
      } else {
        collapsedClusters.add(cluster);
        nodesDiv.classList.add('hidden');
        toggle.classList.add('collapsed');
      }
    });

    const nodesDiv = document.createElement('div');
    nodesDiv.className = 'cluster-nodes';

    nodes.forEach(node => {
      const item = document.createElement('div');
      item.className = 'node-item' + (node.stub ? ' stub' : '');
      item.dataset.id = node.id;
      item.innerHTML = `
        <span class="node-label">${node.label}</span>
        ${node.stub ? '<span class="stub-badge">stub</span>' : ''}
      `;
      item.addEventListener('click', () => navigateTo(node.id));
      nodesDiv.appendChild(item);
    });

    section.appendChild(header);
    section.appendChild(nodesDiv);
    sidebar.appendChild(section);
  });
}

// ── Legend ──
function buildLegend() {
  const legend = document.getElementById('cluster-legend');
  GRAPH.clusters.forEach(cluster => {
    const color = getClusterColor(cluster);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${cluster}`;
    item.addEventListener('click', () => scrollToCluster(cluster));
    legend.appendChild(item);
  });
}

function scrollToCluster(cluster) {
  // Un-collapse if needed
  if (collapsedClusters.has(cluster)) {
    collapsedClusters.delete(cluster);
    buildSidebar();
  }
  const headers = document.querySelectorAll('.cluster-header');
  for (const h of headers) {
    if (h.querySelector('.cluster-name')?.textContent === cluster) {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      break;
    }
  }
}

// ── Navigation ──
function navigateTo(id, pushHistory = true) {
  const node = getNode(id);
  if (!node) return;

  if (pushHistory) {
    history = history.slice(0, historyIdx + 1);
    history.push(id);
    historyIdx = history.length - 1;
  }

  activeNodeId = id;
  renderNode(node);
  updateNavButtons();
  updateSidebarActive(id);
}

function updateNavButtons() {
  document.getElementById('btn-back').disabled = historyIdx <= 0;
  document.getElementById('btn-fwd').disabled = historyIdx >= history.length - 1;
}

function updateSidebarActive(id) {
  document.querySelectorAll('.node-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  // Scroll sidebar item into view
  const active = document.querySelector(`.node-item[data-id="${id}"]`);
  if (active) active.scrollIntoView({ block: 'nearest' });
}

// ── Render Node ──
function renderNode(node) {
  // Hide welcome / search, show node view
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('search-results').classList.remove('visible');
  const view = document.getElementById('node-view');
  view.classList.add('visible');

  const color = getClusterColor(node.cluster);

  // Connected nodes
  const linkedNodes = (node.links || []).map(id => getNode(id)).filter(Boolean);
  // Also find nodes that link TO this node
  const backlinks = GRAPH.nodes.filter(n => (n.links || []).includes(node.id));

  const linksHtml = linkedNodes.length ? `
    <div class="section-title">Links to</div>
    <div class="links-grid">
      ${linkedNodes.map(ln => `
        <a class="link-chip" data-id="${ln.id}" href="#">
          <div class="link-chip-dot" style="background:${getClusterColor(ln.cluster)}"></div>
          <span class="link-chip-label">${ln.label}</span>
        </a>
      `).join('')}
    </div>
  ` : '';

  const backlinksHtml = backlinks.length ? `
    <div class="section-title">Referenced by</div>
    <div class="links-grid">
      ${backlinks.map(ln => `
        <a class="link-chip" data-id="${ln.id}" href="#">
          <div class="link-chip-dot" style="background:${getClusterColor(ln.cluster)}"></div>
          <span class="link-chip-label">${ln.label}</span>
        </a>
      `).join('')}
    </div>
  ` : '';

  const stubNotice = node.stub ? `
    <div class="stub-notice">
      <span>⚠</span>
      <span>Stub node — content to be developed in a future session.</span>
    </div>
  ` : '';

  const contentHtml = node.content && !node.stub
    ? `<div class="section-title">Content</div><div class="node-content">${renderMarkdown(node.content)}</div>`
    : '';

  view.innerHTML = `
    <div class="node-breadcrumb">
      <span class="breadcrumb-cluster">
        <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color}"></span>
        ${node.cluster}
      </span>
    </div>
    <div class="node-title">${node.label}</div>
    <div class="node-meta">
      <span class="meta-tag">${node.words} words</span>
      ${node.sections.map(s => `<span class="meta-tag">${s}</span>`).join('')}
    </div>
    ${node.description ? `<div class="node-description">${node.description}</div>` : ''}
    ${stubNotice}
    ${linksHtml}
    ${backlinksHtml}
    ${contentHtml}
  `;

  // Wire up link clicks
  view.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      navigateTo(el.dataset.id);
    });
  });

  // Update breadcrumb trail
  document.getElementById('breadcrumb-trail').textContent = 
    history.slice(Math.max(0, historyIdx - 3), historyIdx + 1)
      .map(id => getNode(id)?.label || id).join(' → ');

  document.getElementById('node-counter').textContent = 
    `${historyIdx + 1} / ${history.length}`;

  view.scrollTop = 0;
}

// ── Search ──
let searchTimeout;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value.trim()), 120);
});

function doSearch(q) {
  const resultsDiv = document.getElementById('search-results');
  if (!q) {
    resultsDiv.classList.remove('visible');
    if (activeNodeId) {
      document.getElementById('node-view').classList.add('visible');
    } else {
      document.getElementById('welcome').style.display = 'flex';
    }
    return;
  }

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('node-view').classList.remove('visible');
  resultsDiv.classList.add('visible');

  const ql = q.toLowerCase();
  const results = GRAPH.nodes
    .map(n => {
      let score = 0;
      if (n.id.toLowerCase().includes(ql)) score += 10;
      if (n.label.toLowerCase().includes(ql)) score += 8;
      if (n.description.toLowerCase().includes(ql)) score += 5;
      if (n.cluster.toLowerCase().includes(ql)) score += 4;
      if (n.sections.some(s => s.toLowerCase().includes(ql))) score += 3;
      if (n.content.toLowerCase().includes(ql)) score += 2;
      return { node: n, score };
    })
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 20);

  if (!results.length) {
    resultsDiv.innerHTML = '<h3>Search Results</h3><p style="color:var(--text-muted);font-size:13px">No nodes found.</p>';
    return;
  }

  resultsDiv.innerHTML = `<h3>${results.length} Result${results.length > 1 ? 's' : ''} for "${q}"</h3>` +
    results.map(({ node }) => {
      const color = getClusterColor(node.cluster);
      return `
        <div class="result-item" data-id="${node.id}">
          <div class="result-title">${node.label}</div>
          <div class="result-cluster">
            <div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></div>
            ${node.cluster}${node.stub ? ' · <span style="color:var(--text-muted)">stub</span>' : ''}
          </div>
          ${node.description ? `<div class="result-desc">${node.description.slice(0, 140)}…</div>` : ''}
        </div>
      `;
    }).join('');

  resultsDiv.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('search').value = '';
      doSearch('');
      navigateTo(el.dataset.id);
    });
  });
}

// ── Back/Forward ──
document.getElementById('btn-back').addEventListener('click', () => {
  if (historyIdx > 0) {
    historyIdx--;
    navigateTo(history[historyIdx], false);
  }
});
document.getElementById('btn-fwd').addEventListener('click', () => {
  if (historyIdx < history.length - 1) {
    historyIdx++;
    navigateTo(history[historyIdx], false);
  }
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
    document.getElementById('search').select();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    doSearch('');
    document.getElementById('search').blur();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '[') {
    document.getElementById('btn-back').click();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === ']') {
    document.getElementById('btn-fwd').click();
  }
});

// ── Stats ──
const total = GRAPH.nodes.length;
const written = GRAPH.nodes.filter(n => !n.stub).length;
document.getElementById('stats').textContent = `${written}/${total} nodes written`;

// ── Init ──
buildSidebar();
buildLegend();
</script>
</body>
