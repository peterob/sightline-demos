y financial decision is recorded as a structured event:\n\n| Field | Content |\n|-------|---------|\n| **Trigger** | The signal that caused the decision (\"Pipeline concentration >30%\") |\n| **Action** | The response (\"Hire 3 senior CSMs for top 20 accounts, $450K cost\") |\n| **Intent** | The predicted effect (\"Restore NRR to 110%+ within two quarters by generating $600K expansion revenue\") |\n| **Actual Outcome** | Filled in 90 days later (\"NRR recovered to 108%, expansion revenue $420K\") |\n| **Variance** | Computed automatically (-$180K vs. intent; -30% miss) |\n\nThis schema is the event-sourced hypothesis test. Every decision becomes falsifiable with a built-in feedback loop.\n\n## Intent as Workflow Gate\n\nIntent is not just a record \u2014 it's an enforcement mechanism. No resources (capital, headcount, time) are released until intent is:\n1. **Specific** \u2014 names the metric and the target\n2. **Measurable** \u2014 a number at a date\n3. **Causally coherent** \u2014 the mechanism connecting action to predicted effect is stated\n\nThe workflow:\n1. Signal received\n2. Action proposed\n3. Intent defined (enforcement gate)\n4. Validation: Is the intent specific and measurable?\n   - YES \u2192 Execute, commit intent to the event log"},{"id":"intent-automation-path","label":"Intent Automation Path","description":"","cluster":"Agentic Infrastructure","color":"#e8c8b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"ledger-engineer-role","label":"Ledger Engineer Role","description":"The Ledger Engineer: a new role category for the person (or agent) who owns the event layer. Not an accountant, not IT. The discipline of identifying material events, designing the","cluster":"The Ledger Engineer Role","color":"#c8e8b4","stub":false,"links":["agentic-infrastructure","standard-functions-concept"],"sections":["The Problem with \"Accountant\"","The Term: Ledger Engineer","What the Role Does","The Hierarchy of Derivation","The Granularity Principle"],"words":914,"content":"# The Ledger Engineer Role\n\n## The Problem with \"Accountant\"\n\nThe term accountant carries baggage: backward-looking, compliance-focused, cost center. It signals low budget allocation relative to IT and engineering. The optics are not positive and the area typically receives very little budget relative to its actual impact on information quality.\n\nBut the function being described is genuinely different from traditional accounting:\n- Focus is information science and deterministic base data layer, not valuation or reporting\n- Embedded in operations like a forward-deployed engineer (like Palantir's FDE model, applied to finance)\n- Learns processes, maps information flows, ensures the base layer is clean\n- Outcome is a substrate so valuable that many companies use it as their baseline for GAAP financials\n- Over time: transitions from human to agentic AI\n\nA new category term is needed. Like \"DevOps\" or \"growth team\" \u2014 terms that didn't exist until the function required them.\n\n## The Term: Ledger Engineer\n\n**Ledger Engineer** names the artifact the role is responsible for (the ledger as event log), not the abstraction or the tooling. It:\n- Implies building, not just recording\n- Is clearly financial (not IT) in provenance\n- Survives the agentic transition: \"Ledger Engineers\" today become \"Ledger Agents\" tomorrow, operating under the same conceptual umbrella\n- Describes the function, not the executor\n\nAlternative considered: \"Financial Reality Engineer\" \u2014 rejected as too abstract and too engineering-flavored without sufficient grounding in the actual output.\n\n## What the Role Does\n\nThe core responsibilities of a Ledger Engineer:\n\n1. **Identify material events** \u2014 Which events in the business trigger financial obligations, state changes, or reporting requirements? What is the lowest level at which the business makes decisions or incurs obligations?\n\n2. **Design the event schema** \u2014 What fields does each event type require? What are the foreign keys linking events to prior events? What proofs must accompany each event type?\n\n3. **Build capture infrastructure** \u2014 How are events emitted from operational systems? Which webhooks, APIs, or manual inputs capture which event types?\n\n4. **Write policy rules** \u2014 Which events trigger which accounting treatments? How does revenue get recognized? How are variances attributed? These are the Standard Functions (see [[standard-functions-concept]]).\n\n5. **Maintain causal traceability** \u2014 Every financial statement value must trace to originating events. The Ledger Engineer is the guardian of this"},{"id":"modal-logic-proof-structure","label":"Modal Logic Proof Structure","description":"Modal logic maps onto CAST's proof structure: \u25fb (necessarily true given these events and policy) vs \u25c7 (possibly true). Traditional accounting operates in \u25c7 mode \u2014 'presents fairly ","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["proof-first-finance","policy-version-primitive"],"sections":["The Paper's Framework","Traditional Accounting in Modal Terms","CAST in Modal Terms","Three Modal Properties CAST Guarantees","Proof Certificate Structure"],"words":757,"content":"# Modal Logic and Proof Structure\n\n## The Paper's Framework\n\nFormal modal logic uses two operators:\n- **\u25fbS** \u2014 necessarily S; the agent is rationally constrained to believe proposition S\n- **\u25c7S** \u2014 possibly S; the agent is not rationally constrained to deny S\n\n## Traditional Accounting in Modal Terms\n\nTraditional accounting implicitly operates in \u25c7 mode:\n\n- \"Presents fairly in our professional judgment\" \u2014 \u25c7 (possibly fair)\n- \"In conformity with GAAP\" \u2014 \u25c7 (possibly compliant)\n- \"Reconciled\" \u2014 K\u2090 \u2227 K\u1d66 (both parties believe it's correct, independently)\n\nNo traditional accounting assertion can be \u25fb. The best available statement is \"our qualified professionals believe this is correct.\" That is epistemic possibility, not logical necessity.\n\n## CAST in Modal Terms\n\nCAST's architecture provides logical necessity:\n\n**\u25fb\u1d68(Events E\u2081...E\u2099 \u2227 Policy P \u2192 State S)**\n\nRead as: Given these events and this policy, state S is *necessarily* the result. There is no rational basis to dispute it because the derivation is deterministic.\n\nThe modal mapping:\n\n| Traditional Accounting | Modal Status | CAST | Modal Status |\n|-----------------------|--------------|------|--------------|\n| \"Presents fairly\" | \u25c7 (possibly fair) | \"Provably derives\" | \u25fb (necessarily derived) |\n| \"In conformity with GAAP\" | \u25c7 (possibly compliant) | \"Policy-validated\" | \u25fb (necessarily compliant) |\n| \"Reconciled\" | K\u2090 \u2227 K\u1d66 | \"Common proof\" | \u25fb \u2192 \u2200x K\u2093 (all must know) |\n\n## Three Modal Properties CAST Guarantees\n\n**1. Proof Necessity (\u25fb)**\n\nTraditional: \"Our accountants believe these financials are fair.\"\nCAST: \"These financials necessarily derive from these events under this policy.\"\n\n```\n\u25fb\u1d68(balance(account_A) = \u03a3(credits) - \u03a3(debits))\n```\n\nThe balance is not an opinion \u2014 it is a mathematical necessity given the committed events.\n\n**2. Policy Consistency (\u25c7)**\n\n```\n\u25fb\u1d68S \u2227 \u25fb\u1d68T \u2192 \u25c7\u1d68(S \u2227 T)\n```\n\nIf two states are separately necessary under a policy, their conjunction is possible. No contradictions. The policy engine (see [[policy-version-primitive]]) enforces this at write time.\n\n**3. Knowledge through Proof**\n\n```\n\u25fb\u1d68S \u2192 (proof(S) available \u2192 K\u2090(S) for any agent a)\n```\n\nNecessary truths become common knowledge when proofs are shared. Any party with access to the events and the policy can independently verify.\n\n## Proof Certificate Structure\n\n```\nFairnessCertificate {\n  // Modal necessity: these events occurred\n  event_commitments: [Hash],\n  \n  // Modal necessity: this state derives from events\n  state_derivation: {\n    initial_state: Hash,\n    final_state: Hash,\n    computation_trace: MerkleProof"},{"id":"noether-theorem-accounting","label":"Noether Theorem Accounting","description":"The physics and mathematical foundations that underpin CAST's architecture: gauge invariance, Noether's theorem, conservation laws, superposition/indefiniteness, and the action pri","cluster":"Physics and Mathematical Foundations","color":"#e8d4b4","stub":false,"links":["deterministic-state-machines","cryptographic-proof-chains"],"sections":["Conservation Laws and Double-Entry","Gauge Invariance and Bilateral Symmetry","Noether's Theorem","Superposition and the Event Layer","The Action Principle and Determinism"],"words":987,"content":"# Physics Foundations\n\nThe physics connections to CAST are not marketing metaphors. They reflect genuine structural parallels between what physics has formalized and what CAST is building. Understanding these parallels clarifies what mathematical guarantees CAST can make and why those guarantees are categorically stronger than \"software that works well.\"\n\n## Conservation Laws and Double-Entry\n\nDouble-entry bookkeeping is a conservation system. Debits must equal credits exactly as energy and momentum are conserved in physical systems. Value cannot appear from nothing in a correctly-structured ledger, just as energy cannot appear from nothing in a closed physical system.\n\nThe accounting equation (Assets = Liabilities + Equity) functions as a constraint surface in Lagrangian mechanics. Every valid accounting state lies on this surface. Every valid transaction moves the system along this surface, never off it.\n\nThis is foundational context for CAST's multi-party extension: single-party conservation is well-understood. CAST is building the protocol for conservation across parties \u2014 ensuring that what Party A gives is precisely what Party B receives, expressed in a shared, cryptographically-bound event log.\n\n## Gauge Invariance and Bilateral Symmetry\n\nThe most powerful physics parallel for CAST is gauge invariance. In physics, gauge symmetry means you can change your frame of reference, but physical observables remain invariant.\n\nFor bilateral transactions: each party has their own \"frame of reference\" (their books). The actual transaction \u2014 the gauge-invariant observable \u2014 must be identical regardless of whose perspective you adopt. Party A's view and Party B's view are projections of the same underlying economic reality, not two independent records.\n\nThis translates to a precise mathematical requirement: any valid transaction in CAST must satisfy party-exchange symmetry.\n\n```\nsymmetry_proof:\n  for every event in shared_log:\n    flow_A + flow_B = 0    (conservation)\n    \n  state_A = project(shared_log, Party.A)\n  state_B = project(shared_log, Party.B)\n  \n  # Gauge invariance: \n  net_A + net_B = 0n   (must always hold)\n```\n\nParty A's net position and Party B's net position in a closed bilateral system must sum to zero. This is not a design choice \u2014 it is a mathematical requirement derived from the symmetry of bilateral exchange.\n\nCAST's shared event log is the gauge-invariant representation of economic reality. Each party's private ledger is a derived frame. The event stream is the invariant; the party-specific views are projections from shared truth.\n\n## Noether's Theorem\n\nNoether's theorem: if a system has a continuous symmetry, there exists a correspond"},{"id":"obligation-primitive","label":"Obligation Primitive","description":"","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"open-standard-strategy","label":"Open Standard Strategy","description":"Toll road now, public highway later. How CAST becomes a coordination standard rather than a vendor platform. The staged strategy for opening the protocol when network effect value ","cluster":"Go-to-Market and Positioning","color":"#e8b4d4","stub":false,"links":["gpu-compute-beachhead","reconciliation-as-architecture","standalone-positioning"],"sections":["The Toll Road / Public Highway Framework","The CorpChain Risk","The GPS Analogy","What Not to Do"],"words":611,"content":"# Open Standard Strategy\n\nCAST's long-term value is not as a product \u2014 it is as the coordination standard that multi-party financial transactions run on. The path from product to standard requires a staged strategy that doesn't sacrifice early revenue for premature openness.\n\n## The Toll Road / Public Highway Framework\n\n**Phase 1 (now): Toll road.** CAST is a proprietary product. Revenue comes from customers paying to use the coordination infrastructure. The event schema, policy engine, and proof protocols are CAST IP.\n\n**Phase 2: Define the interface standard.** Before opening anything, specify the event format, validation protocol, and bilateral commitment structure formally. This specification \u2014 the \"standard gauge\" \u2014 is CAST's long-term moat. Even when the product is proprietary, the interface should be designed as if it will eventually be published.\n\n**Phase 3 (trigger-dependent): Public highway.** Open the protocol specification when network effects make ecosystem value exceed product margin capture. The trigger: when the number of parties who want to interoperate on CAST's protocol is large enough that being the standard is worth more than being the gatekeeper.\n\nThe UPC barcode analogy from Catalini's work is instructive: the barcode stalled until it hit a tipping point of retailer adoption. CAST doesn't need universal adoption in Phase 1 \u2014 it needs one vertical ([[gpu-compute-beachhead]]) where the pain is acute enough that a small number of parties adopt the shared event stream, proving the model.\n\n## The CorpChain Risk\n\nThe most important strategic warning for CAST: don't become the thing you're displacing. Bank-backed \"modern\" platforms \u2014 CorpChains \u2014 are proprietary systems where participants are tenants. They have a central authority, they control the data, and customers must trust them.\n\nCAST's positioning as infrastructure \"where participants have root access to shared truth\" (see [[reconciliation-as-architecture]]) is the differentiator. If CAST becomes a CorpChain \u2014 a system where CAST Inc. holds the keys and customers access it as a service \u2014 it loses its architectural differentiation and competes on features, not on structural guarantees.\n\nThe safeguard: keep the architecture genuinely open under the hood, even while the product is proprietary on top. Customers should be able to verify the event log independently, run their own projection functions, and not require CAST's servers to determine their own financial state.\n\n## The GPS Analogy\n\nGPS is the right mental model for what CAST should become. GPS doesn't prescribe what you build on it \u2014 it provides a reliable, neutral signal for location that all parties can independently verify. It is infrastructure, not a product.\n\nCAST should provide a re"},{"id":"pe-portfolio-positioning","label":"Pe Portfolio Positioning","description":"How to position CAST for PE operating partners and portfolio CFOs. The language, proof points, and entry angles that work for this specific buyer. Digital Finance HQ context and fr","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":[],"sections":["What This Buyer Understands","The Entry Language","The Quantification Frame","The Fractional CFO Deployment Angle","Capital Allocation as Universal Application"],"words":831,"content":"# PE Portfolio Positioning\n\nPE operating partners and portfolio company CFOs are Peter's home market. They understand financial operations at depth, have no patience for conceptual software pitches, and make decisions based on quantified cost and concrete functionality. The pitch has to be operational, not architectural.\n\n## What This Buyer Understands\n\nThis buyer has lived the reconciliation problem. They know what month-end close looks like when counterparties disagree. They understand the cost of three-way match failures, intercompany reconciliation, cash flow forecast errors caused by disputed transactions, and the finance team headcount that exists purely to resolve record divergence.\n\nThey do not need to be sold on the existence of the problem. They need to be shown that CAST solves it structurally, not through better process or more headcount.\n\n## The Entry Language\n\nThe concepts that land with this audience:\n\n**\"Resolution is now a matter of policy, not archaeology.\"** When a dispute arises between CAST-coordinated parties, the facts are inarguable \u2014 both parties co-signed the events as they occurred. The argument is no longer about what happened; it is only about what the resolution should be. This collapses dispute resolution from weeks of forensic reconstruction to a policy question.\n\n**\"Both parties always see the same thing.\"** Simple and direct. No \"our records show\" vs. \"our records show.\" One record, derived independently by both parties from one event stream.\n\n**\"Proof-first, not reconcile-after.\"** The transaction is validated before it posts, not reconciled after it fails. The error class that reconciliation addresses is architecturally prevented.\n\n## The Quantification Frame\n\nThis buyer will ask \"what does this cost me today?\" The answer requires quantifying:\n\n**Finance team reconciliation labor**: What percentage of controller, AP, and AR headcount is engaged in reconciliation work vs. forward-looking financial analysis? Across a typical PE portfolio company, this is often 40-60% of the finance team's productive time.\n\n**Dispute cost**: Time-to-resolution on billing disputes, freight claims, three-way match failures. Legal costs where disputes escalate. Cash flow impact of delayed settlement while disputes are open.\n\n**Close cycle cost**: The month-end close process is largely reconciliation. Faster close is a direct consequence of having no divergence to resolve.\n\n## The Fractional CFO Deployment Angle\n\nDigital Finance HQ's fractional CFO model is an ideal distribution channel for CAST. A fractional CFO embedded in a PE portfolio company who uses CAST to coordinate with suppliers and customers creates a proof point: \"our fractional CFO runs on CAST infrastructure, which means your books are always cu"},{"id":"policy-engine-architecture","label":"Policy Engine Architecture","description":"","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"policy-version-primitive","label":"Policy Version Primitive","description":"PolicyVersion primitive: versioned, immutable, deterministic rules that interpret events into obligations, settlements, and postings. Policy that isn't versioned and pinned is unau","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":false,"links":[],"sections":["Definition","Why Versioning Is Non-Negotiable","Schema","Lifecycle","Deterministic Evaluation"],"words":553,"content":"# PolicyVersion Primitive\n\n## Definition\n\nA PolicyVersion is a versioned, immutable snapshot of the rules used to interpret events. Every obligation, every settlement determination, every posting \u2014 all are tied to a specific PolicyVersion whose hash is recorded at the time of evaluation.\n\n## Why Versioning Is Non-Negotiable\n\nIf policy can be changed retroactively, you cannot reproduce past calculations. An auditor asking \"why did this invoice trigger a late payment penalty?\" cannot get a reliable answer if the policy that defined \"late\" might have been updated since the penalty was assessed.\n\nPolicyVersion makes this reproducible: \"This invoice triggered a penalty under PolicyVersion d4a9f3e2... \u2014 here is the exact rule text.\"\n\n## Schema\n\n```sql\npolicy_versions (\n  id              ULID PRIMARY KEY,\n  policy_name     TEXT NOT NULL,            -- Human-readable name\n  version_number  TEXT NOT NULL,            -- Semantic version: '2.1.3'\n  content_hash    TEXT NOT NULL UNIQUE,     -- SHA-256 of canonical policy content\n  policy_content  JSONB NOT NULL,           -- The actual policy rules\n  effective_from  TIMESTAMPTZ NOT NULL,\n  effective_to    TIMESTAMPTZ,              -- NULL = currently active\n  status          TEXT NOT NULL,            -- 'draft', 'published', 'retired'\n  authored_by     ULID NOT NULL REFERENCES actors(id),\n  approved_by     ULID[] NOT NULL,          -- Multi-sig approval for production\n  created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),\n  \n  CONSTRAINT only_published_is_evaluable CHECK (\n    status IN ('draft', 'published', 'retired')\n  )\n)\n```\n\n## Lifecycle\n\n```\ndraft \u2192 published \u2192 retired\n```\n\n- **Draft**: Under development; not evaluable against live events\n- **Published**: Active; evaluable; reference to content_hash pins exact rules\n- **Retired**: No longer applies to new events; historical references remain valid\n\nOnly `published` PolicyVersions can be evaluated. This prevents accidental evaluation against a draft policy that hasn't been approved.\n\n## Deterministic Evaluation\n\nThe defining property: **same inputs + same PolicyVersion \u2192 same outputs, always**.\n\n```python\ndef evaluate_policy(event: Event, policy_version: PolicyVersion) -> EvaluationResult:\n    \"\"\"\n    Pure function. No side effects. No external state.\n    Given the same event and policy_version, always returns the same result.\n    The evaluation trace is stored as part of the result.\n    \"\"\"\n    rules = load_rules(policy_version.content_hash)\n    result = apply_rules(rules, event)\n    return EvaluationResult(\n        event_id=event.id,\n        policy_version"},{"id":"posting-primitive","label":"Posting Primitive","description":"","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"primitives-overview","label":"Primitives Overview","description":"The seven irreducible primitives of the CAST kernel: Event, PolicyVersion, Obligation, Allocation, Settlement, Posting, Case. A primitive is justified only if irreducible, orthogon","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":[],"sections":["What Makes Something a Primitive","The Seven Primitives","What Compiles Down to These","The Test for Adding a New Primitive"],"words":421,"content":"# CAST Primitives Overview\n\n## What Makes Something a Primitive\n\nA \"primitive\" is justified only if it is:\n\n1. **Irreducible**: removing it forces you to smuggle the same concept back elsewhere\n2. **Orthogonal**: it doesn't overlap responsibility with another primitive\n3. **Composable**: you can build higher-level artifacts (invoice, payout, grant drawdown, refund, subscription) as views over primitives\n4. **Auditable + replayable**: you can reproduce downstream artifacts from upstream facts + versioned rules\n5. **Stable under edge cases**: reversals, amendments, partial fulfillment, asynchronous settlement, disputes\n\nIf a concept is mostly a UI/business document (invoice, subscription, claim, purchase order), it should not be a primitive. It should be a projection.\n\n## The Seven Primitives\n\n| Primitive | What It Is | Why It Must Exist |\n|-----------|-----------|-------------------|\n| **Event** | Immutable fact that something happened | Without append-only facts, audit, replay, and provenance collapse |\n| **PolicyVersion** | Versioned deterministic rules | Unversioned policy is un-auditable |\n| **Obligation** | Committed \"someone owes someone something\" | Most business models revolve around obligations |\n| **Allocation** | How obligations are decomposed and assigned | Netting, partial fulfillment, many-to-one require decomposition |\n| **Settlement** | Fulfillment with attribution | Obligations must be extinguished; variances must have addresses |\n| **Posting** | Ledger journal derived from events | The accounting view; derived, not primary |\n| **Case** | Dispute, violation, or exception | Anomalies need routing and resolution; can't be ignored |\n\n## What Compiles Down to These\n\nHigher-level business concepts:\n\n- **AR/AP** \u2192 Obligations + Settlements + Postings\n- **Payroll** \u2192 Obligations (employment) + Lines (pay components) + Settlements (paychecks)\n- **Grants** \u2192 Obligations (awards) + Lines (budget categories) + Settlements (drawdowns)\n- **Capital proposals** \u2192 Obligations (proposal) + Lines (tranches) + Settlements (disbursements)\n- **Subscriptions** \u2192 Obligations (recurring) + Settlements (periodic) + Postings (revenue recognition)\n\nThe fact that capital proposals depend on forecasted headroom rather than current balances is a policy input source \u2014 it doesn't change the primitive structure.\n\n## The Test for Adding a New Primitive\n\nWhen you find yourself adding new \"core objects\" (Refund, Chargeback, PayoutBatch) as primitives, it's a sign that:\n- Allocation is under-modeled, or\n- Links/provenance are missing, or\n- PolicyVersion pinning is insufficient\n\nAlways try to compile the new concept down to existing primitives before adding"},{"id":"projection-engine","label":"Projection Engine","description":"The projection engine: deterministic pure functions that map (event log, policy version) \u2192 state. Same inputs always produce same outputs. Referential transparency. Causal closure.","cluster":"Implementation Architecture","color":"#e8e4b4","stub":false,"links":["modal-logic-proof-structure"],"sections":["The Core Architecture","Why This Matters","Example: Balance Projection","Materialized Views vs. On-Demand Projection","Causal Closure"],"words":665,"content":"# Projection Engine\n\n## The Core Architecture\n\nState in CAST is never stored directly. It is **projected** from the event log using deterministic functions.\n\n```\nState = Project(Events, PolicyVersion)\n```\n\nThis is a pure function: same inputs, same output, always. No hidden state, no side effects, no mutable database rows that can be edited.\n\n## Why This Matters\n\n**Reproducibility**: Any historical state can be reproduced exactly by replaying the events against the policy version that was active at that time. An auditor asking \"what did our balance sheet look like on March 15 at 2pm?\" gets the same answer every time, derived from the same events.\n\n**Verifiability**: A counterparty or auditor with access to the event log and the policy version can independently compute the state and verify it matches. No need to trust our application's calculations.\n\n**Auditability**: If a state value changes, it's because a new event was appended or the policy version changed. There is no mystery \"someone edited a row\" scenario.\n\n**Multi-party coherence**: Both parties run the same projection function against the shared event log. They get the same state. If they get different states, the difference is traceable to different policy versions (intentional) or a bug (not intentional but discoverable).\n\n## Example: Balance Projection\n\n```python\ndef project_balance(\n    events: List[Event], \n    policy_version: PolicyVersion,\n    account: Account,\n    as_of: datetime\n) -> Balance:\n    \"\"\"\n    Deterministic. Pure. No side effects.\n    Replay events in order, apply policy rules, compute balance.\n    \"\"\"\n    balance = Decimal('0')\n    \n    for event in sorted(events, key=lambda e: e.sequence):\n        if event.timestamp > as_of:\n            break\n        \n        # Apply policy to determine if and how this event affects balance\n        posting = policy_version.evaluate_posting(event, account)\n        if posting:\n            balance += posting.amount\n    \n    return Balance(\n        account=account,\n        amount=balance,\n        as_of=as_of,\n        event_count=len(events),\n        policy_version_hash=policy_version.content_hash,\n        computation_hash=hash(events + [policy_version.content_hash])  # reproducibility proof\n    )\n```\n\n## Materialized Views vs. On-Demand Projection\n\nProjecting from the full event log on every query is not always practical for high-volume systems. Two approaches:\n\n**Materialized views**: The projection is computed and stored as a cached result, invalidated when new events arrive. This is a performance optimization \u2014 the underlying computation is still deterministic, the materia"},{"id":"proof-first-finance","label":"Proof First Finance","description":"The core positioning thesis: validate transactions before they post rather than reconcile errors afterward. Math and physics over coded software. How CAST's architecture produces g","cluster":"The Core Architectural Thesis","color":"#b4c8e8","stub":false,"links":["pe-portfolio-positioning","deterministic-state-machines","cryptographic-proof-chains"],"sections":["The Inversion","Math and Physics vs. Coded Software","The Policy Engine as Pre-Commitment","Positioning Against Existing Solutions","Communicating to Non-Technical Buyers"],"words":665,"content":"# Proof-First Finance\n\nProof-first finance is the positioning thesis that distinguishes CAST from every other financial coordination system: transactions are validated before they post, not reconciled after they fail.\n\n## The Inversion\n\nConventional financial software architecture:\n\n1. Party posts transaction to their system\n2. Counterparty posts transaction to their system\n3. Periodically, the two systems compare records\n4. Differences are identified and manually resolved\n5. Repeat\n\nCAST architecture:\n\n1. Party proposes an event\n2. Both parties' policy engines validate the event against current state and shared policy (see [[deterministic-state-machines]])\n3. If valid, both parties co-sign the event (see [[cryptographic-proof-chains]])\n4. Event is appended to shared log\n5. State updates deterministically for both parties simultaneously\n\nThe inversion is complete: in conventional systems, the transaction posts first and errors are found later. In CAST, the transaction cannot post until both parties have cryptographically certified it is valid.\n\n## Math and Physics vs. Coded Software\n\nPeter's framing is precise: the goal is guarantees that derive from mathematics rather than from software behavior. The distinction:\n\n**Coded software control**: \"Our system logs all transactions and alerts on anomalies.\" This is a probabilistic claim. The system might miss anomalies. The logs might be incomplete. The alerts might fire incorrectly. These are false positives of control \u2014 the appearance of governance without the mathematical backing.\n\n**Mathematical guarantee**: \"Two parties holding the same hash-chained event log will always compute identical state.\" This is not a software claim \u2014 it is a mathematical claim about the properties of deterministic functions applied to identical inputs. It cannot fail in the same way software can fail.\n\nCAST's proof-first architecture is built on mathematical guarantees:\n- Hash chain integrity is provable\n- Dual signature validity is verifiable\n- Deterministic projection produces identical state for identical inputs \u2014 always\n\nThe resulting system does not need extensive monitoring or anomaly detection for the class of errors it is designed to prevent, because those errors are architecturally impossible.\n\n## The Policy Engine as Pre-Commitment\n\nThe policy engine (see [[deterministic-state-machines]]) evaluates proposed events against a shared policy specification before either party commits. The policy is not a set of soft guidelines \u2014 it is a formally specified validation function that both parties' systems run deterministically.\n\nPre-committing to a shared policy specification is the coordination that makes subsequent coordination unnecessary. Parties who agree in"},{"id":"proof-first-framing","label":"Proof First Framing","description":"The buyer-facing vocabulary for CAST. Not 'better reconciliation' \u2014 that accepts the wrong premise. Not 'blockchain for finance' \u2014 that carries too much baggage. The correct frame:","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["pe-portfolio-positioning","competitive-map","gpu-compute-beachhead"],"sections":["The Three Phrases That Work","What These Phrases Filter","The Wrong Framings and Why","The CFO Elevator Pitch","The PE Operating Partner Version"],"words":836,"content":"# Proof-First Framing\n\n## The Three Phrases That Work\n\nThese are the phrases that convert the right buyers. They are not marketing copy \u2014 they are precise technical claims that sophisticated buyers can verify.\n\n---\n\n**\"Proof-first, not reconcile-after.\"**\n\nTraditional approach: each party records independently, then periodically reconciles to find differences. Reconciliation is the error-correction step for a broken architecture.\n\nCAST approach: before recording anything independently, both parties agree on what happened \u2014 and that agreement is cryptographically binding. There is nothing to reconcile because there is only one version of events.\n\nImplication: reconciliation doesn't get faster or cheaper. It disappears as an activity.\n\n---\n\n**\"Resolution is policy, not archaeology.\"**\n\nWhen there's a dispute in a traditional system, the process is archaeology: dig through two parties' separate records, find where they diverged, negotiate whose version is correct. This takes weeks, involves intermediaries, and is expensive.\n\nWhen there's a dispute in CAST, the process is policy evaluation: both parties already share the same event record. The question is which policy rule applies to the disputed event. That is a deterministic computation, not a negotiation.\n\nImplication: dispute resolution goes from weeks to hours, and from judgment calls to computed outcomes.\n\n---\n\n**\"Both parties always see the same thing.\"**\n\nIn CAST, there is no \"your version\" and \"my version.\" There is one version: the bilaterally signed event record. Each party derives their own accounting view from it (GAAP, cash, management) using their own policies. But the underlying facts are shared.\n\nImplication: \"but that's not what we have on our side\" becomes an impossible sentence. Either the event is in the shared log (and both parties can verify it) or it isn't.\n\n---\n\n## What These Phrases Filter\n\nThese phrases attract buyers who have experienced the cost of reconciliation, archaeology, and divergent records. They repel buyers who are looking for workflow improvements within the existing architecture.\n\n**Attracted**: CFOs of PE-backed companies who have spent weekends resolving intercompany disputes. Lenders who have been burned by borrowers claiming different usage numbers. Fund administrators dealing with LP/GP reconciliation across different systems. Controllers who have inherited books where the journal entries don't trace to source documents.\n\n**Not attracted**: Buyers looking for a better accounting system, a faster close, or prettier dashboards. Those buyers are fine and important \u2014 but they're"},{"id":"rea-model-contrast","label":"Rea Model Contrast","description":"REA (Resources-Events-Agents) accounting model: what it got right, why it failed, and how CAST differs. REA correctly identified that events should precede journal entries and that","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":[],"sections":["What REA Is","What REA Got Right","Why REA Failed in Practice","How CAST Differs","The Critical Difference: Grounding"],"words":797,"content":"# REA Model: What It Got Right and Where CAST Diverges\n\n## What REA Is\n\nResources-Events-Agents (REA) is an accounting framework developed by William McCarthy (1982) that models accounting using three primitives:\n\n- **Resources**: economic things that have value and are exchanged (inventory, cash, services)\n- **Events**: economic activities that affect resources (sales, purchases, manufacturing)\n- **Agents**: individuals or organizations that participate in events (customers, vendors, employees)\n\nThe core insight: accounting records should be derived from business reality (events) rather than journal entries being the primary artifact. McCarthy argued that the standard double-entry ledger was a lossy compression of richer event data, and that building systems on the compressed representation threw away information needed for analysis.\n\n## What REA Got Right\n\nREA correctly identified the foundational problem that CAST addresses:\n\n1. **Events should precede journal entries** \u2014 the business event (a sale, a purchase, a transfer) is primary; the journal entry is a derived view\n2. **Multiple views from one source** \u2014 the same events should be able to produce GAAP financial statements, management reports, tax filings, etc., without maintaining multiple separate records\n3. **Agent attribution** \u2014 knowing who participated in an event is as important as knowing what happened financially\n4. **Semantic richness** \u2014 events capture the meaning of what happened, not just the debit/credit\n\nThese are the same claims CAST makes. The intellectual lineage is clear.\n\n## Why REA Failed in Practice\n\nREA was extensively studied in academic accounting literature but never achieved widespread adoption. Why:\n\n**Too theoretical, not operational**: REA's formalism is elegant on paper but difficult to map to actual business workflows. The model abstracts away the operational messiness (partial shipments, disputed quantities, amended terms, exception handling) that real systems must handle.\n\n**No multi-party coordination**: REA models one entity's view of economic events. It doesn't solve how two organizations agree on what the events were. Your REA ledger and your vendor's REA ledger are still two separate records of the same transactions \u2014 the reconciliation problem remains.\n\n**No adversarial model**: REA assumes good faith participation. It has no concept of disputed events, fraudulent records, or the need for cryptographic proof that something happened. It's a modeling framework, not a coordination protocol.\n\n**No pat"},{"id":"reconciliation-as-architecture","label":"Reconciliation As Architecture","description":"Why reconciliation is not a clerical failure but an architectural consequence of single-party ledgers applied to multi-party coordination. The problem statement CAST is solving.","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["cryptographic-proof-chains","pe-portfolio-positioning","event-sourcing-core","gpu-compute-beachhead","proof-first-finance","traditional-accounting-limitations"],"sections":["The Architectural Root Cause","The False Positive of Control","The Coordination Cost","What Elimination Actually Means"],"words":576,"content":"# Reconciliation as Architecture\n\nThe framing matters here: reconciliation is not a process failure that better software can fix. It is the predictable, structural output of applying single-party ledger architecture to multi-party coordination problems.\n\n## The Architectural Root Cause\n\nDouble-entry bookkeeping, codified in the 15th century, was designed for a merchant keeping their own records. One party, one ledger, internal consistency enforced by the accounting equation. See [[traditional-accounting-limitations]] for why this works well in its intended domain.\n\nWhen two parties transact, each applies double-entry bookkeeping to their own ledger independently. Party A records a payable; Party B records a receivable. These entries are made from each party's perspective, at slightly different times, with slightly different reference data, in slightly different formats.\n\nReconciliation is the periodic manual process of finding where Party A's records and Party B's records diverge and determining which is correct. At scale, this is an enormous ongoing cost \u2014 across corporate treasury, trade finance, intercompany transactions, and financial close processes.\n\nThe architectural observation: **this divergence is guaranteed**. It is not the result of bad processes or inadequate technology. It is the result of two independent systems making independent records of the same events. Independent records will diverge. There is no software patch for this.\n\n## The False Positive of Control\n\nEnterprise financial software has built elaborate infrastructure on top of this broken architecture: audit trails, access controls, approval workflows, three-way matching, variance analysis. These create an appearance of control without addressing the root cause.\n\nA system that records events separately and then reconciles them can still have both parties holding different versions of the truth after reconciliation runs. The reconciliation process itself can disagree. The audit trail shows what each party recorded, not what actually happened.\n\n[[proof-first-finance]] is the response to this: build the system so that the transaction cannot be posted unless both parties have cryptographically committed to identical event data. There is no subsequent reconciliation needed because divergence was architecturally prevented, not detected and corrected.\n\n## The Coordination Cost\n\nThe cost of reconciliation is typically underestimated because it is embedded in headcount rather than in line-item software costs. The finance team running month-end close, the treasury team doing counterparty reconciliation, the operations team doing three-way PO matching \u2014 these are all reconciliation labor. [[pe-portfolio-positioning]] needs to quantify this cost concretely for PE CFO audiences.\n\nIn GPU"},{"id":"settlement-primitive","label":"Settlement Primitive","description":"","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"shared-truth-protocol","label":"Shared Truth Protocol","description":"The bilateral coordination protocol that makes CAST work: two parties co-author a single event stream rather than maintaining independent records. The architectural core. How share","cluster":"Bilateral Coordination Protocol","color":"#b4b4e8","stub":false,"links":[],"sections":["The Core Distinction","Public Events / Private Ledger Overlay","Selective Disclosure at the Boundary","Network Effects Through Truth","Coordination vs. Payments"],"words":699,"content":"# Shared Truth Protocol\n\nThe shared truth protocol is the central innovation of CAST. Rather than two parties maintaining independent ledgers that must later be reconciled, they co-author a single, cryptographically-bound event stream from which both independently derive identical state.\n\n## The Core Distinction\n\nTraditional multi-party finance: each party maintains their own ledger \u2192 two records \u2192 reconciliation required \u2192 disputes about facts \u2192 archaeology and negotiation.\n\nCAST: both parties co-author one event stream \u2192 one record \u2192 state is derived, not compared \u2192 disputes concern resolution (policy), not facts \u2192 resolution without archaeology.\n\nThe architectural shift is from \"record what happened from my perspective, then compare\" to \"co-create the record of what happened, then each interpret for your purposes.\" The first produces two truth claims. The second produces one truth.\n\n## Public Events / Private Ledger Overlay\n\nThe protocol separates two planes:\n\n**Public event stream**: Facts both parties have observed and co-signed. PO issued. Goods shipped. Goods received. Invoice generated. Payment confirmed. These events are immutable, bilaterally signed, and accessible to both parties.\n\n**Private ledger overlay**: Each party's internal accounting treatment, derived deterministically from the shared event stream. The brand books landed cost and AR. The manufacturer books revenue and COGS. Same shared event. Different private consequences. Neither party can see or infer the other's treatment.\n\n```\nPrivate State = fold(Shared Events, Local Policy)\n```\n\nPrivacy is the architectural default. Sharing is an explicit action. Each party's books are provably consistent with shared reality without exposing the internal derivation.\n\nThis addresses what has historically been the strongest objection to shared ledgers: \"CFOs don't want to share their financial data.\" Under the shared truth protocol, they don't have to. The shared plane is narrow \u2014 just the facts both parties have already observed together. The private plane is structurally inaccessible to the counterparty.\n\n## Selective Disclosure at the Boundary\n\nWhen a party does choose to disclose something from their private state \u2014 to a financier, an auditor, a regulator \u2014 the disclosure is an explicit action that itself creates a cryptographically-hashed, timestamped event in the disclosing party's private log. The audit trail shows what was shared, with whom, and when. What was not shared is structurally private \u2014 the system does not have this data to leak.\n\nThis is a structural privacy guarantee, not a policy promise. Your bank promises not to misuse your transaction data. CAST's architecture cannot leak private state it does not hold.\n\n## Network Effects"},{"id":"standalone-positioning","label":"Standalone Positioning","description":"STUB \u2014 The integration trap argument: why CAST must be positioned as standalone coordination infrastructure rather than an ERP module or bank add-on. The argument that integration ","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["open-standard-strategy"],"sections":[],"words":187,"content":"# Standalone Positioning\n\n*[STUB \u2014 To be written]*\n\nThe integration trap: if CAST integrates into Party A's ERP, Party B will never trust it. The whole point is that no party hosts the truth. The event ledger is not anyone's ERP module \u2014 it is shared infrastructure that neither party controls unilaterally.\n\nKey arguments to develop:\n- Why \"we'll add this to your ERP\" defeats the multi-party value proposition\n- Why bank-hosted \"shared ledgers\" have the same problem (one party is the host, others don't fully trust it)\n- Why the protocol must be neutral infrastructure, like TCP/IP or SWIFT messaging\n- What \"standalone\" actually means operationally for a customer deploying CAST\n\nAlso capture: the \"product-first with protocol aspirations\" GTM strategy \u2014 how you sell a product now while building toward protocol adoption later. See [[open-standard-strategy]]."},{"id":"standard-functions-concept","label":"Standard Functions Concept","description":"Standard Functions are CAST's core IP: pre-built coordination rules that automatically determine what happens when events occur. They replace bilateral negotiation with a shared ru","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["density-functional-theory-analogy","open-standard-strategy","policy-version-primitive"],"sections":["What Standard Functions Are","The Core Library","What Makes a Function a Standard Function","The Functional Explanation (Non-Technical)","Network Effects on the Functional"],"words":815,"content":"# Standard Functions: The Shared Rulebook\n\n## What Standard Functions Are\n\nStandard Functions are pre-built coordination rules that automatically determine what happens when events occur in a multi-party transaction. They answer:\n\n- When does a commitment become an obligation?\n- Who owes what to whom, and when?\n- If something goes wrong, how does responsibility allocate?\n- What is everyone's current position, right now?\n\nToday, these questions get answered through a patchwork of spreadsheets, emails, phone calls, and reconciliation meetings. Different parties often have different answers to the same question \u2014 which creates disputes, delays, and the need for intermediaries.\n\n**Standard Functions replace that patchwork with a single computation that everyone runs and everyone gets the same answer.**\n\n## The Core Library\n\n| Function | What It Computes | Traditional Alternative |\n|----------|-----------------|------------------------|\n| **Commitment \u2192 Obligation** | When does a PO become binding? | Email negotiation |\n| **Obligation \u2192 Liability** | When does an obligation hit the balance sheet? | Accountant judgment |\n| **Payment Application** | How are payments matched to obligations? | AP team reconciliation |\n| **Variance Attribution** | How is the gap allocated when commitments \u2260 settlements? | Dispute process |\n| **Exposure Calculation** | What is each party's current risk at any moment? | Treasury analysis |\n| **Priority and Subordination** | Who gets paid first when cash is insufficient? | Legal negotiation |\n| **Revenue Recognition** | When does an event trigger revenue under ASC 606 / IFRS 15? | Revenue accountant |\n| **Escrow Release** | When are escrow conditions satisfied? | Escrow agent |\n\n## What Makes a Function a Standard Function\n\nA Standard Function is:\n\n1. **Deterministic** \u2014 same inputs always produce the same output\n2. **Auditable** \u2014 every evaluation produces an explanation trace\n3. **Versioned** \u2014 like PolicyVersion (see [[policy-version-primitive]]), changes require new versions; historical evaluations are forever tied to the version in effect\n4. **Composable** \u2014 higher-level business logic is built from combining Standard Functions, not creating new primitives\n5. **Portable** \u2014 parties bring their own Standard Functions to a ledger; no central authority required to evaluate them\n\n## The Functional Explanation (Non-Technical)\n\nA traditional contract describes what should happen. Lawyers interpret it. Courts enforce it. This is expensive, slow, and uncertain.\n\nA Standard Function computes what happens. When an event occurs, the function evalu"},{"id":"state-machine-transitions","label":"State Machine Transitions","description":"","cluster":"Standard Functions and the Contract Layer","color":"#b4e8e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"superposition-indefiniteness","label":"Superposition Indefiniteness","description":"Economic events exist in a state of objective indefiniteness (not mere epistemic uncertainty) until a reporting layer applies state reduction. CAST maintains events at the indefini","cluster":"Physics and Mathematical Foundations","color":"#e8d4b4","stub":false,"links":["policy-version-primitive"],"sections":["The Ellerman Framework","The Traditional Accounting Problem","The CAST Architecture","The Real Insight: Distinctions Are the Value Creation","The Multi-Party Implication"],"words":725,"content":"# Superposition and Objective Indefiniteness in Financial Events\n\n## The Ellerman Framework\n\nDavid Ellerman's work on quantum superposition reframes the concept: superposition is not \"being in two places at once\" but **objective indefiniteness** \u2014 a state that genuinely has no definite value relative to a particular partition, until that partition is applied.\n\nThe key distinction:\n- **Eigenstate** = definite state (translating \"eigen\" as \"definite\")\n- **Superposition** = indefinite state between definite states\n- **State reduction** = making distinctions that resolve indefiniteness into definiteness\n\nA person genuinely undecided between options is in an objectively indefinite state \u2014 not in multiple states at once, but in a state that hasn't yet made the relevant distinctions.\n\n## The Traditional Accounting Problem\n\nTraditional accounting operates entirely in the \"classical world\" \u2014 everything must be in a definite state immediately. A transaction is either recorded or not. Revenue is either recognized or not. An asset is either on your books or theirs.\n\nBut economic reality often exists in superposition. Consider:\n- A PO has been issued but goods haven't shipped \u2014 is this a liability?\n- Revenue recognition under ASC 606 with variable consideration \u2014 what is the \"real\" amount?\n- An intercompany transaction before month-end reconciliation\n- A contract that could validly be classified multiple ways under GAAP\n\nThe accounting response has been to force premature definiteness (accrue, estimate, classify) and then spend enormous effort when reality \"collapses\" differently than the forced state. This gap between forced state and actual state is what reconciliation addresses.\n\n## The CAST Architecture\n\nCAST's event-sourced architecture mirrors the two-world structure Ellerman describes:\n\n| Ellerman's Framework | CAST/Sightline |\n|---------------------|----------------|\n| Quantum world (below water) | Raw events, atomic facts |\n| Classical world (above water) | Derived views, reports, GL entries |\n| State reduction | Projection/aggregation rules |\n| Partition with haecceity | Classification schema applied to events |\n\nEvents have **quiddity** (they happened, they are distinct) but don't inherently have the **haecceity** (distinguishing characteristics) that accounting demands. Is this COGS or SG&A? Is this Q1 or Q2? The *interpretation layer* is what makes these distinctions \u2014 not the event itself.\n\n## The Real Insight: Distinctions Are the Value Creation\n\nThe same event stream can support multiple partitions:\n- GAAP view\n- Tax view\n-"},{"id":"task-as-atomic-unit-of-work","label":"Task As Atomic Unit Of Work","description":"Task is the atomic unit of work in finance, exactly as event is the atomic unit of data. Task \u2192 job \u2192 role. Decomposing finance functions at the task level is the prerequisite for ","cluster":"The Ledger Engineer Role","color":"#c8e8b4","stub":false,"links":["friction-engine","ledger-engineer-role"],"sections":["The Parallel to Events","Task \u2192 Job \u2192 Role","Why Decomposition Matters Now","Each Task Should Produce a Verifiable Output","Work Conservation"],"words":948,"content":"# Task as the Atomic Unit of Work\n\n## The Parallel to Events\n\nThe same decomposition logic that applies to financial data applies to financial work:\n\n- **Event** is the atomic unit of financial data (not journal entry, not transaction)\n- **Task** is the atomic unit of financial work (not job, not role)\n\nWhen companies think at the job/role level \u2014 \"we need a staff accountant\" \u2014 they bundle dozens of discrete tasks into an arbitrary container shaped by tradition and org chart convention. That staff accountant does bank reconciliation, codes AP invoices, prepares accrual entries, pulls reports, and chases down missing documentation. Those are five fundamentally different tasks with different inputs, outputs, skill requirements, and automation profiles.\n\nIf you can't describe your finance function at the task level, you can't intelligently decide:\n- What to automate\n- What to delegate to AI agents\n- What requires human judgment\n- What is pure waste\n\nMost companies can only answer \"what does your accounting team do?\" at the role level: \"Sarah does AP.\" That's like saying \"the GL has a payables balance\" without knowing which events created it.\n\n## Task \u2192 Job \u2192 Role\n\n**Task**: An irreducible unit of work with defined inputs, process, outputs, and a verifiable completion condition.\n\nExamples:\n- \"Match this invoice to this PO and this goods receipt; flag exceptions where the three don't agree\"\n- \"Compute the accrual for unbilled services as of month end\"\n- \"Verify the bank statement balance against the GL cash account\"\n- \"Classify this transaction by cost category and business unit\"\n\n**Job**: A bundle of tasks assigned to one person or agent. A job description is just a list of tasks with frequency, skill requirements, and authority boundaries.\n\n**Role**: A category of jobs with similar task profiles, authority levels, and organizational positioning.\n\n## Why Decomposition Matters Now\n\n**For automation decisions**: You can't sensibly decide \"should we automate AP?\" \u2014 AP is a bundle. You can sensibly decide \"should we automate PO-to-invoice matching?\" Yes \u2014 it's rules-based, high volume, well-defined inputs and outputs. \"Should we automate vendor relationship management?\" No \u2014 it requires judgment and relationship context.\n\n**For agentic delegation**: An AI agent can execute a task with a precise definition: specific inputs, deterministic process, verifiable output. An AI agent cannot execute a job without decomposition first. The task definition is the contract between human and agent.\n\n**For budget allocation**: Finance teams are perpetually underfunded relative to IT and engineering because \"accounting\" soun"},{"id":"three-party-gpu-model","label":"Three Party Gpu Model","description":"The GPU compute financing scenario is CAST's beachhead. Three parties (Lender, Borrower, GPU Provider) with a high-trust-deficit, high-value coordination problem that no existing s","cluster":"Bilateral Coordination Protocol","color":"#b4b4e8","stub":false,"links":["gpu-compute-beachhead"],"sections":["The Problem","The CAST Architecture","The Policy Layer","Why Existing Solutions Fail","The CoreWeave Model"],"words":835,"content":"# Three-Party GPU Financing Model\n\n## The Problem\n\nGPU compute financing involves three parties who need to coordinate but fundamentally distrust each other:\n\n- **Lender**: Advances capital to borrower to pay for GPU time. Needs proof GPU was actually deployed and used before releasing payment. Cannot independently verify compute happened.\n- **Borrower**: Needs GPU capacity. Wants to pay only for what was delivered. Doesn't control the lender-provider payment relationship.\n- **GPU Provider**: Delivered compute. Wants to get paid. Cannot force lender to release funds. May dispute usage measurements from borrower.\n\nNo existing system coordinates all three. Traditional options:\n- Borrower pays provider directly, then seeks reimbursement from lender \u2192 trust problem, timing mismatch\n- Lender pays provider directly \u2192 lender must trust provider's usage claims\n- Escrow \u2192 requires a trusted intermediary that takes rent\n\n## The CAST Architecture\n\nCAST's role: not moving money, but **proving the conditions under which money should move**.\n\nThree event types anchor the three-party coordination:\n\n### 1. Deployment Proof\n```json\n{\n  \"event_type\": \"gpu.deployed\",\n  \"gpu_ids\": [\"gpu-001\", \"gpu-002\"],\n  \"provider\": \"coreweave\",\n  \"borrower\": \"ml-startup\",\n  \"specs\": {\"model\": \"H100\", \"count\": 8, \"allocated_memory\": \"640GB\"},\n  \"deployment_timestamp\": \"2025-03-01T08:00:00Z\",\n  \"provider_signature\": \"...\",\n  \"borrower_acknowledgment\": \"...\",\n  \"hash\": \"...\"\n}\n```\n\nBoth provider and borrower sign. Neither can dispute that deployment happened.\n\n### 2. Usage Proof\n```json\n{\n  \"event_type\": \"gpu.usage_interval\",\n  \"interval\": {\"start\": \"2025-03-01T08:00:00Z\", \"end\": \"2025-03-01T09:00:00Z\"},\n  \"compute_units\": 480,\n  \"utilization_pct\": 97.8,\n  \"telemetry_hash\": \"sha256_of_raw_telemetry_log\",\n  \"provider_signature\": \"...\",\n  \"hash\": \"...\"\n}\n```\n\nProvider signs usage. Borrower can dispute within the dispute window. After the window closes, the usage record is final.\n\n### 3. Payment Proof\n```json\n{\n  \"event_type\": \"payment.released\",\n  \"obligation_id\": \"OBL-GPU-001\",\n  \"amount\": 14400.00,\n  \"currency\": \"USD\",\n  \"basis\": [\"usage-interval-001\", \"usage-interval-002\", \"...\"],\n  \"lender_release\": \"...\",\n  \"bank_confirmation\": \"...\",\n  \"hash\": \"...\"\n}\n```\n\nLender releases payment after deployment proof + usage proof + dispute window close. Payment is deterministically tied to specific usage events.\n\n## The Policy Layer\n\nThe Standard Function for GPU financing encodes:\n\n- **Condition for payment release**: Deployment proof exists AND usage interval events exist AND"},{"id":"traditional-accounting-limitations","label":"Traditional Accounting Limitations","description":"Why double-entry bookkeeping fails at multi-party coordination. What it was designed for, where it works well, and the predictable failure modes when applied to the boundary betwee","cluster":"The Core Architectural Thesis","color":"#b4c8e8","stub":false,"links":["event-sourcing-core","shared-truth-protocol","reconciliation-as-architecture"],"sections":["What Double-Entry Was Built For","The Multi-Party Boundary Problem","The False Positive of Control","What the Gap Costs","What Cannot Be Fixed Within the Architecture"],"words":682,"content":"# Traditional Accounting Limitations\n\nDouble-entry bookkeeping is not broken. It is a precisely specified system that works exactly as designed in its intended domain: single-party record-keeping with internal consistency as the goal. The problem is applying it to multi-party coordination, for which it was never designed.\n\n## What Double-Entry Was Built For\n\nLuca Pacioli's 1494 formalization of double-entry bookkeeping solved a specific problem: a merchant needed to know, at any point in time, the state of their business. The accounting equation (Assets = Liabilities + Equity) provides internal consistency \u2014 a built-in verification that no entries have been lost or fabricated. Debits equal credits not by convention but because the system models a universe where value cannot appear from nothing.\n\nFor this purpose \u2014 one party, internal consistency, snapshot of your own position \u2014 double-entry is the correct architecture. It has been refined over 500 years and works reliably.\n\n## The Multi-Party Boundary Problem\n\nWhen two parties transact, each applies double-entry bookkeeping to their own ledger independently. Party A records a payable; Party B records a receivable. Both entries are made from each party's perspective, at slightly different times, with slightly different reference data, in slightly different formats.\n\nThe divergence is not a failure of process \u2014 it is a structural consequence of independent record-keeping. Two parties maintaining independent records of the same events will produce different records. This is guaranteed, not accidental.\n\nReconciliation is the periodic manual process of identifying and resolving this guaranteed divergence. It exists as a permanent cost in every multi-party financial relationship because the architecture that produces it cannot be patched \u2014 it can only be replaced.\n\nSee [[reconciliation-as-architecture]] for the full argument on why reconciliation is an architectural consequence, not a process failure.\n\n## The False Positive of Control\n\nEnterprise financial software has built elaborate infrastructure on top of this architecture: audit trails, access controls, approval workflows, three-way matching, variance analysis, ERP reconciliation modules. These create an appearance of control without addressing the root cause.\n\n**Three-way matching** compares PO, receipt, and invoice \u2014 three documents each generated independently by different parties. Matching them requires a reconciliation process. When they don't match (and they frequently don't), the resolution is manual investigation. The matching process exists because the records were generated independently; it could be eliminated if both parties co-created the records in real time.\n\n**Audit trails** record what each party recorded in their"},{"id":"triple-entry-historical","label":"Triple Entry Historical","description":"The intellectual history of triple-entry accounting: Ian Grigg's 2005 signed receipt paper, the zkLedger project from MIT, and the conceptual lineage from double-entry to cryptogra","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["modal-logic-proof-structure"],"sections":["Ian Grigg's Signed Receipt (2005)","The Three-Party Architecture","CAST's Extension of Triple-Entry","zkLedger (MIT, 2018)","The Common Thread"],"words":795,"content":"# Triple-Entry Accounting: Historical Foundations\n\n## Ian Grigg's Signed Receipt (2005)\n\nIan Grigg's 2005 paper \"Triple Entry Accounting\" is the foundational text. The central claim:\n\n> \"The signed receipt is more powerful than double-entry records.\"\n\nThe traditional double-entry journal entry is a record made by one party. It is authoritative within that party's system but has no evidentiary value to counterparties \u2014 they can't verify it wasn't created after the fact, altered, or fabricated.\n\nA signed receipt is an entry made by one party but *signed by the counterparty*. The counterparty's cryptographic signature attests that they agree the transaction occurred as recorded. This transforms the record from a private claim into a mutually attested fact.\n\nGrigg's insight: with signed receipts, both parties' books are provably derived from the same underlying facts. The \"triple entry\" refers to the signed receipt as a third record (in addition to each party's own debit and credit) that serves as the authoritative ground truth.\n\n## The Three-Party Architecture\n\nGrigg's original formulation involved three parties:\n- **Party A** (buyer)\n- **Party B** (seller)  \n- **Party I** (issuer / intermediary) \u2014 a trusted third party who facilitates the transaction and provides the signed receipt\n\nEach party maintains their own books. The signed receipt from Party I is the \"third entry\" \u2014 the authoritative record that both A and B's books are derived from.\n\nThis is conceptually powerful but introduces Party I as a trust dependency. The issuer must be trusted by both parties. Grigg acknowledged this limitation but saw it as acceptable given that financial intermediaries already exist.\n\n## CAST's Extension of Triple-Entry\n\nCAST extends Grigg's framework in two important ways:\n\n**1. Eliminates the trusted intermediary.** CAST uses bilateral signatures (A and B both sign, not a trusted third party). The bilateral signature is the \"third entry.\" No Party I required. The cryptographic binding between the two parties' signatures creates the shared ground truth without an intermediary.\n\n**2. Adds deterministic policy derivation.** Grigg's signed receipt proves what happened (a transaction of amount X between A and B). CAST additionally proves what should happen next (given this event and this policy, these obligations arise). The policy is versioned and pinned, so both parties can independently verify that the obligations derived from events are correct.\n\nThe result: CAST provides not just a signed record of the past (Grigg) but a deterministic path from past events to current state and future obligations, with cryptograp"},{"id":"variance-attribution","label":"Variance Attribution","description":"Variances are facts with addresses \u2014 not failures, not estimates, not narrative explanations. Every gap between commitment and settlement must be attributed to a specific cause in ","cluster":"The Event Grammar","color":"#b4e8c8","stub":false,"links":["ijiri-force-accounting","friction-engine"],"sections":["Variances Are Facts","Why This Matters","Ijiri's Force Attribution","Variance as Structural (Not Narrative)"],"words":476,"content":"# Variance Attribution\n\n## Variances Are Facts\n\nThe traditional response to variance: write a memo explaining why the budget was missed. A narrative, signed by someone, filed somewhere.\n\nCAST reframes this completely: **a variance is a fact with an address.** It exists in the causal chain at a specific point, attributed to a specific event, by a specific observer, with specific evidence.\n\nWhen 482 units settle against 500 committed, those 18 units are a fact. The attribution tells you where they went:\n\n```\nSettlement S1: {\n  type: settlement\n  subject: PO-2024-0892\n  resolved_quantity: 482 units\n  variance_attributions: [\n    {gap: 6 units, cause: \"transit_loss\", absorbed_by: \"carrier_claim\", reference: \"CLAIM-8827\"}\n    {gap: 12 units, cause: \"damage\", absorbed_by: \"vendor_credit\", reference: \"CM-2024-112\"}\n  ]\n  status: closed\n}\n```\n\n## Why This Matters\n\nTraditional systems: close the loop by zeroing out variances. The investigation happens retrospectively if ever. The root cause lives in email threads.\n\nCAST: variances are carried as explicit data. Every gap has:\n- A quantity\n- A cause category\n- A party who absorbs it\n- A reference to supporting evidence\n- A link to the events in the causal chain that produced it\n\nThis makes variance attribution auditable, not investigable. You don't find out why there's a gap \u2014 you read why there's a gap.\n\n## Ijiri's Force Attribution\n\nYuji Ijiri's Force Statement extends this to the income level. Traditional income statements tell you the score \u2014 revenue and expense totals for the period. Force accounting tells you *which forces changed the score*:\n\n- New product introduction: +$4 impact on momentum\n- Margin erosion: -$2 impact\n- Volume variance: +$1 impact\n- Efficiency loss: -$1 impact\n\nSee [[ijiri-force-accounting]] for the full treatment. The CAST variance attribution system implements this concept at the transaction level. Ijiri imagined it at the period level; CAST makes it continuous and event-sourced.\n\n## Variance as Structural (Not Narrative)\n\nIn CAST, variance attribution is embedded in the data model \u2014 not in a report someone writes. This has three consequences:\n\n1. **Auditability**: attributions are immutable once committed. They can be challenged with new events, but not silently edited.\n\n2. **Pattern detection**: when the same variance cause appears repeatedly (carrier claims for the same route, vendor credits for the same product), the pattern is visible in the data without anyone building a report.\n\n3. **Fraud signal**: legitimate variance attributions are supported by evidence events (a carrier claim reference, an inspection report). Manufa"},{"id":"vertical-markets-overview","label":"Vertical Markets Overview","description":"The full map of vertical markets explored for CAST, with assessments of fit, market characteristics, and strategic sequencing. GPU compute is the beachhead. Adjacent verticals foll","cluster":"Go-to-Market and Positioning","color":"#e8b4d4","stub":false,"links":["gpu-compute-beachhead"],"sections":["The Market Selection Filter","GPU Compute Financing \u2014 Beachhead","DTC Ecommerce / International Supply Chain","Construction (Retainage / Progress Billing)","HOA / Condo Association"],"words":918,"content":"# Vertical Markets Overview\n\nCAST's architecture is domain-agnostic \u2014 it is a coordination protocol that applies wherever multiple parties need to coordinate around shared economic facts without full mutual disclosure. The verticals differ only in configuration: event schema, policy rules, party roles, and vertical terminology. The primitives are identical.\n\n## The Market Selection Filter\n\nGood CAST markets share these characteristics: multi-party coordination with high friction, significant cash flows through the coordination boundary, no incumbent solution that solves the coordination problem (as opposed to just recording individual party views), and at least one party with a quantifiable $1M+ problem. Ideally: high pain acuity, concentrated market (you can know every serious buyer), and technical buyers capable of adopting new infrastructure.\n\n## GPU Compute Financing \u2014 Beachhead\n\nSee [[gpu-compute-beachhead]] for the full case. Summary: 50-100 active buyers globally, $5-10B total volume, no incumbent coordination infrastructure, hardware-before-revenue financing structure creates acute pain, utilization-linked payments require verified telemetry data. The right size to prove the architecture in a greenfield context before attacking larger entrenched markets.\n\nExpansion from GPU: other hardware-intensive AI infrastructure (networking, storage, custom silicon), contract manufacturing for hardware startups, inventory-backed lending for DTC ecommerce.\n\n## DTC Ecommerce / International Supply Chain\n\nThe multi-party supply chain case is among the richest for CAST. A typical DTC international supply chain involves brand, overseas manufacturer, freight forwarder, customs broker, 3PL warehouse, and trade finance provider. Six parties, six ledgers, six reconciliation surfaces.\n\nThe public/private event boundary is natural here: public events are PO issued, production confirmed, bill of lading issued, goods cleared customs, inventory received. Private events are each party's internal cost treatment, margin calculation, and accounting entries. Same shared event stream; six different private interpretations; zero reconciliation required because both sides derived their private state from the same events.\n\n**Key pain points solved**: billing disputes on freight charges (quantified at $400K+ annually for some portfolio companies), three-way match failures, landed cost computation disagreements, inventory discrepancies between shipping documents and actual receipt.\n\n## Construction (Retainage / Progress Billing)\n\nHigh pain, measurable. DSO in construction: 60-90+ days. Retainage disputes are endemic. The mechanics lien industry ($10B+ legal market) exists primarily because parties can't agree on amounts."},{"id":"why-now-agentic","label":"Why Now Agentic","description":"Why CAST is necessary now, specifically because of the AI agent proliferation. LLMs crossed a capability threshold in 2023-2024. Autonomous financial agents are coming. The missing","cluster":"Agentic Infrastructure","color":"#e8c8b4","stub":false,"links":["three-party-gpu-model","gpu-compute-beachhead"],"sections":["The Capability Threshold","The Gap This Creates","Why Existing Infrastructure Fails for Agents","CAST's Role in Agentic Finance","The Three Invariants for Agent Safety"],"words":901,"content":"# Why Now: The Agentic Unlock\n\n## The Capability Threshold\n\nBetween 2022 and 2024, large language models crossed a capability threshold for autonomous action. Not just answering questions \u2014 actually taking actions: calling APIs, executing code, managing files, and most importantly, making decisions and triggering financial transactions.\n\nThe agentic finance use case was always theoretically interesting. The infrastructure to realize it didn't exist until recently. Three things changed:\n\n1. **LLM capability**: Models can now reliably follow complex multi-step instructions, handle exceptions, and reason about financial context without hallucinating fundamental errors constantly enough to be unsuitable for production\n2. **Tool use**: Models can now call external APIs, read event logs, and execute state changes \u2014 not just generate text\n3. **Agent frameworks**: LangChain, AutoGen, OpenAI Assistants, Claude Computer Use \u2014 infrastructure for multi-step autonomous action exists and is being actively deployed\n\n## The Gap This Creates\n\nAutonomous agents acting in financial systems need two things that didn't exist before and still barely exist:\n\n**Payment rails for agents**: How does an agent pay for compute time, API calls, data, or services? Skyfire is building this. It's a real market.\n\n**Coordination infrastructure for agents**: How does an agent verify that the thing it's paying for actually happened? How does an agent's principal (the company deploying it) verify that the agent acted correctly? How do multiple agents from different organizations coordinate on shared financial facts?\n\nCAST is the coordination infrastructure. This is the gap.\n\n## Why Existing Infrastructure Fails for Agents\n\n**ERPs**: Single-party, human-operated, batch-oriented. An agent that needs to verify a GPU usage claim in real-time cannot query a counterparty's ERP. And even if it could, it would get that party's interpretation of events, not the underlying facts.\n\n**Payment rails**: ACH, wire, Stripe \u2014 these move money but don't verify conditions. An agent can trigger a payment, but the payment infrastructure doesn't validate that the conditions for payment were met.\n\n**Blockchain**: Too slow, too expensive, too rigid for the kinds of multi-party coordination needed in operational finance. Smart contracts handle simple if-then logic; they break on the complexity of real commercial arrangements.\n\n**Human oversight**: Currently, every significant agent financial action requires a human approval loop. This works today but is not the end state. As agent volume scale"},{"id":"zero-trust-accounting-origins","label":"Zero Trust Accounting Origins","description":"The origin point of CAST: applying zero trust security principles to financial systems. Zero trust accounting (ZTA) predates the event-sourcing framing and provides the intellectua","cluster":"Origins \u2014 Zero Trust Accounting","color":"#e8b4b8","stub":false,"links":["zta-to-event-sourcing","hash-chain-cryptography","proof-first-finance","cryptographic-proof-chains"],"sections":["The Core Principle","The Five Principles","Why the HOA Was the First Domain","What ZTA Got Right","Where ZTA Was Too Narrow"],"words":680,"content":"# Zero Trust Accounting: Origins\n\n## The Core Principle\n\nZero trust security says: never trust, always verify. No implicit trust regardless of whether a user is inside or outside the network. Every access request is authenticated, authorized, and continuously validated.\n\nZero trust accounting applies this to financial systems. The translation:\n\n**Traditional accounting** operates on trust hierarchies \u2014 the controller's entries are trusted, the auditor's opinion is accepted, the reconciliation is performed periodically. Trust is embedded in roles and process.\n\n**Zero trust accounting** assumes no entry, no balance, no transaction is trustworthy by default. Controls are structural not procedural. Every financial action must be:\n- Explicitly verified and authenticated\n- Attributed to an authorized actor\n- Linked to prior events in an immutable chain\n- Independently verifiable by any party with access\n\n## The Five Principles\n\n1. **Continuous verification** \u2014 every financial action requires proof at the time of action, not periodic audit after\n2. **Least privilege access** \u2014 actors can only perform actions their role permits; over-broad access is architecturally prevented\n3. **Micro-segmentation** \u2014 financial data and processes are compartmentalized; compromise of one segment doesn't expose others\n4. **Multi-signature approval** \u2014 critical actions require multiple authorized parties; no single person can unilaterally move funds\n5. **Immutable audit trail** \u2014 every event is recorded with a cryptographic hash chain; past events cannot be altered without breaking the chain\n\n## Why the HOA Was the First Domain\n\nHOAs are structurally high-risk for financial fraud and mismanagement:\n- Weak controls by design (small volunteer boards)\n- High fraud incidence and slow detection\n- Multiple parties with competing interests (board, homeowners, vendors, manager)\n- Significant cash flows relative to organizational sophistication\n\nThe HOA prototype built:\n- Hash-chained event log (SHA-256 with each event referencing the hash of the prior)\n- Multi-signature approval workflows (Treasurer approval + Board member approval for disbursements above threshold)\n- Role-based access (Homeowner, Treasurer, Board Member, Vendor, Auditor, Manager)\n- Immutable audit trail with full traceability from every financial statement value back to originating even
