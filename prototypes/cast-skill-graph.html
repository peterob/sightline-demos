<title>CAST / Sightline — Skill Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    gap: 20px;
  }
  #topbar h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);

    white-space: nowrap;
  }

  #search-wrap {
    flex: 1;

    position: relative;
  }
  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px 6px 30px;

    font-size: 13px;
    color: var(--text);

    transition: border-color 0.15s;

  #search::placeholder { color: var(--text-muted); }
  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 12px;
  }
  #stats {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }

    background: var(--surface);

    flex-direction: column;

    display: flex;

    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cluster-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex: 1;
  }
  .cluster-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .cluster-toggle {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .cluster-toggle.collapsed { transform: rotate(-90deg); }

  .cluster-nodes { padding: 4px 0; }

  .node-item {
    display: flex;

    gap: 8px;

  }
  .node-item:hover { background: var(--surface2); }

  }

  .node-label {

    color: var(--text);

  }

  .stub-badge {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── MAIN PANEL ── */

    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── WELCOME ── */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;

  #welcome h2 {
    font-family: var(--mono);

    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

    font-size: 13px;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.6;
  }
  .cluster-legend {

    gap: 8px;
    justify-content: center;
    max-width: 600px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    transition: background 0.1s;
  }
  .legend-item:hover { background: var(--surface2); color: var(--text); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── NODE DETAIL ── */
  #node-view {
    flex: 1;
    overflow-y: auto;

  #node-view.visible { display: block; }

  .node-breadcrumb {

    align-items: center;

  }

    gap: 5px;

  .node-title {

    font-weight: 600;

  }

  .node-meta {

    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

    font-size: 10px;

  .node-description {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 28px;
    padding: 16px 20px;

    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-style: italic;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 28px;
  }

  /* Markdown-ish content rendering */
  .node-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
    max-width: 780px;
  }

  .node-content h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-top: 32px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);

  .node-content h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);

  .node-content strong { color: var(--text); font-weight: 500; }

    border: none;

    border-radius: 6px;

  /* ── SEARCH RESULTS ── */

    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;

    padding: 14px 16px;

  .result-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);

    font-size: 11px;

    color: var(--text-muted);

  /* ── NAV HISTORY ── */

    height: 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);

<script>
const GRAPH = {"nodes":[{"id":"accounting-as-conservation-law","label":"Accounting As Conservation Law","description":"Double-entry bookkeeping as a conservation law \u2014 debits equal credits because value, like energy, cannot appear from nothing. The accounting equation is a constraint surface. This ","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["gauge-invariance-bilateral","shared-truth-protocol"],"sections":["The Isomorphism","Stocks and Flows","The Constraint Surface","Noether's Theorem","Causality"],"words":764,"content":"# Accounting as a Conservation Law\n\n## The Isomorphism\n\nDouble-entry bookkeeping is a conservation law dressed in commercial clothing. It's one of the more elegant isomorphisms in applied mathematics.\n\nIn physics: conservation of energy, momentum, charge. You can transform them, transfer them between systems, but you cannot create or destroy them within a closed system.\n\nIn accounting: value conservation. Every transaction is a transfer that conserves the total. One account gives, another receives. **Debits equal credits not by convention but because the system models a universe where value, like energy, cannot appear from nothing.**\n\n## Stocks and Flows\n\nPhysics distinguishes:\n- **State variables** (position, temperature, charge at a point in time)\n- **Flow variables** (velocity, heat flux, current \u2014 rates of change over time)\n\nAccounting mirrors this exactly:\n- **Balance sheet accounts** are stocks \u2014 snapshots of accumulated state\n- **Income statement accounts** are flows \u2014 rates of accumulation over a period\n\nThe relationship is identical: the time integral of flows yields the change in stocks. Revenue flowing in accumulates as retained earnings on the balance sheet, just as current flowing integrates to charge.\n\n## The Constraint Surface\n\nAssets = Liabilities + Equity functions like a constraint in Lagrangian mechanics. The entire state space of valid accounting positions lies on this surface. Every valid transaction moves the system *along* this surface \u2014 never off it. Invalid entries (debits \u2260 credits) would push you off the manifold.\n\nThis is not a rule someone made up. It is the mathematical structure of any conservation system.\n\n## Noether's Theorem\n\nEmmy Noether proved that every conservation law corresponds to a symmetry. The \"symmetry\" in accounting is the duality of exchange \u2014 every economic event has two simultaneous perspectives (what you gave up, what you received). This symmetry *implies* the conservation law.\n\nFor CAST specifically: the relevant symmetry is **party-exchange invariance** \u2014 the actual transaction must be invariant regardless of which party's perspective you adopt. Your payable is your vendor's receivable. Same economic reality, different perspectives. The conservation law that falls out is: **net value in the bilateral system is conserved**. When A records +Asset (receive), B must record -Asset (deliver) OR +Liability (owe). See [[gauge-invariance-bilateral]] for the full development.\n\n## Causality\n\nThis is where accounting and physics diverge in ways that matter for CAST.\n\nIn physics, causality is fundament"},{"id":"agentic-infrastructure","label":"Agentic Infrastructure","description":"CAST as foundational infrastructure for agentic financial operations. Why autonomous agents require a deterministic policy-verified state machine underneath them to be safe. Agents","cluster":"Agentic Infrastructure","color":"#e8c8b4","stub":false,"links":["shared-truth-protocol","proof-first-finance"],"sections":["The Missing Infrastructure Problem","CAST as Policy-Verified State Machine","Three Invariants That Make Agent Actions Safe","Agents as First-Class Ledger Participants","The \"Why Now\" Argument"],"words":805,"content":"# Agentic Infrastructure\n\nAgentic payments and agentic commerce are only viable if something like CAST exists underneath. Without a deterministic, event-verified state machine, agentic systems become un-auditable, un-falsifiable, and unsafe.\n\n## The Missing Infrastructure Problem\n\nMost agentic commerce demos fail because they rely on untyped JSON blobs, no invariants, no state machine, no multi-party evidence chain. The agent can read and write to arbitrary systems, but there is no verification that its actions are within authorized bounds, no record that makes those actions inspectable, and no guarantee that independent parties would agree on what the agent did.\n\nThis is not a problem that better AI solves. It is a structural problem: the infrastructure underneath the agent does not enforce the constraints required for safety.\n\n## CAST as Policy-Verified State Machine\n\nAgentic systems need: a canonical object (the shared ledger), verifiable transitions, evidence for each step, and deterministic rejection paths.\n\nCAST provides all of these. Agents act on the ledger state and policies, not around them:\n\n1. Agent observes shared state: \"shipment event received, variance < threshold, invoice matches PO + receipt\"\n2. Agent evaluates policy via CAST: budget available? contract terms satisfied? SLA met?\n3. Agent proposes a state transition event\n4. CAST's invariants either accept or reject \u2014 deterministically\n5. Agent receives the result: accepted (initiate payment) or rejected (post exception reason with evidence)\n\nCAST becomes the truth oracle that ensures agents cannot act outside the allowed envelope. The agent's authority is encoded in the policy, and the policy is enforced cryptographically.\n\n## Three Invariants That Make Agent Actions Safe\n\n**Invariant 1 \u2014 No payment without evidence**: Agent tries to pay. CAST checks: PO exists, shipment event attached, invoice cross-footed. Payment without these is structurally impossible.\n\n**Invariant 2 \u2014 No double spend**: CAST enforces idempotence and linked transfer chains. An agent cannot approve the same invoice twice.\n\n**Invariant 3 \u2014 State monotonicity**: State transitions flow forward. You cannot go from PAID \u2192 NOT_RECEIVED. Agents cannot reverse history.\n\nWithout these invariants, agentic payments are unsafe to automate at scale. With them, 80-95% of routine payment operations can be cleared automatically \u2014 not by trusting the agent's judgment, but by trusting the mathematical constraints it operates within.\n\n## Agents as First-Class Ledger Participants\n\nCAST treats agents as a first-class actor type in the event schema, alongside humans. Every agent action is labeled, every action is logged, and the policy engine enforces what actions each age"},{"id":"agents-as-ledger-participants","label":"Agents As Ledger Participants","description":"","cluster":"Agentic Infrastructure","color":"#e8c8b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"allocation-primitive","label":"Allocation Primitive","description":"","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"case-primitive","label":"Case Primitive","description":"","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"causal-event-primitive","label":"Causal Event Primitive","description":"The formal definition of an event in CAST: immutable, attributable, causal, falsifiable. The four-stage event grammar (commitment \u2192 performance \u2192 measurement \u2192 settlement) grounds ","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["conservation-equation","deterministic-state-machines","event-sourcing-core"],"sections":["First Principles","The Formal Event Structure","The Four-Stage Grammar","The Core Invariant","Cross-Domain Mapping"],"words":655,"content":"# The Causal Event Primitive\n\n## First Principles\n\n**Events are physical.** Something happened in the world that changed state. A truck arrived. Bytes moved. A signature was applied. If you can't point to the physical change, it's not an event \u2014 it's an intention or a belief.\n\n**Commitments are predictions.** A PO is a prediction that goods will arrive and payment will follow. The prediction has parameters (quantity, date, price) that can be compared against actuality.\n\n**Verification is measurement.** Did the physical state match the predicted state? This is a measurement problem, not a trust problem.\n\n**Settlement is state convergence.** All parties' ledgers reflect the same reality. The transaction is closed not because everyone agreed, but because the measurements are consistent.\n\n## The Formal Event Structure\n\n```\nEvent {\n  id: unique identifier\n  type: commitment | performance | measurement | settlement\n  timestamp: when observed\n  observer: who recorded it\n  subject: what resource/obligation it concerns\n  prior_events: [events this depends on]\n  assertions: [measurable claims]\n  proofs: [evidence supporting assertions]\n}\n```\n\nEvery event is:\n- **Immutable** once recorded \u2014 corrections are new events referencing prior ones\n- **Attributable** to an observer \u2014 anonymous events cannot exist\n- **Causal** \u2014 explicitly linked to prior events in the chain\n- **Falsifiable** \u2014 assertions can be compared against subsequent measurements\n\n## The Four-Stage Grammar\n\n| Stage | Physical Basis | Math Analog |\n|-------|---------------|-------------|\n| **Commitment** | Information state change (message sent, record created) | Constraint equation: defines expected future state |\n| **Performance** | Physical state change (location, possession, transformation) | Variable assignment: actual state updated |\n| **Measurement** | Observation recorded (count, inspection, confirmation) | Measurement: observed value with uncertainty |\n| **Settlement** | Ledger state change (obligation extinguished) | Equation resolved: constraint satisfied or exception raised |\n\n## The Core Invariant\n\nFor any completed transaction:\n\n```\n\u03a3(commitments) = \u03a3(performances) = \u03a3(measurements) = \u03a3(settlements)\n```\n\nWhen these don't balance, there is a **variance**. The variance is attributable to specific events in the causal chain. Nothing disappears. Every gap has a home. See [[conservation-equation]] for the full treatment.\n\n## Cross-Domain Mapping\n\nThe grammar applies universally:\n\n| Domain | Commitment | Performance | Measurement | Settlement |\n|--------|-----------|-------------|-------------|------------|\n| GPU Procurement | PO issued | Units"},{"id":"competitive-map","label":"Competitive Map","description":"Who is in the market, what they solve, and where CAST is differentiated. Fragment, Modern Treasury, Skyfire, Twisp, SF Compute, blockchain alternatives. What nobody owns.","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["agentic-infrastructure","open-standard-strategy","gao-greenbook-positioning"],"sections":["Tier 1: Most Direct Overlap","Tier 2: Adjacent Positions","Tier 3: Analytical Overlaps","What Nobody Owns","The CorpChain Warning"],"words":571,"content":"# Competitive Map\n\n## Tier 1: Most Direct Overlap\n\n**Fragment** \u2014 \"The database for money.\" Real-time ledger API for fintech developers. Makes double-entry ledgering accessible to engineers. Key limitation: single-party ledger. They solve the internal consistency problem, not the multi-party coordination problem. Not a competitor in the bilateral coordination sense.\n\n**Modern Treasury** \u2014 Payments operations platform ($300B+ processed). Combines ledger APIs with payment orchestration. Strong on reconciliation automation. AI capabilities being added. Limitation: they handle multi-party *payments*, not multi-party *commitments before payment*. The coordination of \"when conditions are met, funds move\" with proofs is not addressed.\n\n**Twisp/Ledger-API tools** \u2014 Developer-focused double-entry APIs. Same gap as Fragment: single-party internal consistency, not multi-party coordination.\n\n## Tier 2: Adjacent Positions\n\n**Skyfire** \u2014 Building payment rails for AI agents. Closest to the agentic infrastructure thesis. Key difference: they're building the payment rail, CAST is building the coordination layer underneath the payment. Skyfire's traction validates agent spending as a real category; may shape buyer expectations toward payments rather than coordination (potential positioning challenge). See [[agentic-infrastructure]].\n\n**Blockchain-native approaches (Coinbase, various)** \u2014 Treating blockchain as the coordination layer. Assumes chain-first architecture. CAST's architecture treats settlement (whether chain, ACH, wire) as a downstream implementation detail. The event-sourced ledger creates shared truth; how it settles is pluggable. Critical enterprise advantage: PE-backed and growth-stage companies won't rebuild on chain anytime soon. CAST's \"proof-first\" approach delivers coordination benefits without the crypto commitment.\n\n**SF Compute** \u2014 GPU capacity marketplace, raised $40M. Validates GPU compute financing as a real market. Positions it as a marketplace/auction problem, not a coordination/commitment problem. The financing angle (CoreWeave's $2.3B debt facility using H100s as collateral) confirms capital is available for GPU infrastructure.\n\n## Tier 3: Analytical Overlaps\n\n**Numeric, Tellius, Drivetrain** \u2014 AI variance analysis tools. Provide pattern-matching on top of traditional ledgers, not causal modeling from events. Detect anomalies; don't prevent divergence. Post-hoc detection, not pre-commitment validation.\n\n**Palantir/Booz Allen (federal market)** \u2014 Analytics on top of existing systems. Detective, not preventive. See [[gao-greenbook-positioning]] for how this matters in the federal context.\n\n## What Nobody Owns\n\nThree gaps nobody is clearly filling:\n\n**Event-sourced causality**: Most players provide ledgers that record what happened, not systems"},{"id":"conservation-equation","label":"Conservation Equation","description":"The core conservation equation of CAST: \u03a3(commitments) = \u03a3(performances) = \u03a3(measurements) = \u03a3(settlements). Nothing disappears. Every gap must be attributed. This is not an accoun","cluster":"The Event Grammar","color":"#b4e8c8","stub":false,"links":["accounting-as-conservation-law","friction-engine"],"sections":["The Statement","The Second Form","Why This Is a Conservation Law (Not a Rule)","The Graph Structure","Time Conservation (Parallel Dimension)"],"words":386,"content":"# The Conservation Equation\n\n## The Statement\n\nFor any completed transaction:\n\n```\n\u03a3(commitments) = \u03a3(performances) = \u03a3(measurements) = \u03a3(settlements)\n```\n\nWhen these don't balance, there is a **variance**. The variance is attributable to specific events in the causal chain.\n\nMore precisely: **all gaps must be attributed.** The equation doesn't demand equality \u2014 it demands completeness. If 482 units settled against 500 committed, 18 units are a fact that must have an address (carrier loss, vendor credit, damage adjustment, write-off).\n\n## The Second Form\n\n```\n\u03a3(commitments) - \u03a3(settlements) = \u03a3(attributed_variances)\n```\n\nNothing disappears. Every gap has a home. If the right side is not zero, you have unattributed variance \u2014 a genuine audit finding, not a rounding error.\n\n## Why This Is a Conservation Law (Not a Rule)\n\nIn physics, conservation laws emerge from symmetry (Noether's theorem). The conservation of value in CAST emerges from the symmetry of bilateral exchange: every economic event has two simultaneous perspectives. What Party A gives, Party B receives. The conservation law is structural.\n\nSee [[accounting-as-conservation-law]] for the full physics development.\n\n## The Graph Structure\n\nThe conservation equation applies to the four-stage event grammar, but the graph connecting them is not always linear:\n\n```\nSimple (linear):\nC1 \u2192 P1 \u2192 M1 \u2192 S1\n\nOne-to-many:\nC1 \u2500\u252c\u2192 P1 \u2192 M1a \u2500\u2510\n    \u2514\u2192 P2 \u2192 M1b \u2500\u2534\u2192 S1\n\nMany-to-one:\nC1 \u2192 P1 \u2500\u2510\nC2 \u2192 P2 \u2500\u2534\u2192 M1 \u2192 S1\n```\n\nThe four primitives are sufficient. The complexity lives in the graph structure connecting them, not in missing primitive types.\n\n## Time Conservation (Parallel Dimension)\n\nTime has its own conservation logic, parallel to quantity/value:\n\n```\ncommitted_date + \u03a3(delays) = actual_date\n```\n\nWhere each delay is attributed (vendor late, port congestion, carrier fault, customs hold). Time variances matter differently than quantity variances \u2014 they affect downstream commitments and compound in ways quantity variances don't.\n\n## Connection to Friction\n\nThe conservation equation catches *outcome* variances (18 units missing). The Friction Engine catches *process* variances (how many overrides and exceptions were required to close the loop). Both are necessary. See [[friction-engine]]."},{"id":"coordination-vs-payments","label":"Coordination Vs Payments","description":"CAST is not a payment rail. It is the coordination layer that verifies conditions under which payment should occur. Payment rails (Skyfire, Stripe, ACH, wire) move money. CAST prov","cluster":"Bilateral Coordination Protocol","color":"#b4b4e8","stub":false,"links":["standard-functions-concept"],"sections":["The Core Distinction","Why the Distinction Matters","How CAST Works With Payment Rails","The Skyfire Relationship","The Escrow Analogy"],"words":812,"content":"# Coordination vs. Payments: What CAST Is and Isn't\n\n## The Core Distinction\n\n**Payment rails** move money from one account to another. They solve: \"Given that we want to transfer $X from A to B, do it reliably, quickly, and cheaply.\"\n\n**Coordination protocols** verify the conditions under which payment should occur. They solve: \"Did the conditions that justify payment actually happen? Can all parties verify this independently?\"\n\nCAST is a coordination protocol, not a payment rail.\n\n## Why the Distinction Matters\n\nIn multi-party transactions, the hardest problem is not moving money \u2014 modern payment infrastructure handles that well. The hardest problem is establishing, without trust, that the conditions for payment have been met:\n\n- Did the GPU actually run for 47 hours?\n- Did the contractor complete the work specified in the scope?\n- Did the shipment arrive at the right location with the right quantity?\n- Did the software license actually run for the claimed period?\n\nThese are verification problems. Payment rails don't solve them. Banks don't solve them. ERPs don't solve them (each party has their own ERP, with no shared ground truth).\n\nCAST solves the verification problem by making events the ground truth and requiring both parties to sign them.\n\n## How CAST Works With Payment Rails\n\nCAST doesn't replace payment infrastructure \u2014 it sits upstream of it:\n\n```\n1. Events occur (delivery, usage, inspection)\n2. Both parties sign each event (CAST layer)\n3. Policy evaluates: are conditions for payment met?\n4. If yes \u2192 CAST generates a payment instruction\n5. Payment instruction executes via ACH / wire / Skyfire / stablecoin\n6. Payment confirmation flows back as an event in CAST\n```\n\nThe payment rail is interchangeable. CAST works with:\n- ACH for domestic USD\n- Wire for large/international\n- Skyfire for AI agent payments\n- Stablecoins for crypto-native networks\n- Stripe for subscription/SaaS contexts\n\nThe CAST event stream is what proves the payment was justified. The payment rail is just the execution layer.\n\n## The Skyfire Relationship\n\nSkyfire is building payments infrastructure specifically for AI agents \u2014 enabling autonomous agents to pay for compute, API calls, data, and services without human intervention.\n\nCAST and Skyfire are complementary, not competitive:\n- **Skyfire**: moves money on behalf of agents\n- **CAST**: proves the conditions that justify money moving\n\nAn AI agent running GPU workloads needs both:\n- CAST to coordinate proof of delivery between agent, GPU provider, and lender\n- Skyfire to execute the payment once CAST confirms conditions are"},{"id":"coreweave-model","label":"Coreweave Model","description":"","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"database-primitives","label":"Database Primitives","description":"","cluster":"Implementation Architecture","color":"#e8e4b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"density-functional-theory-analogy","label":"Density Functional Theory Analogy","description":"The many-body problem in multi-party financial coordination maps to density functional theory: replace an intractable N-party computation with N single-party computations against a","cluster":"Physics and Mathematical Foundations","color":"#e8d4b4","stub":false,"links":["standard-functions-concept"],"sections":["The Many-Body Problem","The Financial Coordination Analogy","What the Functional Encodes","The Implementation Architecture","What This Buys"],"words":891,"content":"# Density Functional Theory and Multi-Party Coordination\n\n## The Many-Body Problem\n\nIn quantum mechanics: tracking every pairwise electron-electron interaction in a many-electron system is computationally intractable. The full wavefunction lives in 3N-dimensional space.\n\nHohenberg-Kohn (1964): all ground-state properties are uniquely determined by just the electron density \u03c1(r) \u2014 a function of only 3 spatial coordinates. N-particle problem \u2192 3-variable problem.\n\nKohn-Sham implementation: solve N single-particle equations (each electron in an effective potential) instead of one impossibly complex N-particle equation. The many-body interactions are folded into an \"exchange-correlation functional.\"\n\n## The Financial Coordination Analogy\n\n**In multi-party financial systems:** every transaction potentially affects every other party's state \u2014 cash positions, credit exposure, fulfillment obligations, margin requirements. Tracking the full \"wavefunction\" means modeling every pairwise interaction, every conditional dependency, every feedback loop. N-party problem.\n\n**The DFT move for CAST:** each party solves their own single-party equation against a \"density\" that summarizes the aggregate state of the network \u2014 without needing to model everyone else's internal logic.\n\nThe **density equivalent** = the aggregate commitment surface: what the net committed/available/at-risk quantities are across the network at any point in time and for any resource type.\n\nThe **exchange-correlation functional** = the policy engine (Standard Functions): the rules that make non-interacting party calculations produce the same outcomes as full many-party coordination would.\n\n## What the Functional Encodes\n\nFor a PO-to-cash cycle to resolve correctly across supplier, buyer, lender, and logistics provider:\n\n- **Priority rules**: If cash is short, who gets paid first? Subordination logic: takes aggregate claims (density), returns ordering\n- **Timing transforms**: When does a commitment become an obligation? When does an obligation become a liability? These are state transitions triggered by events, but the *rules* are the functional\n- **Risk allocation**: If a shipment is late, how does variance propagate? The functional defines the mapping from deviation in density to adjustment in positions\n- **Margin/collateral requirements**: Given the current density of commitments, what buffer must each party maintain?\n\n## The Implementation Architecture\n\n```\nEVENT LEDGER (append-only, cryptographically committed)\n  \u2193\nDENSITY FUNCTION: \u03c1(resource, time"},{"id":"deterministic-state-machines","label":"Deterministic State Machines","description":"Pure projection functions that produce identical outputs from identical inputs across all counterparties. Why determinism eliminates disagreement by construction rather than by coo","cluster":"The Core Architectural Thesis","color":"#b4c8e8","stub":false,"links":["proof-first-finance","gpu-compute-beachhead","shared-truth-protocol","cryptographic-proof-chains"],"sections":["What Determinism Requires","The Policy Engine","Standard Functions","GPU Compute Financing Example","Relationship to Physics"],"words":596,"content":"# Deterministic State Machines\n\nDeterminism is the property that makes [[shared-truth-protocol]] possible without a central authority. If both parties apply the same projection function to the same event log, they will always compute identical state \u2014 not because they trust each other, not because a third party adjudicates, but because mathematics leaves no room for disagreement.\n\n## What Determinism Requires\n\nA state machine is deterministic if and only if:\n\n1. **No non-deterministic inputs** \u2014 no random numbers, no timestamps from system clocks, no external API calls inside the projection function\n2. **No hidden state** \u2014 the function's output depends only on its inputs (the event log), not on any internal state that varies between parties\n3. **Canonical serialization** \u2014 events must serialize to identical byte sequences on all platforms; floating point representation, string encoding, and field ordering must be standardized\n\nThe third requirement is subtle and frequently underestimated in implementation. Two parties can have identical events conceptually but different canonical forms, producing different hashes and breaking [[cryptographic-proof-chains]].\n\n## The Policy Engine\n\nCAST's policy engine is a specific kind of deterministic state machine. It does not just project financial state \u2014 it also evaluates whether proposed events are valid under the current policy configuration.\n\n```\nvalidate(event, currentState, policySet) \u2192 { valid: boolean, reason: string }\n```\n\nThe policy evaluation function must itself be deterministic. If Party A and Party B evaluate the same proposed event against the same policy and reach different conclusions, coordination breaks down. This is why [[proof-first-finance]] requires that validation happen before events post, and that both parties' validators are running identical policy specifications.\n\n## Standard Functions\n\nThe \"Standard Functions\" concept for CAST is a library of pre-specified, auditable deterministic functions for common coordination scenarios \u2014 PO-to-cash, GPU utilization billing, inventory-backed borrowing base calculation. Each Standard Function is a deterministic state machine that both parties agree to run.\n\nStandard Functions are to CAST what GAAP is to financial reporting \u2014 a common language that eliminates argument by establishing shared computation rules in advance. Unlike GAAP, Standard Functions are executable: you cannot interpret them differently because the code is the specification.\n\n## GPU Compute Financing Example\n\nFor [[gpu-compute-beachhead]], the deterministic projection for a metered billing period looks like:\n\n```typescript\nfunction projectBillingPeriod(events: BilateralEvent[], period: BillingPeriod): BillingState {\n  const utilizati"},{"id":"dfhq-substack-editorial","label":"Dfhq Substack Editorial","description":"The Digital Finance HQ editorial framework and Substack content strategy. Four intellectual pillars distinguish DFHQ from every other finance Substack: events as atomic unit, accou","cluster":"Go-to-Market and Positioning","color":"#e8b4d4","stub":false,"links":[],"sections":["The Four Pillars","Voice Rules","The Differentiation Table","The Flagship Document","Anchor Article List"],"words":1030,"content":"# DFHQ Substack Editorial Framework\n\n## The Four Pillars\n\nThese are the intellectual positions that distinguish Digital Finance HQ from all other finance content:\n\n**Pillar 1: Events as the atomic unit**\n\nMost finance content treats journal entries or transactions as the starting point. DFHQ starts earlier \u2014 at the irreversible business fact. The event itself (a shipment left, a payment cleared, a signature was applied) is the primitive. Journal entries should be *derived from* events, not the other way around. This reframes every topic: landed cost, variance analysis, system selection, audit, AI delegation.\n\n**Pillar 2: Accounting as a conservation law**\n\nNot a reporting convention. Not a professional judgment. A conservation law: value, like energy, cannot appear from nothing. Debits equal credits because the system models physics, not because of GAAP. This connects to Noether's theorem, gauge invariance, Ijiri's force accounting, and a century of physics that accountants have ignored. Rigorous enough to be credible, practical enough for a PE operating partner.\n\n**Pillar 3: Proof over trust**\n\nTraditional finance runs on trust hierarchies \u2014 the controller's close, the auditor's opinion. DFHQ advocates for systems where trust is unnecessary because proof is embedded. Every assertion should be verifiable. Every number traceable to its source event. The zero trust origins of this thinking are real: we built the HOA prototype on this principle before we knew what CAST would become.\n\n**Pillar 4: Task as the atomic unit of work**\n\nJust as events are the primitive of financial data, tasks are the primitive of financial work. Task \u2192 job \u2192 role is the decomposition that makes intelligent automation possible. Most finance functions are designed at the job or role level. Until you decompose to the task level, you cannot decide what to automate, delegate to agents, or do at all. This is the bridge between the first three pillars and the AI transition.\n\n## Voice Rules\n\n1. **Practitioner, not professor.** Every conceptual point gets a \"here's what this looks like on Tuesday morning\" example. Anonymized but detailed from real engagements.\n\n2. **Specific, not generic.** Readers should think \"this person has done this work, not just thought about it.\"\n\n3. **Opinionated.** We take positions. Events are the primitive. Cash is ground truth. Speed beats precision for decisions. Not everyone will agree. Good.\n\n4. **Rigorous but accessible.** We reference Ijiri and conservation laws, but explain them in plain language and connect them to problems CFOs actually have."},{"id":"dispute-window-mechanics","label":"Dispute Window Mechanics","description":"How disputes are handled in CAST: the dispute window is a first-class protocol state, not an exception. The window is finite, defined in policy, and closes automatically. After clo","cluster":"Bilateral Coordination Protocol","color":"#b4b4e8","stub":false,"links":["case-primitive"],"sections":["Why Disputes Need a Protocol-Level Design","The Dispute Window","Dispute Event Structure","Resolution: Policy Not Negotiation","Archaeology vs. Prevention"],"words":820,"content":"# Dispute Window Mechanics\n\n## Why Disputes Need a Protocol-Level Design\n\nTraditional dispute handling:\n1. Party A claims X happened\n2. Party B claims Y happened (or denies X)\n3. Both parties dig through their own records\n4. Mediation, negotiation, sometimes legal proceedings\n5. Resolution: one party updates their records; the discrepancy is manually corrected\n\nThis process is:\n- **Expensive**: Involves human time, often intermediaries and lawyers\n- **Slow**: Weeks to months for significant disputes\n- **Unresolved at the architecture level**: The same event caused the dispute; the dispute resolution doesn't update the underlying architecture\n\nCAST makes disputes a first-class protocol state because they are inevitable and because how you handle them is as important as how you handle happy-path transactions.\n\n## The Dispute Window\n\nEvery event type in CAST has a **dispute window** defined in the governing PolicyVersion:\n\n```yaml\npolicy:\n  event_types:\n    gpu.usage_interval:\n      dispute_window_hours: 48\n      auto_close_on_timeout: true\n      \n    delivery.goods_received:\n      dispute_window_hours: 72\n      auto_close_on_timeout: true\n      \n    payment.released:\n      dispute_window_hours: 0  # No dispute after payment\n```\n\nDuring the dispute window:\n- The event is **recorded** in the event log (immutable)\n- The event is **provisionally binding** but not **finally binding**\n- Any party can file a dispute event that references the original event\n- The system freezes downstream calculations that depend on the disputed event\n\nAfter the dispute window closes without a dispute:\n- The event becomes **finally binding**\n- Downstream calculations proceed\n- No dispute can be opened retrospectively\n\n## Dispute Event Structure\n\nWhen a party files a dispute:\n\n```json\n{\n  \"event_type\": \"dispute.filed\",\n  \"disputed_event_id\": \"EVT-2025-047821\",\n  \"disputed_by\": \"borrower-corp\",\n  \"grounds\": \"usage_quantity_mismatch\",\n  \"claimed_quantity\": 380,\n  \"recorded_quantity\": 480,\n  \"evidence\": [\"telemetry-report-2025-03-01.json\", \"downtime-log.pdf\"],\n  \"filed_at\": \"2025-03-02T14:22:00Z\",\n  \"party_signature\": \"...\"\n}\n```\n\nThe dispute event is itself immutable and becomes part of the permanent record. You can see, historically, that a dispute was filed, by whom, on what grounds, and what evidence was presented.\n\n## Resolution: Policy Not Negotiation\n\nDispute resolution in CAST is not negotiation \u2014 it is policy evaluation. The PolicyVersion specifies how disputes of each type are resolved:\n\n```yaml\ndispute_resolution:\n  usage_quantity_mismatch:\n    resolution_authority: [\"both_parties\", \"third_"},{"id":"event-granularity-principle","label":"Event Granularity Principle","description":"The granularity principle: capture events at the lowest level where the business makes decisions or incurs obligations. Finer than that is noise. Coarser loses causal traceability.","cluster":"The Ledger Engineer Role","color":"#c8e8b4","stub":false,"links":["ledger-engineer-role"],"sections":["The Core Rule","Too Coarse: Loss of Causal Traceability","Too Fine: Operational Noise Obscuring Signal","The Physics Analogy","The Decision/Obligation Test"],"words":914,"content":"# Event Granularity Principle\n\n## The Core Rule\n\n> Capture events at the lowest level where the business makes decisions or incurs obligations. Finer than that is noise. Coarser than that loses causality.\n\nThis is the most important judgment call in implementing any event-sourced financial system. Get it wrong in either direction and the system fails.\n\n## Too Coarse: Loss of Causal Traceability\n\n**Example**: Capturing \"payment batch processed\" rather than \"invoice X paid.\"\n\nWhen a variance appears \u2014 the AP balance is off by $4,700 \u2014 you have no way to trace which specific payment caused it. You know the batch ran, but not what happened within it. The causal chain is broken at the batch level.\n\nThe symptom: numbers can't be explained. \"The total is right but we can't tell you why the individual items added up this way.\" Auditors hate this. PE investors especially hate this. It's the hallmark of a system that's been optimized for reporting rather than understanding.\n\n## Too Fine: Operational Noise Obscuring Signal\n\n**Example**: Capturing every keystroke in the ERP, every intermediate save state, every micro-action in a workflow.\n\nThe event log becomes unnavigable. The important events (an obligation was created, a payment was made, a dispute was opened) are buried in hundreds of events per transaction. Pattern recognition fails. Fraud detection fails. The signal-to-noise ratio collapses.\n\nThe symptom: technically complete but operationally useless. Everything is in there but nothing can be found or analyzed without heroic data engineering.\n\n## The Physics Analogy\n\nIn physics, we know quarks exist. We know atoms are made of protons and electrons. We know molecules are made of atoms. We typically model chemistry at the molecular level \u2014 not at the quark level \u2014 because that's where the useful interactions happen and where the decisions are made.\n\nFor financial systems, the \"molecular level\" is the level where:\n- A human or system makes a decision\n- An obligation is created or extinguished\n- A financial statement line would move if you knew about this event\n\nBelow that level is physics (operational detail). Above that level is chemistry (derived views). Capture at the right level.\n\n## The Decision/Obligation Test\n\nFor any candidate event type, ask two questions:\n\n1. **Does this event cause a decision?** \"A purchase order was issued\" \u2192 yes, this creates a procurement decision. \"Pallet 47B was scanned at dock 3\" \u2192 maybe, if the company routes by pallet. \"The database row was updated\" \u2192 no.\n\n2. **Does this event create or extingu"},{"id":"event-primitive","label":"Event Primitive","description":"The Event primitive: the immutable append-only fact. Non-negotiable properties: immutable once committed, time-stamped (server-issued), idempotency-keyed, causally linkable (revers","cluster":"The Seven Primitives (CAST Kernel)","color":"#d4b4e8","stub":false,"links":[],"sections":["Definition","Schema","Non-Negotiable Properties","Event Type Taxonomy","Append-Only Enforcement"],"words":467,"content":"# Event Primitive\n\n## Definition\n\nAn Event is an immutable statement that something happened or was asserted. It is the foundational primitive \u2014 everything else in CAST is derived from or references events.\n\n## Schema\n\n```sql\nevents (\n  id          ULID PRIMARY KEY,              -- Lexicographically sortable, globally unique\n  ledger_id   ULID NOT NULL REFERENCES ledgers(id),\n  sequence    INTEGER NOT NULL,              -- Monotonic within ledger\n  timestamp   TIMESTAMPTZ NOT NULL DEFAULT now(),  -- Server-issued; clients cannot set\n  type        TEXT NOT NULL,                 -- 'gpu.deployed', 'invoice.received', etc.\n  party_id    ULID NOT NULL,                -- Who submitted this event\n  visibility  TEXT[] NOT NULL,              -- Which parties can see it\n  data        JSONB NOT NULL,               -- Event payload (type-specific)\n  documents   ULID[],                       -- Referenced evidence\n  hash        TEXT NOT NULL,               -- SHA-256 of canonical event content\n  prev_hash   TEXT NOT NULL,               -- Hash of prior event (hash chain)\n  signatures  JSONB NOT NULL,              -- Cryptographic signatures from parties\n  UNIQUE(ledger_id, sequence)\n)\n```\n\n## Non-Negotiable Properties\n\n**Immutable**: Once committed, the event data cannot be changed. Corrections are new events that reference and supersede prior ones. A PostgreSQL trigger prevents UPDATE and DELETE operations \u2014 even a compromised application server cannot modify historical events.\n\n**Server-timestamped**: Clients propose events but the server assigns authoritative timestamps. This prevents backdating and ensures total ordering.\n\n**Idempotency-keyed**: Each event carries an idempotency key derived from the submitting client's request. Duplicate submissions are rejected, preventing double-recording.\n\n**Causally linkable**: Events can reference prior events in three ways:\n- **Reversal**: \"This event undoes that event\"\n- **Amendment**: \"This event supersedes that event with updated data\"\n- **Derivation**: \"This event was caused by that event\"\n\n**Attributed**: Every event references a party_id. There are no anonymous events.\n\n**Hash-chained**: Each event's hash incorporates the previous event's hash. Tampering with any historical event breaks all subsequent hashes \u2014 tamper-evidence is structural.\n\n## Event Type Taxonomy\n\nEvents are namespaced by domain:\n\n```\ncommitment.*    \u2014 obligation-creating events (PO issued, contract signed)\nperformance.*   \u2014 physical delivery events (shipment confirmed, deployment verified)\nmeasurement.*   \u2014 observation events (goods counted, usage logged, inspection passed)\nsettlement.*    \u2014 obligation-closing ev"},{"id":"event-schema-design","label":"Event Schema Design","description":"","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"event-sourcing-core","label":"Event Sourcing Core","description":"The immutable append-only event log as single source of truth. Why all financial state in CAST derives from events rather than mutable tables. Foundation node \u2014 most other concepts","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["cryptographic-proof-chains","reconciliation-as-architecture","gpu-compute-beachhead","ijiri-force-accounting","deterministic-state-machines","shared-truth-protocol"],"sections":["Why This Matters for CAST","The Projection Function","Immutability and Append-Only","Connection to Ijiri","Practical Implications for GPU Financing"],"words":532,"content":"# Event Sourcing Core\n\nIn conventional financial systems, state is stored directly \u2014 a database row holds the current balance, and it gets updated when transactions occur. The history of how you arrived at that balance is either lost or reconstructed from audit logs added as an afterthought.\n\nEvent sourcing inverts this. The **event log is the source of truth**. Current state is always a projection \u2014 a pure function applied to the complete event history. You never update state directly; you append an event that describes what happened, and the projection function derives the new state.\n\n```\nState = reduce(ProjectionFunction, initialState, events)\n```\n\nThis inversion has profound consequences for multi-party financial coordination, which is what [[shared-truth-protocol]] exploits.\n\n## Why This Matters for CAST\n\nThe reason [[reconciliation-as-architecture]] is an architectural problem rather than a clerical one is that traditional systems store state instead of events. When Party A and Party B each maintain their own mutable state, they will diverge. Reconciliation is the manual process of finding and resolving that divergence.\n\nWhen both parties share an append-only event log, state divergence is impossible by construction. There is nothing to reconcile because there is only one ledger \u2014 the event stream both parties co-author.\n\n## The Projection Function\n\nThe projection function must be:\n\n**Deterministic** \u2014 same events always produce same state. No random elements, no side effects, no dependency on external state. This is what [[deterministic-state-machines]] formalizes.\n\n**Pure** \u2014 the function does not modify the events or any external state. Given events, it returns state.\n\n**Total** \u2014 every valid event sequence has a defined output. No edge cases that produce undefined behavior.\n\nWhen the projection function has these properties, every party who holds the same event log will independently compute identical state. This is the mathematical foundation of [[shared-truth-protocol]].\n\n## Immutability and Append-Only\n\nEvents cannot be modified or deleted. This is not just a design choice \u2014 it is a mathematical requirement. If events could be changed, the projection function would produce different state for different versions of the same history.\n\n[[cryptographic-proof-chains]] enforces immutability at the protocol level: each event is cryptographically bound to the previous one via hash chains. Modifying event N changes its hash, which invalidates event N+1's reference to it, which breaks the chain. Tampering is detectable.\n\n## Connection to Ijiri\n\nYuji Ijiri's triple-entry bookkeeping framework, described in [[ijiri-force-accounting]], anticipated this logic. His \"force accounts\" are essentially events \u2014 they record the causal dr"},{"id":"fraud-prevention-positioning","label":"Fraud Prevention Positioning","description":"CAST as structural fraud prevention infrastructure. The GAO GreenBook 2025 alignment, the presidential fraud mandate, and why CAST's architectural approach differs from all existin","cluster":"Go-to-Market and Positioning","color":"#e8b4d4","stub":false,"links":["pe-portfolio-positioning"],"sections":["The Core Architectural Argument","GAO GreenBook 2025 Alignment","HOA, Nonprofit, and Government Pattern","The Distinction from Monitoring Products","Federal Market Opportunity"],"words":719,"content":"# Fraud Prevention Positioning\n\nCAST's architecture addresses fraud not through detection but through structural prevention. This is a categorically different claim from every existing system in the market.\n\n## The Core Architectural Argument\n\nTraditional fraud controls are detective: audit trails, access controls, approval workflows, bank reconciliation. These catch fraud after it happens \u2014 sometimes months later (ACFE median time-to-discovery: 12-18 months). Recovery is poor. Legal costs often exceed recoverable amounts.\n\nCAST eliminates a specific class of fraud opportunity at the architectural level. The fraud triangle's \"opportunity\" leg \u2014 the gap between what was recorded and what actually happened, exploited when one party controls records the other cannot verify \u2014 disappears when both parties co-sign the same events in real time.\n\nYou cannot fabricate an event chain that both parties have already signed. You cannot retroactively change history without breaking the hash chain. The fraud categories that depend on maintaining two different versions of the truth are structurally impossible in a CAST-coordinated system, not just policy-prohibited.\n\n## GAO GreenBook 2025 Alignment\n\nThe 2025 GreenBook revision explicitly elevated the importance of preventive controls over detective controls, mandated fraud and improper payment risk assessment, and identified specific gaps that traditional systems cannot address:\n\n**The reconciliation gap**: The GreenBook admits that reconciliation is a detective control \u2014 it catches discrepancies after they occur, not before. The 2025 revision calls for preventive controls, which traditional systems don't structurally provide.\n\n**Documentation burden**: The GreenBook specifies seven documentation requirements (\u00a77.15, \u00a79.05, \u00a712.02, \u00a716.09, \u00a717.05, \u00a717.06) that traditional systems produce only through manual compliance overhead. In CAST, documentation is a byproduct of operation: every event is timestamped, signed, and immutable by default.\n\n**External fraud risk**: \u00a78.07 specifically identifies fraud by vendors, beneficiaries, and service organizations \u2014 precisely where single-party systems fail. They rely on self-certification. CAST's bilateral signature requirements mean no single party can fabricate records the other hasn't verified.\n\n**The pitch to federal buyers**: \"You cannot satisfy the 2025 GreenBook with systems designed for post-hoc reconciliation. The President's fraud mandate requires prevention, not detection. CAST is the only architecture that eliminates reconciliation at the structural level.\"\n\n## HOA, Nonprofit, and Government Pattern\n\nThese entities share a pattern: weak internal controls (volunteer boards, limited segregation of duties), hig"},{"id":"friction-engine","label":"Friction Engine","description":"Transaction Friction Score: a standalone product concept built on CAST event chains. The happy path is 4 events in a line. Friction is graph complexity \u2014 every deviation adds nodes","cluster":"The Event Grammar","color":"#b4e8c8","stub":false,"links":[],"sections":["The Core Insight","The Happy Path Formalization","The Friction Score Formula","Two Conservation Laws","Temporal and Completeness Dimensions"],"words":969,"content":"# The Friction Engine\n\n## The Core Insight\n\nEvery transaction has a \"happy path\" \u2014 the way it should flow when everything goes right:\n\n```\nC1 \u2192 P1 \u2192 M1 \u2192 S1\nPO    Ship  Recv  Pay\n```\n\nFour events. Three edges. Linear. No branches.\n\nFriction is everything else. Friction is graph complexity \u2014 the difference between the actual path and the happy path. You can *see* it: visual complexity in the transaction graph is friction.\n\n## The Happy Path Formalization\n\n**Perfect transaction (Friction Score = 0):**\n```\nPO \u2192 Ship \u2192 Receive \u2192 Pay (no touches)\n```\n\n**Minor friction (amendment):**\n```\nPO \u2192 PO' \u2192 Ship \u2192 Receive \u2192 Pay\n         (PO amended)\n```\n\n**Moderate friction (partial shipment):**\n```\nPO \u2500\u252c\u2192 Ship\u2081 \u2192 Receive\u2081 \u2192 Pay\u2081\n    \u2514\u2192 Ship\u2082 \u2192 Receive\u2082 \u2192 Pay\u2082\n```\n\n**High friction (dispute + resolution):**\n```\nPO \u2192 Ship \u2192 Receive \u2192 [VARIANCE]\n                         \u2193\n                      Recount\n                         \u2193\n                      Dispute\n                         \u2193\n                      Resolution (credit memo)\n                         \u2193\n                      Partial Settlement\n```\n\nThe visual complexity *is* the friction. No explanation needed.\n\n## The Friction Score Formula\n\n```\nFriction Score = (nodes - 4) + (branches \u00d7 5) + (\u03a3 exception_weights)\n```\n\nWhere:\n- Happy path = 4 nodes, 3 edges\n- Every additional node adds friction\n- Every branch adds weighted friction\n- Exception types carry weights (override >> edit >> clarification)\n\n| Score | Meaning | Example |\n|-------|---------|---------|\n| 0 | Perfect straight-through | PO \u2192 Ship \u2192 Receive \u2192 Pay, no touches |\n| 1\u201310 | Minor hiccups, normal business | One clarification email, small quantity adjustment |\n| 11\u201350 | Friction, someone's day got worse | Wrong address, invoice mismatch, partial shipment |\n| 51\u2013100 | Painful, multiple people involved | Dispute, escalation, manager override |\n| 100+ | Broken, real money to fix | Returned shipment, credit memo, legal review |\n\n## Two Conservation Laws\n\nThe friction engine complements the conservation equation with a second law:\n\n**First Law: Conservation of Value**\n```\n\u03a3(commitments) - \u03a3(settlements) = \u03a3(attributed_variances)\nNothing disappears. Every dollar gap has a home.\n```\n\n**Second Law: Conservation of Effort**\n```\nEntropy(transaction) \u2264 Entropy(baseline) + \u03a3(legitimate_exceptions)\nTransactions shouldn't require more work than normal without explanation.\n```\n\nThe first law catches mistakes and disputes. The second catches fraud and manipulation. A transaction can balance perfectly (first law satisfied) while ta"},{"id":"functional-definition","label":"Functional Definition","description":"","cluster":"Standard Functions and the Contract Layer","color":"#b4e8e8","stub":true,"links":[],"sections":[],"words":0,"content":""},{"id":"gauge-invariance-bilateral","label":"Gauge Invariance Bilateral","description":"The mathematical requirement for bilateral financial coordination: the actual transaction must be invariant under party-exchange symmetry. Each party's books are projections from a","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["reconciliation-as-architecture","noether-theorem-accounting"],"sections":["The Symmetry Requirement","What Falls Out Mathematically","The Conserved Quantity","What CAST Implements","The Shared Event Schema"],"words":679,"content":"# Gauge Invariance and Bilateral Symmetry\n\n## The Symmetry Requirement\n\nIn physics, gauge symmetry means you can change your coordinate system or frame of reference, but physical observables remain invariant. The field equations don't change when you change the gauge.\n\nFor bilateral financial transactions, the equivalent symmetry is **party-exchange invariance**: the economic reality of a transaction must be invariant under the transformation \"view from Party A\" \u2194 \"view from Party B.\"\n\nEach party has their own \"frame of reference\" (their books). The *actual transaction* \u2014 the gauge-invariant observable \u2014 must be the same regardless of whose perspective you adopt.\n\n## What Falls Out Mathematically\n\nConsider a transaction between A and B. Define:\n- State vector from A's perspective: (\u0394Assets_A, \u0394Liabilities_A, \u0394Equity_A)  \n- State vector from B's perspective: (\u0394Assets_B, \u0394Liabilities_B, \u0394Equity_B)\n\nThe symmetry requirement: there must exist a transformation T such that:\n- T(A's view) = B's view\n- T is an involution: T(T(x)) = x\n- The transaction's \"reality\" is preserved: some invariant I satisfies I(A's view) = I(B's view)\n\nIf you require that:\n1. Both parties see a balanced equation in their own books\n2. The transaction creates equal and opposite flows between them\n3. The combined system view is also balanced\n\nThen **double-entry emerges as the unique structure that preserves this observer independence**. Double-entry is not arbitrary convention \u2014 it is the minimal structure that satisfies gauge invariance for bilateral exchange.\n\n## The Conserved Quantity\n\nFrom Noether's theorem (see [[noether-theorem-accounting]]): the symmetry is \"party exchange invariance\" and the conserved quantity is \"net value in the bilateral system.\" When A records +Asset, B must record -Asset or +Liability. The accounting equation on each side ensures local balance, and the antisymmetry ensures global conservation.\n\n## What CAST Implements\n\nTraditional systems are **asymmetric by design**:\n- Party A records: \"We sold $100k to Party B\"\n- Party B records: \"We bought $100k from Party A\"\n- Later: reconciliation process to verify these match\n- The problem: two separate \"truths\" that may conflict\n\nCAST enforces gauge invariance:\n- Single event created: Transaction(A\u2192B, $100k, terms)\n- Software automatically projects to both perspectives\n- A's view: Revenue +$100k, AR +$100k\n- B's view: Expense +$100k, AP +$100k\n- **Impossible to be out of sync** because there is only one source of truth\n\nBefore any event commits to the ledger:\n- Does this preserve A = L + E for Party A? \n- Does this p"},{"id":"gpu-compute-beachhead","label":"Gpu Compute Beachhead","description":"GPU compute financing as the entry market for CAST. Why this vertical has the specific combination of pain, concentration, technical buyers, and absence of incumbent solutions that","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["gpu-event-schema","cryptographic-proof-chains","event-sourcing-core","coreweave-model","deterministic-state-machines"],"sections":["Why GPU Financing Is Different","Market Sizing","CoreWeave as the Model","The Coordination Events","Expansion Path"],"words":596,"content":"# GPU Compute Beachhead\n\nGPU compute financing is the right beachhead market for CAST because it combines acute pain, market concentration, technical buyers, and an absence of incumbent coordination infrastructure \u2014 conditions that allow a new protocol to prove itself before attacking larger, more entrenched markets.\n\n## Why GPU Financing Is Different\n\nThe GPU procurement lifecycle has structural characteristics that make it unusually dependent on coordination:\n\n**Multi-party by default**: A typical deal involves buyer, GPU broker, OEM (NVIDIA), hosting provider (data center), and financier. Five parties, five sets of records, five reconciliation surfaces.\n\n**Hardware before revenue**: GPU buyers need financing because they must pay for hardware weeks before the GPUs generate revenue. The financing gap creates urgency and willingness to pay for coordination infrastructure that accelerates the process.\n\n**Utilization-linked economics**: Unlike traditional equipment finance where the asset's value is static, GPU compute value is utilization-dependent. A GPU that runs at 80% utilization generates different economics than one at 40%. This creates a continuous need for verified utilization data \u2014 exactly what [[event-sourcing-core]] and [[cryptographic-proof-chains]] are built to provide.\n\n**No incumbent solutions**: Traditional trade finance platforms (letters of credit, bank guarantees) don't understand the GPU delivery lifecycle. Banks underwrite balance sheets, not GPU allocation schedules. There is no specialized tooling; everyone is using email, Excel, and relationship-based trust.\n\n## Market Sizing\n\nThe market is intentionally small to start \u2014 maybe 50-100 active buyers globally at any given time, repeat transactions quarterly or more frequently for successful operators. Total addressable financing volume is $5-10B annually, growing fast but still concentrated.\n\nThis concentration is a feature. You can personally know every serious buyer within 6 months. Network density makes protocol adoption viable: when 10-15 of the top 30 independent GPU buyers are using CAST, the next buyer asks \"do you support CAST?\" and the answer shapes infrastructure decisions.\n\n## CoreWeave as the Model\n\n[[coreweave-model]] established that locked long-term contracts are the winning structure in GPU cloud. Operators who got long-term commitments from buyers could finance hardware; those who operated spot markets could not. CAST enables a formal version of this commitment structure: the allocation event is not a contract on paper, it is a cryptographically signed event in a shared log. Both parties have committed to identical terms, and the financing is predicated on that commitment."},{"id":"gpu-event-schema","label":"Gpu Event Schema","description":"STUB \u2014 The formal event schema for GPU compute lifecycle. Events to define: gpu_provisioned, deployment_proof, usage_telemetry_signed, capacity_confirmed, invoice_issued, payment_c","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["three-party-gpu-model","gpu-compute-beachhead"],"sections":[],"words":122,"content":"# GPU Event Schema\n\n*[STUB \u2014 To be written]*\n\nPriority for next session. Define:\n- Event types for the full GPU compute financing lifecycle\n- Required proof fields per event type (telemetry signature, payment confirmation, etc.)\n- The three-party schema: Lender, Borrower, Provider \u2014 which events each party can emit\n- How usage data becomes a cryptographic commitment\n- Settlement conditions and the escrow release trigger\n\nSee [[three-party-gpu-model]] for the protocol context.\nSee [[gpu-compute-beachhead]] for the market rationale."},{"id":"hash-chain-cryptography","label":"Hash Chain Cryptography","description":"Hash-chained events with dual counterparty signatures. How CAST enforces immutability at the protocol level and makes proof-first validation possible. The enforcement mechanism for","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["open-standard-strategy","event-sourcing-core","gpu-compute-beachhead","proof-first-finance","deterministic-state-machines","standalone-positioning"],"sections":["The Event Structure","Why Hash Chains Enforce Immutability","Merkle Trees for Selective Proofs","Proof-First Validation","The Gap Between \"Software Company\" and \"Mathematical Protocol\""],"words":531,"content":"# Cryptographic Proof Chains\n\nCryptographic binding transforms [[event-sourcing-core]]'s logical requirements into physical guarantees. An append-only log is a design intention; a hash-chained log with dual signatures is a mathematical fact.\n\n## The Event Structure\n\nEach event in CAST carries:\n\n```typescript\ninterface BilateralEvent {\n  event_id: UUID;\n  timestamp: ISO8601;\n  event_type: string;\n  payload: EventPayload;\n  \n  // Cryptographic binding\n  content_hash: SHA256;      // H(canonical_serialize(payload))\n  previous_hash: SHA256;     // H(previous_event.content_hash) \u2014 creates the chain\n  \n  // Both parties must sign before the event is valid\n  signature_party_a: ECDSASignature;\n  signature_party_b: ECDSASignature;\n  \n  // Position proof in the full event tree\n  merkle_proof: MerkleProof;\n}\n```\n\nThe dual-signature requirement is the key design choice. An event is not valid until both counterparties have signed it. This means events represent bilateral commitments, not unilateral assertions. Party A cannot post an event that Party B hasn't approved.\n\n## Why Hash Chains Enforce Immutability\n\nModifying any event in the chain is detectable without requiring trust:\n\n1. Change event N's payload \u2192 its `content_hash` changes\n2. Event N+1's `previous_hash` references the old hash of event N \u2192 chain breaks\n3. Repairing N+1 changes its hash \u2192 N+2 breaks\n4. Repairing the entire chain requires recomputing all hashes from N forward\n5. But all these new hashes invalidate the signatures \u2014 you'd need both parties to re-sign every downstream event\n\nTampering requires either breaking the hash function (computationally infeasible) or obtaining both parties' private keys. Neither is realistic.\n\n## Merkle Trees for Selective Proofs\n\nA Merkle tree over the event log enables O(log n) proofs of inclusion. Party A can prove to a third party (auditor, financier, regulator) that a specific event exists in the history without revealing the entire log.\n\nFor [[gpu-compute-beachhead]], this is how a financier audits GPU utilization without accessing the complete operational history between buyer and seller. The Merkle proof demonstrates that specific utilization events exist and are authentic without requiring full log disclosure.\n\n## Proof-First Validation\n\n[[proof-first-finance]] depends on this infrastructure. \"Proof-first\" means validation happens before an event posts, not after. The flow is:\n\n1. Party A proposes an event with content hash\n2. Party A signs the proposal\n3. Party B's policy engine validates the event against current state and policy (see [[deterministic-state-machines]])\n4. If valid, Party B countersigns\n5. Event is now bilaterally committed and appended to the shared log\n6. Both parties' states update deterministically"},{"id":"hierarchy-of-derivation","label":"Hierarchy Of Derivation","description":"The derivation hierarchy: Event \u2192 Movement \u2192 Journal Entry \u2192 Account \u2192 Statement. Each layer derives from the one below. Changing accounting standards is a coordinate transformatio","cluster":"The Ledger Engineer Role","color":"#c8e8b4","stub":false,"links":["event-sourcing-core","event-granularity-principle"],"sections":["The Stack","What Each Layer Is","The Key Insight: Coordinate Transformation","The ERP Implication","The Granularity Principle"],"words":877,"content":"# The Hierarchy of Derivation\n\n## The Stack\n\n```\nFinancial Statement\n      \u2191  (aggregation + period rules)\n   Account Balance\n      \u2191  (accumulation from journal entries)\n   Journal Entry (GL Posting)\n      \u2191  (accounting policy applied to movement)\n   Movement (transfer, accrual, adjustment)\n      \u2191  (caused by event)\n   Event (physical fact)\n```\n\nEach layer derives from the one below. Each layer is a view of the one below with a specific interpretation applied. No layer is the source of truth except the event.\n\n## What Each Layer Is\n\n**Event**: An immutable statement that something happened. A truck arrived. Bytes moved. A signature was applied. The event does not know what account it will hit or what period it belongs to. It knows what happened, when, who observed it, and what the measurable facts were.\n\n**Movement**: The physical transfer of resource, value, or obligation caused by an event. A shipment event causes an inventory movement. A payment event causes a cash movement. Movements are still relatively free of accounting interpretation \u2014 they describe the flow of value, not its classification.\n\n**Journal Entry / GL Posting**: The accounting interpretation of a movement. Now we are applying policy: which accounts? Which period? Which entity? Which currency at what exchange rate? Same movement, different accounting policies, different journal entries.\n\n**Account Balance**: The accumulated sum of journal entries for an account within a period. A derived number \u2014 never independently real, always computed.\n\n**Financial Statement**: The structured presentation of account balances with required disclosures. Multiple views: GAAP, IFRS, cash, tax, management. All derived from the same underlying events under different policy applications.\n\n## The Key Insight: Coordinate Transformation\n\nChanging accounting standards (GAAP \u2192 IFRS, ASC 606 v1 \u2192 v2, old lease standard \u2192 new) is a **coordinate transformation** on top of invariant events.\n\nThe events don't change. The physical facts of the world don't change. What changes is the interpretation layer \u2014 which accounts the movements hit, which period they land in, how they are disclosed.\n\nThis is directly analogous to general relativity: the physics of the universe is invariant across reference frames. What changes when you change frames is the coordinate representation, not the underlying reality.\n\nFor financial systems, this means: **store the events, derive everything else**. Don't store the GAAP interpretation as the primary truth. The interpretation will change. The events won't.\n\nThis is exactly what CA"},{"id":"hoa-prototype","label":"Hoa Prototype","description":"The HOA was the first domain for zero trust accounting and event-sourced finance. Multi-signature approvals, hash-chained audit trails, role-based access, and the first working sch","cluster":"Origins \u2014 Zero Trust Accounting","color":"#e8b4b8","stub":false,"links":["zta-to-event-sourcing","gpu-compute-beachhead"],"sections":["Why HOA?","What Was Built","What the Prototype Proved","Evolution to CAST"],"words":472,"content":"# HOA Prototype\n\n## Why HOA?\n\nHOAs are structurally high-risk for financial mismanagement:\n- Volunteer boards with weak controls\n- Significant cash flows ($50K\u2013$500K annually for typical associations)\n- Multiple parties with competing interests: board, homeowners, vendors, manager, auditor\n- High incidence of fraud and long detection lag\n- No incumbent software focused on this problem with real financial controls\n\nThe HOA was the first domain to prototype zero trust accounting (ZTA) principles. It proved the core architecture is buildable and immediately valuable.\n\n## What Was Built\n\n**Event schema with roles:**\n- Homeowners (submit payments)\n- Treasurer/Bookkeeper (approve payments)\n- Board Members (approval authority for large disbursements)\n- Vendors (submit invoices)\n- Auditors (read-only access for verification)\n- HOA Managers (operational oversight)\n\n**Hash-chained audit trail:**\nEvery event references the SHA-256 hash of the prior event. Any modification to past events invalidates the entire subsequent chain. Tamper-evidence is architectural.\n\n**Multi-signature approval workflows:**\nDisbursements above threshold require dual signature. Example workflow:\n1. Vendor submits invoice (event: invoice_submitted)\n2. Treasurer issues invoice (event: invoice_issued)  \n3. Board Member 1 approves (event: approval_granted)\n4. Board Member 2 approves (event: approval_granted)\n5. Treasurer executes payment (event: payment_executed)\n6. Account balances updated (event: account_updated)\n7. Effect recorded on financial statements (event: effect_recorded)\n\nThe hash chain: `E001-A001-A002-A003-T001-AB001-EF001` \u2014 cumulative hash string linking every step back to the originating event.\n\n**The key recognition:**\nThe hash chain was identified as the system's core differentiator. Every financial statement value traces atomically back to its originating event. Traditional auditing requires sampling; this system provides mathematical certainty. Any balance can be verified by re-running the chain.\n\n## What the Prototype Proved\n\n1. Event-sourced financial systems can be built practically (not just theoretically)\n2. Multi-signature workflows work natively in an event chain\n3. The hash chain creates audit trail that's more powerful than traditional audit evidence\n4. Role-based access with cryptographic attribution prevents anonymous actions\n5. The architecture generalizes: the same event primitives handle dues collection, vendor payments, budget management, and dispute resolution\n\n## Evolution to CAST\n\nThe HOA prototype established ZTA principles. The limitations became apparent when multi-"},{"id":"ijiri-force-accounting","label":"Ijiri Force Accounting","description":"Yuji Ijiri's triple-entry bookkeeping and force statements as intellectual precedent for CAST's event-sourced causality. Why Ijiri got the architecture right in 1986 and how CAST m","cluster":"Intellectual Precedents","color":"#d4e8b4","stub":false,"links":["event-sourcing-core","deterministic-state-machines"],"sections":["The Three Layers","The Force Statement","The Connection to CAST","CAST's Debt to Ijiri"],"words":530,"content":"# Ijiri Force Accounting\n\nYuji Ijiri's 1986 framework for triple-entry bookkeeping is the most direct intellectual predecessor of CAST's approach to financial causality. Ijiri saw that double-entry bookkeeping answered \"what changed\" but not \"why it changed\" \u2014 and built a formal accounting framework to capture both.\n\n## The Three Layers\n\nIjiri extends double-entry by adding a third dimension that tracks causal drivers:\n\n| Layer | Measures | Units | Explains |\n|-------|----------|-------|----------|\n| **Wealth Accounting** | Assets, Liabilities | $ | Position at a point in time |\n| **Momentum Accounting** | Earning rates | $/month | Rate of wealth change |\n| **Force Accounting** | Rate-of-change drivers | $/month\u00b2 | Why momentum changed |\n\nThe mathematical relationships mirror physics:\n- **Derivative relationship**: Force \u2192 Momentum \u2192 Wealth (each is the rate of change of the next)\n- **Integral relationship**: Wealth \u2190 Income \u2190 Action (each accumulates from the layer above)\n\nThis is not metaphor \u2014 Ijiri explicitly borrowed the physics terminology to make a formal claim about the structure of financial causality.\n\n## The Force Statement\n\nThe most operationally relevant piece for CAST is the **Force Statement**, Ijiri's framework for explaining *why* income deviated from expectations. In his examples, force accounts include:\n\n- **New Product**: Impact of new product introduction on momentum\n- **Margin Variance**: Changes in gross margin per unit\n- **Volume Variance**: Changes in sales volume\n- **Efficiency Variance**: Changes in operational efficiency\n\nThe key insight: these are not variance labels \u2014 they are **accounts** that accumulate over time and integrate into wealth impact. The timing of when a force is applied matters because earlier momentum changes have longer to accumulate into wealth.\n\n## The Connection to CAST\n\nIjiri's complaint about traditional accounting is that it explains *what* happened but not *why*. CAST's event-sourced approach captures the \"why\" through causal event ordering. Each event in the CAST ledger is Ijiri's trebit entry \u2014 it records not just a state change but the force that caused it.\n\nIn [[event-sourcing-core]], the event log is the source of truth. In Ijiri's framework, the force ledger is the causal explanation layer. These are the same thing: an ordered log of causal events from which state and its causes are derivable.\n\nWhere Ijiri's framework was a paper accounting system, CAST makes it executable:\n- Force accounts become event types with typed schemas\n- The integration from forces to momentum to wealth becomes [[deterministic-state-machines]] projection functions\n- The force statement becomes real-time variance attribution from the event log\n\n## CAST's Debt to Ijiri\n\nWhen CAST claims to pro"},{"id":"intent-as-predicted-effect","label":"Intent As Predicted Effect","description":"Intent redefined as the specific predicted effect of a causal chain \u2014 not a subjective mental state but a mechanistic, verifiable, auditable output. The Financial Causality Framewo","cluster":"The Event Grammar","color":"#b4e8c8","stub":false,"links":["agentic-infrastructure","event-sourcing-core"],"sections":["The Reframing","The Gamble vs. the Bet","The Decision Schema","Intent as Workflow Gate","Intent as Portfolio Taxonomy"],"words":955,"content":"# Intent as Predicted Effect\n\n## The Reframing\n\nTraditional finance treats intent as narrative: \"we intend to close the books by Day 5.\" Intent is a compliance statement.\n\nA causal framework redefines intent as: **the specific predicted effect of a causal chain.**\n\nIntent isn't about subjective mental states or desires. It's defined as the predicted outcome that a causal chain is expected to produce:\n- There's a chain of cause and effect (A causes B causes C)\n- If you can predict that chain will produce effect C\n- Then C is the \"intent\" of that chain\n\nThis is mechanistic, not psychological. Intent becomes:\n- **Auditable**: the predicted effect is recorded at decision time\n- **Falsifiable**: the actual outcome can be compared to the prediction\n- **Learnable**: variance between intent and outcome improves the causal model\n\n## The Gamble vs. the Bet\n\nThis framing differentiates a gamble from a bet:\n\n**Gambling:** \"We are increasing marketing spend.\" \u2014 Action without specific quantified intent\n\n**Intent-driven bet:** \"We are increasing marketing spend to generate $50K in pipeline from Vertical B within 90 days.\" \u2014 Hypothesis with measurable prediction\n\nIf intent isn't quantified and time-bounded, the decision is a gamble. You cannot measure whether your causal model was correct.\n\n## The Decision Schema\n\nEver
