const Lucide = window.lucide || {};
function makeLucideComponent(iconName) {
  return function LucideIcon(props = {}) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (!ref.current) return;
      const icon = Lucide.icons[iconName] || Lucide.icons.HelpCircle;
      const node = Lucide.createElement(icon);
      ref.current.innerHTML = '';
      ref.current.appendChild(node);
    }, []);
    return React.createElement('span', { ref, className: props.className, style: { display:'inline-flex', ...(props.style||{}) } });
  };
}

                    style={{ width: `${Math.min(budget.spent_percentage, 100)}%` }}
                  />
                </div>
                <div className="flex justify-between items-center mt-1">
                  <span className="text-xs text-gray-500">{budget.spent_percentage.toFixed(1)}% used</span>
                  <span className="text-xs text-gray-500">
                    ${(budget.allocated_amount - budget.spent_amount).toLocaleString()} remaining
                  </span>
                </div>
              </div>
            ))}
          </div>
          
          <div className="mt-8 pt-6 border-t border-gray-200">
            <div className="flex justify-between items-center">
              <div>
                <p className="text-sm text-gray-500">Total Budget</p>
                <p className="text-2xl font-bold text-gray-900">
                  ${budgets.reduce((sum, b) => sum + b.allocated_amount, 0).toLocaleString()}
                </p>
              </div>
              <div className="text-right">
                <p className="text-sm text-gray-500">Total Spent</p>
                <p className="text-2xl font-bold text-gray-900">
                  ${budgets.reduce((sum, b) => sum + b.spent_amount, 0).toLocaleString()}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const NotificationCenter = ({ notifications, unreadCount }) => {
  const [showDropdown, setShowDropdown] = useState(false);

  return (
    <div className="relative">
      <button
        onClick={() => setShowDropdown(!showDropdown)}
        className="relative p-2 text-gray-600 hover:text-gray-900"
      >
        <Bell className="h-6 w-6" />
        {unreadCount > 0 && (
          <span className="absolute top-0 right-0 h-5 w-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">
            {unreadCount}
          </span>
        )}
      </button>
      
      {showDropdown && (
        <div className="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg z-50">
          <div className="p-4 border-b border-gray-200">
            <h3 className="font-medium text-gray-900">Notifications</h3>
          </div>
          <div className="max-h-96 overflow-y-auto">
            {notifications.length === 0 ? (
              <div className="p-4 text-center text-gray-500">No new notifications</div>
            ) : (
              notifications.map((notif) => (
                <div key={notif.id} className={`p-4 border-b border-gray-100 hover:bg-gray-50 ${!notif.read_at ? 'bg-blue-50' : ''}`}>
                  <p className="font-medium text-sm text-gray-900">{notif.subject}</p>
                  <p className="text-sm text-gray-600 mt-1">{notif.body}</p>
                  <p className="text-xs text-gray-500 mt-2">
                    {new Date(notif.created_at).toLocaleString()}
                  </p>
                </div>
              ))
            )}
          </div>
        </div>
      )}
    </div>
  );
};
