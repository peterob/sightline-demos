const formatCurrency = (amount) => {
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  }).format(amount);
};

const formatDate = (isoString) => {
  return new Date(isoString).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const formatDateTime = (isoString) => {
  return new Date(isoString).toLocaleString('en-US', { 
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false 
  });
};

const calculateEnvelopeTotals = (envelope) => {
  const committed = envelope.lineItems.reduce((sum, li) => sum + li.amount, 0);
  const disbursed = envelope.events
    .filter(e => e.type === 'DISBURSED')
    .reduce((sum, e) => sum + (e.data?.amount || 0), 0);
  return { committed, disbursed, remaining: committed - disbursed };
};

const calculateBudgetPosition = (budgetId, allEnvelopes) => {
  const budget = budgetAuthorities[budgetId];
  let committed = 0;
  let disbursed = 0;
  
  allEnvelopes.forEach(env => {
    env.lineItems.forEach(li => {
      if (li.budgetId === budgetId) {
        committed += li.amount;
      }
    });
    env.events.filter(e => e.type === 'DISBURSED').forEach(e => {
      const lineItem = env.lineItems.find(li => li.id === e.data?.lineItemId);
      if (lineItem?.budgetId === budgetId) {
        disbursed += e.data?.amount || 0;
      }
    });
  });
  
  // Rough calculation for demo - in real system would track by line item
  disbursed = allEnvelopes.reduce((sum, env) => {
    const envDisbursed = env.events.filter(e => e.type === 'DISBURSED').reduce((s, e) => s + (e.data?.amount || 0), 0);
    const envBudgetShare = env.lineItems.filter(li => li.budgetId === budgetId).reduce((s, li) => s + li.amount, 0);
    const envTotal = env.lineItems.reduce((s, li) => s + li.amount, 0);
    return sum + (envTotal > 0 ? (envDisbursed * envBudgetShare / envTotal) : 0);
  }, 0);
  
  const forecasted = forecasts
    .filter(f => f.budgetId === budgetId)
    .reduce((sum, f) => sum + f.amount, 0);
  
  return {
    authorized: budget.authorized,
    committed,
    disbursed: Math.round(disbursed),
    forecasted,
    available: budget.authorized - committed,
    availableAfterForecast: budget.authorized - committed - forecasted
  };
};

// Filter events for vendor view
const getVendorVisibleEvents = (events) => {
  return events.filter(e => e.vendorVisible).map(e => ({
    ...e,
    detail: e.vendorDetail || e.detail,
    // Remove internal-only data
    journalEntries: undefined
  }));
};

// Generate journal entries from all events
const generateJournalEntries = (envelope) => {
  const entries = [];
  envelope.events.forEach(event => {
    if (event.journalEntries) {
      event.journalEntries.forEach(je => {
        entries.push({
          date: event.timestamp,
          eventId: event.id,
          eventType: event.type,
          ...je
        });
      });
    }
  });
  return entries;
};

const EventTimeline = ({ events, viewMode }) => {
  const displayEvents = viewMode === 'VENDOR' ? getVendorVisibleEvents(events) : events;
  
  const getEventStyle = (type) => {
    const styles = {
      'INITIATED': { color: '#9ca3af', symbol: '○' },
      'BUDGET_APPROVED': { color: '#10b981', symbol: '◆' },
      'PROCUREMENT_APPROVED': { color: '#0891b2', symbol: '◇' },
      'THRESHOLD_APPROVED': { color: '#8b5cf6', symbol: '◈' },
      'PENDING_REVIEW': { color: '#d97706', symbol: '◌' },
      'PO_ISSUED': { color: '#fcd34d', symbol: '●' },
      'INVOICE_SUBMITTED': { color: '#93c5fd', symbol: '▣' },
      'INVOICE_MATCHED': { color: '#6ee7b7', symbol: '⬡' },
      'DISBURSED': { color: '#3b82f6', symbol: '●' },
      'CLOSED': { color: '#10b981', symbol: '◉' }
    };
    return styles[type] || { color: '#6b7280', symbol: '•' };
  };

  return (
    <div>
      {displayEvents.map((event, index) => {
        const style = getEventStyle(event.type);
        const isLast = index === displayEvents.length - 1;
        
        return (
          <div key={event.id} style={{ display: 'flex', gap: '12px', position: 'relative' }}>
            {/* Timeline connector */}
            {!isLast && (
              <div style={{
                position: 'absolute',
                left: '9px',
                top: '20px',
                bottom: '-8px',
                width: '1px',
                backgroundColor: 'rgba(75, 85, 99, 0.3)'
              }} />
            )}
            
            {/* Marker */}
            <div style={{
              width: '20px',
              height: '20px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              color: style.color,
              fontSize: '12px',
              flexShrink: 0,
              position: 'relative',
              zIndex: 1
            }}>
              {style.symbol}
            </div>
            
            {/* Content */}
            <div style={{ flex: 1, paddingBottom: '16px' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '2px' }}>
                <span style={{ 
                  fontSize: '10px', 
                  fontWeight: '600', 
                  color: style.color,
                  textTransform: 'uppercase',
                  letterSpacing: '0.5px'
                }}>
                  {event.type.replace(/_/g, ' ')}
                </span>
                <span style={{ fontSize: '10px', color: '#4b5563' }}>
                  {formatDateTime(event.timestamp)}
                </span>
              </div>
              <div style={{ fontSize: '12px', color: '#9ca3af' }}>{event.detail}</div>
              {viewMode !== 'VENDOR' && event.actorType && (
                <div style={{ fontSize: '10px', color: '#4b5563', marginTop: '2px' }}>
                  {event.actorType === 'VENDOR' ? '↗ External' : event.actorType === 'SYSTEM' ? '⚙ System' : `↳ ${event.actor}`}
                </div>
              )}
              
              {/* Journal entries (only in journal view) */}
              {viewMode === 'JOURNAL' && event.journalEntries && (
                <div style={{ 
                  marginTop: '8px', 
                  padding: '8px 12px',
                  backgroundColor: 'rgba(0,0,0,0.2)',
                  borderRadius: '4px',
                  fontSize: '10px',
                  fontFamily: 'monospace'
                }}>
                  {event.journalEntries.map((je, i) => (
                    <div key={i} style={{ display: 'flex', gap: '16px', marginBottom: i < event.journalEntries.length - 1 ? '4px' : 0 }}>

                      <span style={{ color: '#93c5fd', marginLeft: 'auto' }}>{formatCurrency(je.amount)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
};

                    </div>
                    
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                      <StatusBadge status={envelope.status} small />
                      <span style={{ fontSize: '10px', color: '#6b7280' }}>
                        {envelope.lineItems.length} line items
                      </span>
                    </div>
                    
                    {/* Progress */}
                    <div style={{ height: '4px', backgroundColor: 'rgba(255,255,255,0.1)', borderRadius: '2px', overflow: 'hidden', marginBottom: '6px' }}>
                      <div style={{ 
                        width: `${(envTotals.disbursed / envTotals.committed) * 100}%`, 
                        height: '100%', 
                        backgroundColor: '#3b82f6' 
                      }} />
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px' }}>
                      <span style={{ color: '#3b82f6' }}>{formatCurrency(envTotals.disbursed)} disbursed</span>
                      <span style={{ color: '#d97706' }}>{formatCurrency(envTotals.committed)} committed</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Envelope Detail */}
          <div style={{ display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {/* Header */}
            <div style={{ padding: '20px 24px', borderBottom: '1px solid rgba(255,255,255,0.06)', backgroundColor: 'rgba(255,255,255,0.01)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
                <div>
                  <div style={{ fontSize: '10px', color: '#6b7280', letterSpacing: '1px', marginBottom: '4px' }}>
                    {selectedEnvelope.id} · {selectedEnvelope.poNumber || 'PO PENDING'}
                  </div>
                  <h2 style={{ fontSize: '18px', fontWeight: '500', margin: 0, color: '#f8f8fc' }}>
                    {selectedEnvelope.title}
                  </h2>
                  <div style={{ fontSize: '11px', color: '#6b7280', marginTop: '4px' }}>
                    {vendor.name} · Requested by {selectedEnvelope.requestedBy}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                  <StatusBadge status={selectedEnvelope.status} />
                  <RiskBadge risk={selectedEnvelope.risk} />
                </div>
              </div>
              
              {/* Summary cards */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px' }}>
                {[
                  { label: 'Committed', value: totals.committed, color: '#d97706' },
                  { label: 'Disbursed', value: totals.disbursed, color: '#3b82f6' },
                  { label: 'Remaining', value: totals.remaining, color: '#9ca3af' },
                  { label: 'Budget Lines', value: [...new Set(selectedEnvelope.lineItems.map(li => li.budgetId))].length, isCount: true, color: '#6366f1' }
                ].map((card, i) => (
                  <div key={i} style={{
                    padding: '12px',
                    backgroundColor: 'rgba(255,255,255,0.02)',
                    border: '1px solid rgba(255,255,255,0.04)',
                    borderRadius: '6px'
                  }}>
                    <div style={{ fontSize: '9px', color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>
                      {card.label}
                    </div>
                    <div style={{ fontSize: '16px', fontWeight: '500', color: card.color, fontFeatureSettings: '"tnum"' }}>
                      {card.isCount ? card.value : formatCurrency(card.value)}
                    </div>
                  </div>
                ))}
              </div>
              
              {selectedEnvelope.riskNote && (
                <div style={{
                  marginTop: '12px',
                  padding: '10px 14px',
                  backgroundColor: 'rgba(220,38,38,0.1)',
                  border: '1px solid rgba(220,38,38,0.3)',
                  borderRadius: '6px',
                  fontSize: '11px',
                  color: '#fca5a5',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '8px'
                }}>
                  <span>⚠</span> {selectedEnvelope.riskNote}
                </div>
              )}
            </div>

            {/* Content */}
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 320px', overflow: 'hidden' }}>
              {/* Left - Line Items + Events */}
              <div style={{ overflowY: 'auto', borderRight: '1px solid rgba(255,255,255,0.06)' }}>
                {/* Line Items */}
                <div style={{ padding: '20px 24px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                  <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '12px' }}>
                    Line Items · Budget Attribution
                  </div>
                  {selectedEnvelope.lineItems.map(li => (
                    <LineItemRow key={li.id} lineItem={li} showBudget={true} />
                  ))}
                </div>
                
                {/* Event Timeline */}
                <div style={{ padding: '20px 24px' }}>
                  <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '16px' }}>
                    Event Chain · {selectedEnvelope.events.length} Events
                  </div>
                  <EventTimeline events={selectedEnvelope.events} viewMode={viewMode} />
                </div>
              </div>
              
              {/* Right - Controls */}
              <div style={{ overflowY: 'auto', padding: '20px', backgroundColor: 'rgba(255,255,255,0.01)' }}>
                <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '12px' }}>
                  Control Attestations
                </div>
                <ControlsList controls={selectedEnvelope.controls} />
                
                {/* Invariant */}
                <div style={{
                  marginTop: '16px',
                  padding: '12px',
                  backgroundColor: selectedEnvelope.controls.some(c => c.status === 'PENDING')
                    ? 'rgba(217,119,6,0.1)' : 'rgba(5,150,105,0.1)',
                  border: `1px solid ${selectedEnvelope.controls.some(c => c.status === 'PENDING') 
                    ? 'rgba(217,119,6,0.3)' : 'rgba(5,150,105,0.3)'}`,
                  borderRadius: '6px'
                }}>
                  <div style={{ 
                    display: 'flex', 
                    alignItems: 'center', 
                    gap: '6px',
                    fontSize: '11px',
                    color: selectedEnvelope.controls.some(c => c.status === 'PENDING') ? '#fcd34d' : '#6ee7b7'
                  }}>
                    <span>{selectedEnvelope.controls.some(c => c.status === 'PENDING') ? '○' : '✓'}</span>
                    <span style={{ fontWeight: '600' }}>
                      {selectedEnvelope.controls.some(c => c.status === 'PENDING') ? 'Controls Pending' : 'All Controls Satisfied'}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* BUDGET HOLDER VIEW */}
      {viewMode === 'BUDGET_HOLDER' && (
        <div style={{ display: 'grid', gridTemplateColumns: '340px 1fr', minHeight: 'calc(100vh - 65px)' }}>
          {/* Left - Budget Selection + Forecasts */}
          <div style={{ borderRight: '1px solid rgba(255,255,255,0.06)', overflowY: 'auto', padding: '20px' }}>
            <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '12px' }}>
              My Budget Authorities
            </div>
            
            {Object.values(budgetAuthorities).map(budget => (
              <div
                key={budget.id}
                onClick={() => setSelectedBudgetId(budget.id)}
                style={{
                  padding: '12px',
                  marginBottom: '8px',
                  backgroundColor: selectedBudgetId === budget.id ? 'rgba(59,130,246,0.1)' : 'rgba(255,255,255,0.02)',
                  border: `1px solid ${selectedBudgetId === budget.id ? 'rgba(59,130,246,0.3)' : 'rgba(255,255,255,0.04)'}`,
                  borderRadius: '6px',
                  cursor: 'pointer'
                }}
              >
                <div style={{ fontSize: '12px', fontWeight: '500', color: '#e2e2e8' }}>{budget.name}</div>
                <div style={{ fontSize: '10px', color: '#6b7280' }}>{budget.id}</div>
              </div>
            ))}
            
            {/* Forecasts */}
            <div style={{ marginTop: '24px' }}>
              <div style={{ 
                display: 'flex', 
                justifyContent: 'space-between', 
                alignItems: 'center',
                marginBottom: '12px'
              }}>
                <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase' }}>
                  Forecasts
                </div>
                <button
                  onClick={() => setShowForecasts(!showForecasts)}
                  style={{
                    fontSize: '10px',
                    color: '#6366f1',
                    background: 'none',
                    border: 'none',
                    cursor: 'pointer',
                    fontFamily: 'inherit'
                  }}
                >
                  {showForecasts ? 'Hide' : 'Show'}
                </button>
              </div>
              
              {showForecasts && budgetForecasts.map(forecast => (
                <ForecastCard key={forecast.id} forecast={forecast} />
              ))}
              
              {showForecasts && budgetForecasts.length === 0 && (
                <div style={{ fontSize: '11px', color: '#6b7280', textAlign: 'center', padding: '16px' }}>
                  No forecasts for this budget
                </div>
              )}
            </div>
          </div>

          {/* Right - Budget Position + Envelopes */}
          <div style={{ overflowY: 'auto', padding: '20px 24px' }}>
            <BudgetPositionCard budgetId={selectedBudgetId} allEnvelopes={envelopes} />
            
            <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', margin: '24px 0 12px' }}>
              Envelopes Drawing From This Budget
            </div>
            
            {budgetHolderEnvelopes.map(envelope => {
              const envTotals = calculateEnvelopeTotals(envelope);
              const relevantLineItems = envelope.lineItems.filter(li => li.budgetId === selectedBudgetId);
              const lineItemTotal = relevantLineItems.reduce((sum, li) => sum + li.amount, 0);
              
              return (
                <div key={envelope.id} style={{
                  padding: '16px',
                  backgroundColor: 'rgba(255,255,255,0.02)',
                  border: '1px solid rgba(255,255,255,0.06)',
                  borderRadius: '8px',
                  marginBottom: '12px'
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                    <div>
                      <div style={{ fontSize: '13px', fontWeight: '500', color: '#e2e2e8' }}>{envelope.title}</div>
                      <div style={{ fontSize: '10px', color: '#6b7280', marginTop: '2px' }}>
                        {envelope.poNumber || 'PO Pending'} · {vendors[envelope.vendorId].name}
                      </div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: '14px', fontWeight: '600', color: '#d97706' }}>{formatCurrency(lineItemTotal)}</div>
                      <div style={{ fontSize: '9px', color: '#6b7280' }}>from this budget</div>
                    </div>
                  </div>
                  
                  {/* Relevant line items */}
                  {relevantLineItems.map(li => (
                    <LineItemRow key={li.id} lineItem={li} showBudget={false} />
                  ))}
                  
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '12px' }}>
                    <StatusBadge status={envelope.status} small />
                    <span style={{ fontSize: '10px', color: '#6b7280' }}>
                      Created {formatDate(envelope.createdAt)}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* VENDOR VIEW */}
      {viewMode === 'VENDOR' && (
        <div style={{ maxWidth: '800px', margin: '0 auto' }}>
          <VendorHeader vendor={vendor} envelope={selectedEnvelope} />
          
          <div style={{ padding: '24px' }}>
            {/* Vendor sees their line items (without internal budget info) */}
            <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '12px' }}>
              Order Lines
            </div>
            
            {selectedEnvelope.lineItems.map(li => (
              <div key={li.id} style={{
                padding: '12px 16px',
                backgroundColor: 'rgba(255,255,255,0.02)',
                border: '1px solid rgba(255,255,255,0.04)',
                borderRadius: '6px',
                marginBottom: '8px',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center'
              }}>
                <div>
                  <div style={{ fontSize: '12px', color: '#e2e2e8' }}>{li.description}</div>
                  <div style={{ fontSize: '10px', color: '#6b7280', marginTop: '2px' }}>
                    {li.fulfillmentType} · {li.completedUnits}/{li.expectedUnits} delivered
                  </div>
                </div>
                <div style={{ fontSize: '14px', fontWeight: '600', color: '#e2e2e8' }}>
                  {formatCurrency(li.amount)}
                </div>
              </div>
            ))}
            
            {/* Vendor event timeline (filtered) */}
            <div style={{ marginTop: '32px' }}>
              <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '16px' }}>
                Activity
              </div>
              <EventTimeline events={selectedEnvelope.events} viewMode="VENDOR" />
            </div>
            
            {/* Submit invoice CTA */}
            {selectedEnvelope.poNumber && (
              <div style={{
                marginTop: '24px',
                padding: '20px',
                backgroundColor: 'rgba(59,130,246,0.1)',
                border: '1px solid rgba(59,130,246,0.3)',
                borderRadius: '8px',
                textAlign: 'center'
              }}>
                <div style={{ fontSize: '13px', color: '#93c5fd', marginBottom: '12px' }}>
                  Ready to submit an invoice?
                </div>
                <button style={{
                  padding: '10px 24px',
                  fontSize: '12px',
                  fontWeight: '600',
                  backgroundColor: '#3b82f6',
                  color: '#fff',
                  border: 'none',
                  borderRadius: '6px',
                  cursor: 'pointer',
                  fontFamily: 'inherit'
                }}>
                  Submit Invoice
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* JOURNAL VIEW */}
      {viewMode === 'JOURNAL' && (
        <div style={{ display: 'grid', gridTemplateColumns: '300px 1fr', minHeight: 'calc(100vh - 65px)' }}>
          {/* Envelope selector */}
          <div style={{ borderRight: '1px solid rgba(255,255,255,0.06)', overflowY: 'auto' }}>
            {envelopes.map(envelope => {
              const isSelected = selectedEnvelope.id === envelope.id;
              const journalCount = envelope.events.filter(e => e.journalEntries).length;
              
              return (
                <div
                  key={envelope.id}
                  onClick={() => setSelectedEnvelope(envelope)}
                  style={{
                    padding: '14px 16px',
                    borderBottom: '1px solid rgba(255,255,255,0.04)',
                    cursor: 'pointer',
                    backgroundColor: isSelected ? 'rgba(59,130,246,0.08)' : 'transparent',
                    borderLeft: isSelected ? '2px solid #3b82f6' : '2px solid transparent'
                  }}
                >
                  <div style={{ fontSize: '12px', fontWeight: '500', color: '#e2e2e8', marginBottom: '2px' }}>
                    {envelope.title}
                  </div>
                  <div style={{ fontSize: '10px', color: '#6b7280' }}>
                    {journalCount} events with journal entries
                  </div>
                </div>
              );
            })}
          </div>
          
          {/* Journal detail */}
          <div style={{ overflowY: 'auto' }}>
            <div style={{ padding: '20px 24px', borderBottom: '1px solid rgba(255,255,255,0.06)', backgroundColor: 'rgba(255,255,255,0.01)' }}>
              <div style={{ fontSize: '10px', color: '#6b7280', letterSpacing: '1px', marginBottom: '4px' }}>
                {selectedEnvelope.id}
              </div>
              <h2 style={{ fontSize: '16px', fontWeight: '500', margin: 0, color: '#f8f8fc' }}>
                {selectedEnvelope.title}
              </h2>
            </div>
            
            <JournalView envelope={selectedEnvelope} />
            
            {/* Event timeline with journal entries inline */}
            <div style={{ padding: '0 24px 24px' }}>
              <div style={{ fontSize: '10px', letterSpacing: '1.5px', color: '#6b7280', textTransform: 'uppercase', marginBottom: '16px' }}>
                Full Event Chain with Journal Entries
              </div>
              <EventTimeline events={selectedEnvelope.events} viewMode="JOURNAL" />
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// export default EnvelopeCoordinationSystem;

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(budgetAuthorities));
</script>
</body>
</html>
