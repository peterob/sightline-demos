const Lucide = window.lucide || {};
function makeLucideComponent(iconName) {
  return function LucideIcon(props = {}) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (!ref.current) return;
      const icon = Lucide.icons[iconName] || Lucide.icons.HelpCircle;
      const node = Lucide.createElement(icon);
      ref.current.innerHTML = '';
      ref.current.appendChild(node);
    }, []);
    return React.createElement('span', { ref, className: props.className, style: { display:'inline-flex', ...(props.style||{}) } });
  };
}

const formatCurrency = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);

const formatTimeRemaining = (deadline) => {
  const diff = new Date(deadline) - new Date();
  const hours = Math.floor(Math.abs(diff) / (1000 * 60 * 60));
  const mins = Math.floor((Math.abs(diff) % (1000 * 60 * 60)) / (1000 * 60));
  const isOverdue = diff < 0;
  if (hours > 24) return isOverdue ? `${Math.floor(hours/24)}d over` : `${Math.floor(hours/24)}d`;
  return isOverdue ? `${hours}h over` : `${hours}h ${mins}m`;
};

};

const ApprovalActionBar = ({ transaction, onAction }) => {
  const [mode, setMode] = useState(null);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setLoading(true);
    await new Promise(r => setTimeout(r, 600));
    onAction(mode, input);
    setMode(null);
    setInput('');
    setLoading(false);
  };

  if (mode) {
    const cfg = { approve: { title: 'Approve', ph: 'Notes (optional)', btn: 'Confirm', clr: 'bg-green-600' }, reject: { title: 'Reject', ph: 'Reason (required)', btn: 'Reject', clr: 'bg-red-600' }, override: { title: 'Override', ph: 'Justification (required)', btn: 'Override', clr: 'bg-amber-600' } }[mode];
    return (
      <div className="bg-white rounded-lg p-3 border border-gray-200">
        <h4 className="font-semibold text-gray-900 mb-2 text-sm">{cfg.title}</h4>
        {mode === 'override' && <div className="flex items-center gap-1 bg-amber-50 text-amber-700 p-2 rounded text-xs mb-2"><AlertTriangle size={12} />Bypasses policy controls</div>}
        <textarea className="w-full border border-gray-200 rounded p-2 text-sm mb-2" placeholder={cfg.ph} rows={2} value={input} onChange={(e) => setInput(e.target.value)} />
        <div className="flex justify-end gap-2">
          <button onClick={() => setMode(null)} className="px-3 py-1.5 border border-gray-200 rounded text-xs font-medium text-gray-600">Cancel</button>
          <button onClick={handleSubmit} disabled={loading || (mode !== 'approve' && !input.trim())} className={`px-3 py-1.5 rounded text-xs font-medium text-white ${cfg.clr} disabled:opacity-50 flex items-center gap-1`}>
            {loading && <Loader2 size={12} className="animate-spin" />}{cfg.btn}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="bg-white rounded-lg p-3 border border-gray-200">
      <div className="flex flex-wrap gap-2">
        <button onClick={() => setMode('approve')} className="flex items-center gap-1 px-3 py-1.5 bg-green-50 border border-green-200 text-green-700 rounded text-xs font-medium"><CheckCircle2 size={14} />Approve</button>
        <button onClick={() => setMode('reject')} className="flex items-center gap-1 px-3 py-1.5 bg-red-50 border border-red-200 text-red-700 rounded text-xs font-medium"><XCircle size={14} />Reject</button>
        <button className="flex items-center gap-1 px-3 py-1.5 bg-gray-50 border border-gray-200 text-gray-600 rounded text-xs font-medium"><MessageSquare size={14} />Info</button>
        {transaction.violation && <button onClick={() => setMode('override')} className="flex items-center gap-1 px-3 py-1.5 bg-amber-50 border border-amber-200 text-amber-700 rounded text-xs font-medium"><Shield size={14} />Override</button>}
      </div>
      {transaction.violation && <div className="flex items-center gap-1 mt-2 p-2 bg-red-50 rounded text-red-700 text-xs"><AlertTriangle size={12} />Policy violation</div>}
    </div>
  );
};

                    <div className="text-2xl font-bold font-mono my-2">{formatCurrency(selectedTx.amount)}</div>
                    <SLAWidget status={selectedTx.slaStatus} deadline={selectedTx.slaDeadline} />
                  </div>
                  <ApprovalActionBar transaction={selectedTx} onAction={handleAction} />
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'policies' && (
          <div>
            <div className="flex justify-between items-center mb-6">
              <h1 className="text-2xl font-bold">Policy Management</h1>
              <button className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium">+ Add Policy</button>
            </div>
            <div className="grid grid-cols-2 gap-4">{policies.map(p => <PolicyCard key={p.id} policy={p} onToggle={handleTogglePolicy} />)}</div>
          </div>
        )}
      </main>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(SightlineApp));
</script>
</body>
</html>
