<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback, useLayoutEffect, useReducer, Fragment } = React;




const AgentIdentityRegistry = () => {
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [showRevokeModal, setShowRevokeModal] = useState(false);
  const [filter, setFilter] = useState({ status: 'all', type: 'all' });

  const agents = [

        { date: '2025-02-11 16:00', type: 'SCOPE_CHANGE', detail: 'Daily limit $40K→$50K', status: 'by CFO' },
        { date: '2025-02-01 10:00', type: 'AUDIT_COMPLETED', detail: 'Quarterly review', status: 'passed' },
        { date: '2025-01-15 09:00', type: 'REGISTERED', detail: 'Initial registration', status: 'by VP Growth' }
      ]
    },
    {
      id: 'AGT-CONTENT-002',
      name: 'Creative Generator',
      type: 'PROPOSAL_BASED',
      status: 'ACTIVE',
      owner: 'Content Lead',
      sponsor: 'CMO',
      created: '2025-01-20',
      lastAudit: '2025-02-05',
      scope: {
        canPropose: true,
        canExecute: false,
        canApprove: false,
        dailyLimit: 0,
        monthlyLimit: 0,
        dataAccess: ['Brand Assets', 'Style Guide', 'Product Catalog']
      },
      spend: {
        daily: 0,
        monthly: 0,
        ytd: 0
      },
      credentials: {
        keyLast4: '9k3m',
        expires: '2025-02-28',
        lastRotated: '2025-02-01'
      },
      events: [
        { date: '2025-02-12 11:30', type: 'PROPOSAL_CREATED', detail: '12 ad variants', status: 'pending review' },
        { date: '2025-02-12 08:45', type: 'PROPOSAL_APPROVED', detail: '8 email headers', status: 'by Content Lead' },
        { date: '2025-02-11 14:20', type: 'PROPOSAL_CREATED', detail: '24 social posts', status: 'approved' }
      ]
    },
    {
      id: 'AGT-SUPPORT-003',
      name: 'Customer Service Bot',
      type: 'HUMAN_IN_LOOP',
      status: 'SUSPENDED',
      owner: 'Support Manager',
      sponsor: 'VP Ops',
      created: '2024-11-01',
      lastAudit: '2025-01-15',
      suspendedAt: '2025-02-12 14:14',
      suspendedBy: 'VP Ops',
      suspendReason: 'Error rate exceeded threshold - 3 customer complaints in 24h',
      scope: {
        canPropose: true,
        canExecute: true,
        canApprove: false,
        dailyLimit: 5000,
        monthlyLimit: 25000,
        dataAccess: ['Customer Records', 'Order History', 'Refund Queue']
      },
      spend: {
        daily: 840,
        monthly: 12400,
        ytd: 45000
      },
      credentials: {
        keyLast4: '2p8q',
        expires: '2025-04-30',
        lastRotated: '2025-01-01'
      },
      events: [
        { date: '2025-02-12 14:14', type: 'SUSPENDED', detail: 'Error rate threshold', status: 'by VP Ops' },
        { date: '2025-02-12 13:45', type: 'INCIDENT_FLAGGED', detail: 'Customer complaint #3', status: 'threshold breached' },
        { date: '2025-02-12 11:20', type: 'REFUND_EXECUTED', detail: '$125 order #4521', status: 'within scope' },
        { date: '2025-02-12 09:30', type: 'INCIDENT_FLAGGED', detail: 'Customer complaint #2', status: 'warning' }
      ]
    },
    {
      id: 'AGT-PRICING-004',
      name: 'Dynamic Pricing Engine',
      type: 'AUTONOMOUS',
      status: 'ACTIVE',
      owner: 'Revenue Manager',
      sponsor: 'CFO',
      created: '2024-12-01',
      lastAudit: '2025-02-10',
      scope: {
        canPropose: true,
        canExecute: true,
        canApprove: false,
        dailyLimit: 0,
        monthlyLimit: 0,
        dataAccess: ['Product Catalog', 'Competitor Prices', 'Inventory Levels'],
        constraints: ['Max discount 25%', 'Min margin 15%', 'No price changes within 24h of previous']
      },
      spend: {
        daily: 0,
        monthly: 0,
        ytd: 0
      },
      credentials: {
        keyLast4: '5t7y',
        expires: '2025-05-31',
        lastRotated: '2025-02-01'
      },
      events: [
        { date: '2025-02-12 15:00', type: 'PRICE_ADJUSTED', detail: 'SKU-1234 $49→$44', status: 'within constraints' },
        { date: '2025-02-12 14:30', type: 'PRICE_BLOCKED', detail: 'SKU-5678 would breach min margin', status: 'constraint enforced' },
        { date: '2025-02-12 12:00', type: 'PRICE_ADJUSTED', detail: '47 SKUs batch update', status: 'within constraints' }
      ]
    }
  ];

  const filteredAgents = agents.filter(agent => {
    if (filter.status !== 'all' && agent.status !== filter.status) return false;
    if (filter.type !== 'all' && agent.type !== filter.type) return false;
    return true;
  });

  const getStatusColor = (status) => {
    switch (status) {
      case 'ACTIVE': return 'bg-green-100 text-green-800 border-green-200';
      case 'SUSPENDED': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
      case 'REVOKED': return 'bg-red-100 text-red-800 border-red-200';
      default: return 'bg-gray-100 text-gray-800 border-gray-200';
    }
  };

  const getTypeColor = (type) => {
    switch (type) {
      case 'AUTONOMOUS': return 'bg-purple-100 text-purple-800';
      case 'PROPOSAL_BASED': return 'bg-blue-100 text-blue-800';
      case 'HUMAN_IN_LOOP': return 'bg-orange-100 text-orange-800';
      default: return 'bg-gray-100 text-gray-800';
    }
  };

  const getEventIcon = (type) => {
    switch (type) {
      case 'SPEND_EXECUTED': return '💰';
      case 'SCOPE_CHANGE': return '🔧';
      case 'AUDIT_COMPLETED': return '✅';
      case 'REGISTERED': return '📝';
      case 'SUSPENDED': return '⚠️';
      case 'INCIDENT_FLAGGED': return '🚨';
      case 'REFUND_EXECUTED': return '↩️';
      case 'PROPOSAL_CREATED': return '📋';
      case 'PROPOSAL_APPROVED': return '✓';
      case 'PRICE_ADJUSTED': return '💲';
      case 'PRICE_BLOCKED': return '🚫';
      default: return '•';
    }
  };

  const getDaysUntilExpiry = (dateStr) => {
    const expiry = new Date(dateStr);
    const today = new Date();
    const diff = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
    return diff;
  };

  const RevokeModal = ({ agent, onClose }) => (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div className="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4">
        <div className="p-6 border-b border-gray-200">
          <h3 className="text-lg font-semibold text-gray-900">Revoke Agent</h3>
        </div>
        <div className="p-6">
          <div className="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
            <p className="text-sm text-red-800 font-medium">⚠️ This will immediately:</p>
            <ul className="text-sm text-red-700 mt-2 space-y-1">
              <li>• Invalidate all credentials</li>
              <li>• Block all pending actions</li>
              <li>• Notify owner and sponsor</li>
              <li>• Create permanent audit record</li>
            </ul>
          </div>
          <div className="mb-4">
            <p className="text-sm text-gray-600">Agent:</p>
            <p className="font-medium text-gray-900">{agent.id} ({agent.name})</p>
          </div>
          <div className="mb-4">
            <label className="block text-sm font-medium text-gray-700 mb-1">Reason</label>
            <select className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
              <option>Exceeded error threshold</option>
              <option>Security concern</option>
              <option>Policy violation</option>
              <option>Project completed</option>
              <option>Other</option>
            </select>
          </div>
          <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
            <p className="text-sm text-yellow-800 font-medium">Pending Actions (will be blocked):</p>
            <ul className="text-sm text-yellow-700 mt-2">
              <li>• 2 refund proposals ($840 total)</li>
              <li>• 1 discount approval request</li>
            </ul>
          </div>
        </div>
        <div className="p-6 border-t border-gray-200 flex justify-end gap-3">
          <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</button>
          <button className="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700">Revoke Agent Permanently</button>
        </div>
      </div>
    </div>
  );

  const AgentDetail = ({ agent, onBack }) => (
    <div className="space-y-6">
      <div className="flex items-center gap-4">
        <button onClick={onBack} className="text-gray-500 hover:text-gray-700">← Back</button>
      </div>
      
      <div className="flex items-start justify-between">
        <div>
          <div className="flex items-center gap-3">
            <h2 className="text-2xl font-bold text-gray-900">{agent.id}</h2>
            <span className={`px-3 py-1 rounded-full text-sm font-medium border ${getStatusColor(agent.status)}`}>
              {agent.status === 'ACTIVE' ? '●' : '○'} {agent.status}
            </span>
          </div>
          <p className="text-gray-600 mt-1">{agent.name}</p>
        </div>
        <span className={`px-3 py-1 rounded-full text-sm font-medium ${getTypeColor(agent.type)}`}>
          {agent.type.replace('_', ' ')}
        </span>
      </div>

      {agent.status === 'SUSPENDED' && (
        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
          <p className="text-sm font-medium text-yellow-800">⚠️ SUSPENDED {agent.suspendedAt}</p>
          <p className="text-sm text-yellow-700 mt-1">By: {agent.suspendedBy}</p>
          <p className="text-sm text-yellow-700">Reason: {agent.suspendReason}</p>
          <div className="flex gap-2 mt-3">
            <button className="px-3 py-1.5 text-sm bg-green-600 text-white rounded hover:bg-green-700">Reinstate</button>
            <button onClick={() => setShowRevokeModal(true)} className="px-3 py-1.5 text-sm bg-red-600 text-white rounded hover:bg-red-700">Revoke</button>
            <button className="px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50">View Incident</button>
          </div>
        </div>
      )}

      <div className="grid grid-cols-3 gap-6">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Identity</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Owner</span><span className="text-gray-900">{agent.owner}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Sponsor</span><span className="text-gray-900">{agent.sponsor}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Created</span><span className="text-gray-900">{agent.created}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Last Audit</span><span className="text-gray-900">{agent.lastAudit}</span></div>
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Scope</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Can Propose</span><span className={agent.scope.canPropose ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canPropose ? '✓' : '✗'}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Can Execute</span><span className={agent.scope.canExecute ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canExecute ? '✓' : '✗'}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Can Approve</span><span className={agent.scope.canApprove ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canApprove ? '✓' : '✗'}</span></div>
            {agent.scope.dailyLimit > 0 && <div className="flex justify-between"><span className="text-gray-500">Daily Limit</span><span className="text-gray-900">${agent.scope.dailyLimit.toLocaleString()}</span></div>}
            {agent.scope.monthlyLimit > 0 && <div className="flex justify-between"><span className="text-gray-500">Monthly Limit</span><span className="text-gray-900">${agent.scope.monthlyLimit.toLocaleString()}</span></div>}
          </div>
          <div className="mt-3 pt-3 border-t border-gray-100">
            <p className="text-xs text-gray-500 mb-1">Data Access</p>
            <div className="flex flex-wrap gap-1">
              {agent.scope.dataAccess.map((access, i) => (
                <span key={i} className="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">{access}</span>
              ))}
            </div>
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Credentials</h3>

            <div className="flex justify-between">
              <span className="text-gray-500">Expires</span>
              <span className={getDaysUntilExpiry(agent.credentials.expires) < 30 ? 'text-orange-600' : 'text-gray-900'}>
                {agent.credentials.expires} ({getDaysUntilExpiry(agent.credentials.expires)}d)
              </span>
            </div>
            <div className="flex justify-between"><span className="text-gray-500">Last Rotated</span><span className="text-gray-900">{agent.credentials.lastRotated}</span></div>
          </div>
          <button className="mt-3 w-full px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50">Rotate Now</button>
        </div>
      </div>

      {agent.scope.dailyLimit > 0 && (
        <div className="bg-white border border-gray-200 rounded-lg p-4">

          <div className="space-y-3">
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span className="text-gray-600">Daily</span>
                <span className="text-gray-900">${agent.spend.daily.toLocaleString()} / ${agent.scope.dailyLimit.toLocaleString()}</span>
              </div>
              <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div className="h-full bg-blue-500 rounded-full" style={{ width: `${(agent.spend.daily / agent.scope.dailyLimit) * 100}%` }}></div>
              </div>
            </div>
            <div>
              <div className="flex justify-between text-sm mb-1">

                <span className="text-gray-900">${agent.spend.monthly.toLocaleString()} / ${agent.scope.monthlyLimit.toLocaleString()}</span>

              <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div className="h-full bg-blue-500 rounded-full" style={{ width: `${(agent.spend.monthly / agent.scope.monthlyLimit) * 100}%` }}></div>
              </div>
            </div>
            <div className="flex justify-between text-sm pt-2 border-t border-gray-100">
              <span className="text-gray-600">YTD</span>
              <span className="font-medium text-gray-900">${agent.spend.ytd.toLocaleString()}</span>
            </div>
          </div>
        </div>
      )}

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-sm font-medium text-gray-500">Lifecycle Events</h3>
          <button className="text-sm text-blue-600 hover:text-blue-800">View All →</button>
        </div>
        <div className="space-y-2">
          {agent.events.map((event, i) => (
            <div key={i} className="flex items-start gap-3 py-2 border-b border-gray-50 last:border-0">
              <span className="text-lg">{getEventIcon(event.type)}</span>
              <div className="flex-1 min-w-0">
                <div className="flex justify-between">
                  <span className="text-sm font-medium text-gray-900">{event.type.replace(/_/g, ' ')}</span>
                  <span className="text-xs text-gray-500">{event.date}</span>
                </div>
                <p className="text-sm text-gray-600">{event.detail}</p>
                <span className="text-xs text-gray-500">{event.status}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap-3">
        <button onClick={() => setShowRevokeModal(true)} className="px-4 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50">
          {agent.status === 'SUSPENDED' ? 'Revoke Agent' : 'Suspend Agent'}
        </button>
        <button className="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">Modify Scope</button>
        <button className="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">Transfer Ownership</button>
      </div>

      {showRevokeModal && <RevokeModal agent={agent} onClose={() => setShowRevokeModal(false)} />}
    </div>
  );

  const AgentList = () => (
    <div className="space-y-6">
      <div className="flex justify-between items-center">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Agent Registry</h1>
          <p className="text-gray-500 mt-1">Manage agent identities, scopes, and credentials</p>
        </div>
        <button className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">
          + Register Agent
        </button>
      </div>

      <div className="flex gap-4 items-center bg-white border border-gray-200 rounded-lg p-4">
        <div>
          <label className="text-xs text-gray-500 block mb-1">Status</label>
          <select 
            value={filter.status} 
            onChange={(e) => setFilter({...filter, status: e.target.value})}
            className="border border-gray-300 rounded px-3 py-1.5 text-sm"
          >
            <option value="all">All</option>
            <option value="ACTIVE">Active</option>
            <option value="SUSPENDED">Suspended</option>
            <option value="REVOKED">Revoked</option>
          </select>
        </div>
        <div>
          <label className="text-xs text-gray-500 block mb-1">Type</label>
          <select 
            value={filter.type} 
            onChange={(e) => setFilter({...filter, type: e.target.value})}
            className="border border-gray-300 rounded px-3 py-1.5 text-sm"
          >
            <option value="all">All</option>
            <option value="AUTONOMOUS">Autonomous</option>
            <option value="PROPOSAL_BASED">Proposal Based</option>
            <option value="HUMAN_IN_LOOP">Human in Loop</option>
          </select>
        </div>
        <div className="flex-1">
          <label className="text-xs text-gray-500 block mb-1">Search</label>
          <input type="text" placeholder="Search agents..." className="w-full border border-gray-300 rounded px-3 py-1.5 text-sm" />
        </div>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Total Agents</p>
          <p className="text-2xl font-bold text-gray-900">{agents.length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Active</p>
          <p className="text-2xl font-bold text-green-600">{agents.filter(a => a.status === 'ACTIVE').length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Suspended</p>
          <p className="text-2xl font-bold text-yellow-600">{agents.filter(a => a.status === 'SUSPENDED').length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Creds Expiring &lt;30d</p>
          <p className="text-2xl font-bold text-orange-600">{agents.filter(a => getDaysUntilExpiry(a.credentials.expires) < 30).length}</p>
        </div>
      </div>

      <div className="space-y-3">
        {filteredAgents.map(agent => (
          <div 
            key={agent.id} 
            onClick={() => setSelectedAgent(agent)}
            className="bg-white border border-gray-200 rounded-lg p-4 hover:border-blue-300 hover:shadow-sm cursor-pointer transition-all"
          >
            <div className="flex items-start justify-between">
              <div className="flex items-start gap-4">
                <div className={`w-3 h-3 rounded-full mt-1.5 ${agent.status === 'ACTIVE' ? 'bg-green-500' : agent.status === 'SUSPENDED' ? 'bg-yellow-500' : 'bg-red-500'}`}></div>
                <div>
                  <div className="flex items-center gap-2">
                    <h3 className="font-medium text-gray-900">{agent.id}</h3>
                    <span className={`px-2 py-0.5 rounded text-xs font-medium ${getTypeColor(agent.type)}`}>
                      {agent.type.replace('_', ' ')}
                    </span>
                  </div>
                  <p className="text-sm text-gray-600">{agent.name}</p>
                  <p className="text-xs text-gray-500 mt-1">Owner: {agent.owner}</p>
                </div>
              </div>
              <div className="text-right">
                {agent.scope.dailyLimit > 0 ? (
                  <div>
                    <p className="text-sm text-gray-900">
                      ${agent.spend.daily.toLocaleString()} / ${agent.scope.dailyLimit.toLocaleString()}
                    </p>
                    <div className="w-32 h-1.5 bg-gray-100 rounded-full mt-1">
                      <div 
                        className="h-full bg-blue-500 rounded-full" 
                        style={{ width: `${Math.min((agent.spend.daily / agent.scope.dailyLimit) * 100, 100)}%` }}
                      ></div>
                    </div>
                    <p className="text-xs text-gray-500 mt-1">Daily spend</p>
                  </div>
                ) : (
                  <div>
                    <p className="text-sm text-gray-600">No spend limits</p>
                    <p className="text-xs text-gray-500">Actions today: {Math.floor(Math.random() * 100) + 50}</p>
                  </div>
                )}
              </div>
            </div>
            {agent.status === 'SUSPENDED' && (
              <div className="mt-3 pt-3 border-t border-gray-100">
                <p className="text-sm text-yellow-700">
                  ⚠️ Suspended {agent.suspendedAt} by {agent.suspendedBy}
                </p>
                <p className="text-xs text-yellow-600">{agent.suspendReason}</p>
              </div>
            )}
            <div className="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
              <p className="text-xs text-gray-500">
                Creds expire: {agent.credentials.expires} ({getDaysUntilExpiry(agent.credentials.expires)} days)
              </p>
              <div className="flex gap-2">
                <button onClick={(e) => { e.stopPropagation(); }} className="px-3 py-1 text-xs text-gray-600 border border-gray-200 rounded hover:bg-gray-50">
                  {agent.status === 'ACTIVE' ? 'Suspend' : 'Reinstate'}
                </button>
                <button onClick={(e) => { e.stopPropagation(); }} className="px-3 py-1 text-xs text-gray-600 border border-gray-200 rounded hover:bg-gray-50">
                  Edit
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-50 p-6">
      <div className="max-w-6xl mx-auto">
        {selectedAgent ? (
          <AgentDetail agent={selectedAgent} onBack={() => setSelectedAgent(null)} />
        ) : (
          <AgentList />
        )}
      </div>
    </div>
  );
};

// export default AgentIdentityRegistry;

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(AgentIdentityRegistry));
</script>
</body>
</html>
