// ─── State Machine Visualization ───
function StateMachine({ states, transitions, color, isObligation }) {
  const statePositions = {};
  
  if (isObligation) {
    // Special layout for obligation - the complex one
    const positions = {
      draft: { x: 60, y: 30 },
      bound: { x: 200, y: 30 },
      eligible: { x: 360, y: 30 },
      settled: { x: 520, y: 30 },
      reconciled: { x: 660, y: 30 },
      blocked: { x: 360, y: 120 },
      cancelled: { x: 200, y: 120 },
    };
    Object.assign(statePositions, positions);
  } else {
    const totalWidth = 700;
    const spacing = totalWidth / (states.length + 1);
    states.forEach((s, i) => {
      statePositions[s] = { x: spacing * (i + 1), y: 40 };
    });
  }
  
  return (
    <svg width="100%" viewBox="0 0 740 ${isObligation ? 160 : 80}" style={{ maxHeight: isObligation ? 160 : 80, overflow: "visible" }}>
      {/* Transitions */}
      {transitions.map((t, i) => {
        const from = statePositions[t.from];
        const to = statePositions[t.to];
        if (!from || !to) return null;
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = dx / len;
        const ny = dy / len;
        const startX = from.x + nx * 38;
        const startY = from.y + ny * 14;
        const endX = to.x - nx * 38;
        const endY = to.y - ny * 14;
        
        // Curved path for blocked transitions
        const isCurved = (t.from === "blocked" && t.to === "eligible") || (t.from === "settled" && t.to === "blocked");
        const path = isCurved
          ? `M ${startX} ${startY} Q ${(startX + endX) / 2} ${Math.min(startY, endY) + (t.from === "blocked" ? -30 : 40)} ${endX} ${endY}`
          : `M ${startX} ${startY} L ${endX} ${endY}`;
        
        return (
          <g key={i}>
            <defs>
              <marker id={`arrow-${i}-${color.replace('#','')}`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill={color + "80"} />
              </marker>
            </defs>
            <path d={path} fill="none" stroke={color + "40"} strokeWidth="1.5" markerEnd={`url(#arrow-${i}-${color.replace('#','')})`} />
            {t.label && (
              <text x={(startX + endX) / 2} y={(startY + endY) / 2 - 6} fill={COLORS.textMuted} fontSize="8" textAnchor="middle" fontFamily={FONTS.mono}>{t.label}</text>
            )}
          </g>
        );
      })}
      
      {/* States */}
      {states.map((s) => {
        const pos = statePositions[s];
        if (!pos) return null;
        return (
          <g key={s}>
            <rect x={pos.x - 36} y={pos.y - 12} width="72" height="24" rx="4" fill={color + "10"} stroke={color + "30"} strokeWidth="1" />
            <text x={pos.x} y={pos.y + 4} fill={color} fontSize="9" textAnchor="middle" fontFamily={FONTS.mono} fontWeight="500">{s}</text>
          </g>
        );
      })}
    </svg>
  );
}

  const nodes = [
    { id: "actor", label: "Actor", x: 70, y: 40, color: COLORS.accent },
    { id: "policy", label: "PolicyVersion", x: 70, y: 120, color: COLORS.purple },
    { id: "grant", label: "AuthorityGrant", x: 70, y: 200, color: COLORS.amber },
    { id: "intent", label: "Intent", x: 300, y: 40, color: COLORS.green },
    { id: "obligation", label: "Obligation", x: 300, y: 120, color: "#ff6b6b" },
    { id: "receipt", label: "SettlementReceipt", x: 530, y: 120, color: "#4ade80" },
    { id: "exception", label: "ExceptionCase", x: 530, y: 200, color: COLORS.red },
  ];
  
  const edges = [
    { from: "actor", to: "intent", label: "originates" },
    { from: "actor", to: "obligation", label: "binds/approves" },
    { from: "policy", to: "obligation", label: "governs" },
    { from: "grant", to: "obligation", label: "authorizes" },
    { from: "intent", to: "obligation", label: "becomes" },
    { from: "obligation", to: "receipt", label: "settles" },
    { from: "receipt", to: "exception", label: "mismatch" },
    { from: "obligation", to: "exception", label: "blocked" },
  ];
  
  const getNode = (id) => nodes.find(n => n.id === id);
  
  return (
    <svg width="100%" viewBox="0 0 700 260" style={{ maxHeight: 260 }}>
      {/* Edges */}
      {edges.map((e, i) => {
        const from = getNode(e.from);
        const to = getNode(e.to);
        const midX = (from.x + to.x) / 2;
        const midY = (from.y + to.y) / 2;
        return (
          <g key={i}>
            <line x1={from.x + 60} y1={from.y + 14} x2={to.x - 6} y2={to.y + 14} stroke={COLORS.border} strokeWidth="1" strokeDasharray="4 3" />
            <text x={midX + 28} y={midY + 8} fill={COLORS.textDim} fontSize="8" textAnchor="middle" fontFamily={FONTS.mono}>{e.label}</text>
          </g>
        );
      })}
      {/* Nodes */}
      {nodes.map((n) => (
        <g key={n.id}>
          <rect x={n.x} y={n.y} width="120" height="28" rx="6" fill={n.color + "12"} stroke={n.color + "40"} strokeWidth="1" />
          <text x={n.x + 60} y={n.y + 18} fill={n.color} fontSize="10" textAnchor="middle" fontFamily={FONTS.mono} fontWeight="500">{n.label}</text>
        </g>
      ))}
    </svg>
  );
}
