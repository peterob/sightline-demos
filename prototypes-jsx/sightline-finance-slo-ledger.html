        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Access Reviews</p>
          <p className="text-2xl font-bold text-green-600">{controlMetrics.accessReview.agentsReviewed}/{controlMetrics.accessReview.totalAgents}</p>
          <p className="text-xs text-gray-500 mt-1">Last: {controlMetrics.accessReview.lastReview}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Credential Rotation</p>
          <p className="text-2xl font-bold text-green-600">{controlMetrics.credentialRotation.actual}%</p>
          <p className="text-xs text-gray-500 mt-1">Avg: {controlMetrics.credentialRotation.avgRotationDays} days</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Audit Trail Coverage</p>
          <p className="text-2xl font-bold text-green-600">{controlMetrics.auditTrailCompleteness.actual}%</p>
          <p className="text-xs text-gray-500 mt-1">{controlMetrics.auditTrailCompleteness.missing} gaps</p>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <h3 className="text-lg font-medium text-gray-900 mb-4">Segregation of Duties</h3>
        <div className="space-y-2">
          {controlMetrics.segregationOfDuties.details.map((item, i) => (
            <div key={i} className="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
              <div>
                <p className="text-sm font-medium text-gray-900">{item.agent}</p>
                <p className="text-xs text-gray-500">{item.control}</p>
              </div>
              <span className={`px-2 py-1 rounded text-xs font-medium ${getStatusColor(item.status)}`}>
                {item.status}
              </span>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <h3 className="text-lg font-medium text-gray-900 mb-4">Revoke Velocity</h3>
        <p className="text-sm text-gray-500 mb-4">Target: &lt; {controlMetrics.revokeVelocity.target} hours</p>
        <div className="space-y-3">
          {controlMetrics.revokeVelocity.events.map((event, i) => (
            <div key={i} className="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
              <div>
                <p className="text-sm font-medium text-gray-900">{event.agent}</p>
                <p className="text-xs text-gray-500">{event.date}</p>
              </div>
              <p className="text-sm font-medium text-green-600">{event.velocity} min ✓</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const Overview = () => (
    <div className="space-y-6">
      <div className="grid grid-cols-5 gap-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Total SLOs</p>
          <p className="text-3xl font-bold text-gray-900">{summary.total}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">On Track</p>
          <p className="text-3xl font-bold text-green-600">{summary.onTrack}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">At Risk</p>
          <p className="text-3xl font-bold text-yellow-600">{summary.atRisk}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Breached</p>
          <p className="text-3xl font-bold text-red-600">{summary.breached}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Fee Savings</p>
          <p className="text-3xl font-bold text-green-600">${((summary.baseFees - summary.adjustedFees) / 1000).toFixed(1)}K</p>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-medium text-gray-900">Fee Summary</h3>
          <span className="text-sm text-gray-500">{period}</span>
        </div>
        <div className="grid grid-cols-3 gap-8">
          <div>
            <p className="text-sm text-gray-500">Base Fees</p>
            <p className="text-2xl font-bold text-gray-900">${summary.baseFees.toLocaleString()}</p>
          </div>
          <div>
            <p className="text-sm text-gray-500">Adjustments</p>
            <p className="text-2xl font-bold text-green-600">-${(summary.baseFees - summary.adjustedFees).toLocaleString()}</p>
          </div>
          <div>
            <p className="text-sm text-gray-500">Net Payable</p>
            <p className="text-2xl font-bold text-blue-600">${summary.adjustedFees.toLocaleString()}</p>
          </div>
        </div>
      </div>

      <div className="space-y-4">
        {agents.map(agent => (
          <div key={agent.id} className="bg-white border border-gray-200 rounded-lg p-4">
            <div className="flex justify-between items-start mb-4">
              <div>
                <div className="flex items-center gap-2">
                  <h4 className="font-medium text-gray-900">{agent.id}</h4>
                  <span className={`px-2 py-0.5 rounded text-xs font-medium ${getFunctionColor(agent.function)}`}>
                    {getFunctionLabel(agent.function)}
                  </span>
                </div>
                <p className="text-sm text-gray-600">{agent.name}</p>
                <p className="text-xs text-gray-500">Vendor: {agent.vendor}</p>
              </div>
              <div className="text-right text-sm">
                <p className="font-medium text-gray-900">${agent.slos.reduce((s, slo) => s + slo.adjustedFee, 0).toLocaleString()}</p>
                {agent.slos.reduce((s, slo) => s + slo.baseFee, 0) !== agent.slos.reduce((s, slo) => s + slo.adjustedFee, 0) && (
                  <p className="text-green-600 text-xs">
                    Saves ${(agent.slos.reduce((s, slo) => s + slo.baseFee, 0) - agent.slos.reduce((s, slo) => s + slo.adjustedFee, 0)).toLocaleString()}
                  </p>
                )}
              </div>
            </div>
            
            <div className="space-y-2">
              {agent.slos.map(slo => (
                <div 
                  key={slo.id} 
                  onClick={() => setSelectedSLO({ ...slo, agentId: agent.id, agentName: agent.name, vendor: agent.vendor, function: agent.function })}
                  className="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer"
                >
                  <div className="flex items-center gap-3">
                    <span className={`px-2 py-0.5 rounded text-xs font-medium ${getTypeColor(slo.type)}`}>
                      {slo.type}
                    </span>
                    <span className="text-sm font-medium text-gray-900">{slo.metric}</span>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="w-32">
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-gray-500">{slo.actual}{slo.unit}</span>
                        <span className="text-gray-400">/ {slo.target}{slo.unit}</span>
                      </div>
                      <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
                        <div 
                          className={`h-full rounded-full ${slo.status === 'ON_TRACK' ? 'bg-green-500' : slo.status === 'AT_RISK' ? 'bg-yellow-500' : 'bg-red-500'}`}
                          style={{ width: `${getProgressWidth(slo.target, slo.actual, slo.inverse)}%` }}
                        ></div>
                      </div>
                    </div>
                    <span className={`px-2 py-1 rounded text-xs font-medium ${getStatusColor(slo.status)}`}>
                      {getStatusIcon(slo.status)} {slo.status.replace('_', ' ')}
                    </span>
                    <div className="text-right w-20">
                      <p className="text-sm font-medium text-gray-900">${slo.adjustedFee.toLocaleString()}</p>
                      {slo.baseFee !== slo.adjustedFee && (
                        <p className="text-xs text-green-600">-${(slo.baseFee - slo.adjustedFee).toLocaleString()}</p>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-50 p-6">
      <div className="max-w-7xl mx-auto">
        {selectedSLO ? (
          <SLODetail slo={selectedSLO} onBack={() => setSelectedSLO(null)} />
        ) : (
          <div className="space-y-6">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Finance Agent SLO Ledger</h1>
                <p className="text-gray-500 mt-1">Track outsourced F&A agent performance with SOX controls</p>
              </div>
              <div className="flex items-center gap-4">
                <select 
                  value={period} 
                  onChange={(e) => setPeriod(e.target.value)}
                  className="border border-gray-300 rounded-lg px-3 py-2 text-sm"
                >
                  <option>Feb 2025</option>
                  <option>Jan 2025</option>
                  <option>Dec 2024</option>
                </select>
                <button className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">
                  Export for Audit
                </button>
              </div>
            </div>

            <div className="flex gap-2 border-b border-gray-200">
              <button 
                onClick={() => setActiveTab('overview')}
                className={`px-4 py-2 text-sm font-medium border-b-2 -mb-px ${activeTab === 'overview' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
              >
                SLO Overview
              </button>
              <button 
                onClick={() => setActiveTab('controls')}
                className={`px-4 py-2 text-sm font-medium border-b-2 -mb-px ${activeTab === 'controls' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
              >
                SOX Controls
              </button>
            </div>

            {activeTab === 'overview' ? <Overview /> : <ControlsTab />}
          </div>
        )}
      </div>
    </div>
  );
};

// export default FinanceSLOLedger;

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(FinanceSLOLedger));
</script>
</body>
</html>
