  DISPUTE_RESOLUTION: "Dispute Resolved",
  PAYMENT_INSTRUCTION: "Payment Routed",
  SETTLEMENT_COMPLETE: "Settlement Final",
};

const formatCurrency = (n) => "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const formatDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + " " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
};
const formatPct = (n) => (n * 100).toFixed(1) + "%";

// ═══════════════════════════════════════════════════════════════════
// Components
// ═══════════════════════════════════════════════════════════════════

const HashChip = ({ hash, label }) => (
  <span style={{
    display: "inline-flex", alignItems: "center", gap: 4,
    background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
    borderRadius: 4, padding: "2px 8px", fontFamily: "'IBM Plex Mono', monospace",
    fontSize: 11, color: "rgba(255,255,255,0.45)", letterSpacing: 0.5
  }}>
    {label && <span style={{ color: "rgba(255,255,255,0.25)", marginRight: 2 }}>{label}</span>}
    <span>{hash}</span>
  </span>
);

const SignatureBadge = ({ sig }) => {
  const isAuto = sig.includes("auto") || sig.includes("bot") || sig.includes("monitor");
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 3,
      background: isAuto ? "rgba(155,111,232,0.1)" : "rgba(45,127,249,0.1)",

      color: isAuto ? "#B89AEF" : "#6BA3F9", fontFamily: "'IBM Plex Mono', monospace"
    }}>
      <span style={{ fontSize: 8 }}>{isAuto ? "⚙" : "✍"}</span> {sig}
    </span>
  );
};

const PartyDot = ({ party, size = 8 }) => (
  <span style={{
    display: "inline-block", width: size, height: size, borderRadius: "50%",
    background: PARTIES[party]?.color || "#666", flexShrink: 0
  }} />
);

const EventCard = ({ event, isSelected, onClick, index }) => {
  const party = PARTIES[event.party];
  const isDispute = event.type.includes("DISPUTE");
  const isSettlement = event.type === "SETTLEMENT_COMPLETE";
  
  return (
    <div
      onClick={onClick}
      style={{
        padding: "14px 16px", cursor: "pointer", position: "relative",
        background: isSelected ? "rgba(255,255,255,0.05)" : "transparent",
        borderLeft: `2px solid ${isDispute ? "#E8553A" : isSettlement ? "#18A86B" : "rgba(255,255,255,0.08)"}`,
        transition: "all 0.2s ease",
        borderBottom: "1px solid rgba(255,255,255,0.04)",
      }}
    >
      {/* Timeline connector */}
      <div style={{
        position: "absolute", left: -5, top: 18, width: 8, height: 8,
        borderRadius: "50%", background: party?.color || "#666",
        border: isSelected ? "2px solid #fff" : "2px solid #131820",
        zIndex: 2, transition: "all 0.2s"
      }} />
      
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <span style={{
              fontSize: 9, fontFamily: "'IBM Plex Mono', monospace",
              color: "rgba(255,255,255,0.25)", letterSpacing: 1, textTransform: "uppercase"
            }}>{event.id}</span>
            <span style={{
              fontSize: 9, color: party?.color, fontWeight: 600,
              letterSpacing: 0.5, textTransform: "uppercase"
            }}>{party?.name}</span>
          </div>
          <div style={{
            fontSize: 13, fontWeight: 600, color: isDispute ? "#E8553A" : "#E8E8ED",
            marginBottom: 3, letterSpacing: -0.2
          }}>
            {isDispute && "⚠ "}{EVENT_LABELS[event.type] || event.type}
          </div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>
            {formatDate(event.ts)}
          </div>
        </div>
        {event.data.netAmount && (
          <div style={{
            fontSize: 13, fontWeight: 700, color: "#E8E8ED",
            fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap"

            {formatCurrency(event.data.netAmount)}

            fontSize: 13, fontWeight: 700, color: "#F5A623",

          border: "1px solid rgba(245,166,35,0.15)", padding: 14, marginBottom: 16

            Provenance Chain

            fontFamily: "'IBM Plex Mono', monospace", fontSize: 12,

      <div style={{
        background: "rgba(255,255,255,0.02)", borderRadius: 8,
        border: "1px solid rgba(255,255,255,0.06)", padding: 14
      }}>
        <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>
          Event Data
        </div>
        {Object.entries(event.data).filter(([k]) => k !== "proofChain").map(([key, value]) => (

            display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.03)",

              fontSize: 11, color: "rgba(255,255,255,0.35)",

                ? "#9B6FE8" : "#E8E8ED",
              fontFamily: typeof value === "number" || key.includes("hash") || key.includes("Hash") || key.includes("tx")
                ? "'IBM Plex Mono', monospace" : "inherit",
              textAlign: "right", wordBreak: "break-all", maxWidth: "65%"
            }}>
              {typeof value === "number" && key.includes("mount") ? formatCurrency(value)
                : typeof value === "number" && key.includes("tilization") ? formatPct(value)
                : typeof value === "number" && key.includes("Credit") ? formatCurrency(value)
                : Array.isArray(value) ? value.join(", ")
                : String(value)}
            </span>
          </div>
        ))}
      </div>
    </div>

};

        <div style={{
          fontSize: 10, color: "rgba(255,255,255,0.3)", textTransform: "uppercase",
          letterSpacing: 1.5, marginBottom: 12, fontWeight: 700
        }}>
          Settlement Status
        </div>
        <div style={{
          background: "rgba(24,168,107,0.06)", border: "1px solid rgba(24,168,107,0.2)",
          borderRadius: 8, padding: 14
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Week 1 — Settled</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#18A86B", fontFamily: "'IBM Plex Mono', monospace" }}>
              {formatCurrency(121250.21)}
            </span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Week 2 — Dispute Resolved</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#F5A623", fontFamily: "'IBM Plex Mono', monospace" }}>
              {formatCurrency(109991.56)}
            </span>
          </div>
          <div style={{
            borderTop: "1px solid rgba(255,255,255,0.08)", marginTop: 10, paddingTop: 10,
            display: "flex", justifyContent: "space-between"
          }}>
            <span style={{ fontSize: 13, color: "#E8E8ED", fontWeight: 600 }}>Total</span>
            <span style={{ fontSize: 16, fontWeight: 700, color: "#E8E8ED", fontFamily: "'IBM Plex Mono', monospace" }}>
              {formatCurrency(121250.21 + 109991.56)}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// Main App
// ═══════════════════════════════════════════════════════════════════

const VIEWS = { LEDGER: "ledger", CONTRACT: "contract", INTEGRITY: "integrity" };

function CASTPrototype() {
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [activeView, setActiveView] = useState(VIEWS.LEDGER);
  const [filterParty, setFilterParty] = useState("all");

  const filteredEvents = filterParty === "all"
    ? EVENTS
    : EVENTS.filter(e => e.party === filterParty);

  return (
    <div style={{
      fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif",
      background: "#0D1117", color: "#E8E8ED",
      height: "100vh", display: "flex", flexDirection: "column",
      overflow: "hidden"
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />

      {/* ── Header ── */}
      <div style={{
        padding: "14px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(255,255,255,0.01)", flexShrink: 0
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
            <span style={{
              fontSize: 18, fontWeight: 700, letterSpacing: 3,
              color: "#F5A623", fontFamily: "'IBM Plex Mono', monospace"
            }}>CAST</span>
            <span style={{
              fontSize: 11, color: "rgba(255,255,255,0.25)", fontWeight: 500, letterSpacing: 0.5
            }}>Shared Ledger</span>
          </div>
          <div style={{
            height: 16, width: 1, background: "rgba(255,255,255,0.08)"
          }} />
          <span style={{
            fontSize: 12, color: "rgba(255,255,255,0.4)", fontWeight: 500
          }}>
            GPU Compute Financing — CTR-4401
          </span>
        </div>

        {/* View Tabs */}
        <div style={{ display: "flex", gap: 2, background: "rgba(255,255,255,0.04)", borderRadius: 6, padding: 2 }}>
          {[
            { key: VIEWS.LEDGER, label: "Event Ledger" },
            { key: VIEWS.CONTRACT, label: "Contract" },
            { key: VIEWS.INTEGRITY, label: "Integrity" },
          ].map(tab => (
            <button
              key={tab.key}
              onClick={() => setActiveView(tab.key)}
              style={{
                padding: "5px 14px", borderRadius: 4, border: "none", cursor: "pointer",
                fontSize: 11, fontWeight: 600, letterSpacing: 0.3, transition: "all 0.15s",
                background: activeView === tab.key ? "rgba(255,255,255,0.1)" : "transparent",
                color: activeView === tab.key ? "#E8E8ED" : "rgba(255,255,255,0.35)"
              }}
            >
              {tab.label}
            </button>
          ))}
        </div>
      </div>

      {/* ── Body ── */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        {/* Left Panel */}
        <div style={{
          width: activeView === VIEWS.LEDGER ? 380 : "100%",
          borderRight: activeView === VIEWS.LEDGER ? "1px solid rgba(255,255,255,0.06)" : "none",
          display: "flex", flexDirection: "column", overflow: "hidden",
          transition: "width 0.2s"
        }}>
          {activeView === VIEWS.LEDGER && (
            <>
              {/* Party Filter */}
              <div style={{
                padding: "10px 16px", borderBottom: "1px solid rgba(255,255,255,0.04)",
                display: "flex", gap: 4, flexWrap: "wrap", flexShrink: 0
              }}>
                {[
                  { key: "all", label: "All Events" },
                  { key: "machine", label: "Machine" },
                  { key: "provider", label: "Provider" },
                  { key: "customer", label: "Customer" },
                  { key: "system", label: "Protocol" },
                ].map(f => (
                  <button
                    key={f.key}
                    onClick={() => setFilterParty(f.key)}
                    style={{
                      display: "flex", alignItems: "center", gap: 4,
                      padding: "3px 10px", borderRadius: 12, border: "none", cursor: "pointer",
                      fontSize: 10, fontWeight: 600, letterSpacing: 0.3, transition: "all 0.15s",
                      background: filterParty === f.key ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.03)",
                      color: filterParty === f.key ? "#E8E8ED" : "rgba(255,255,255,0.3)"
                    }}
                  >
                    {f.key !== "all" && <PartyDot party={f.key} size={6} />}
                    {f.label}
                  </button>
                ))}
              </div>

              {/* Event List */}
              <div style={{ flex: 1, overflowY: "auto" }}>
                {filteredEvents.map((event, i) => (
                  <EventCard
                    key={event.id}
                    event={event}
                    index={i}
                    isSelected={selectedEvent?.id === event.id}
                    onClick={() => setSelectedEvent(event)}
                  />
                ))}
              </div>
            </>
          )}

          {activeView === VIEWS.CONTRACT && <ContractSummary />}
          {activeView === VIEWS.INTEGRITY && <AdversarialPanel />}
        </div>

        {/* Right Panel — Event Detail (Ledger view only) */}
        {activeView === VIEWS.LEDGER && (
          <div style={{
            flex: 1, overflow: "hidden", display: "flex", flexDirection: "column",
            background: "rgba(255,255,255,0.01)"
          }}>
            <div style={{
              padding: "10px 20px", borderBottom: "1px solid rgba(255,255,255,0.04)",
              fontSize: 10, color: "rgba(255,255,255,0.25)", textTransform: "uppercase",
              letterSpacing: 1.5, fontWeight: 700, flexShrink: 0
            }}>
              Event Inspector
            </div>
            <div style={{ flex: 1, overflowY: "auto" }}>
              <EventDetail event={selectedEvent} />
            </div>
          </div>
        )}
      </div>

      {/* ── Footer ── */}
      <div style={{
        padding: "8px 24px", borderTop: "1px solid rgba(255,255,255,0.06)",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(255,255,255,0.01)", flexShrink: 0
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{
            fontSize: 10, color: "rgba(255,255,255,0.2)", fontFamily: "'IBM Plex Mono', monospace"
          }}>
            {EVENTS.length} events · {EVENTS.filter(e => e.type.includes("DISPUTE")).length} disputes · chain verified
          </span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{
            width: 6, height: 6, borderRadius: "50%", background: "#18A86B",
            display: "inline-block", animation: "pulse 2s infinite"
          }} />
          <span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)" }}>
            Shared ledger active — all parties connected
          </span>
        </div>
      </div>

      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        * { box-sizing: border-box; }
      `}</style>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(CASTPrototype));
</script>
</body>
</html>
