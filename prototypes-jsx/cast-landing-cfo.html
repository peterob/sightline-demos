// Email signup form
const SignupForm = ({ variant = 'default' }) => {
  const [email, setEmail] = useState('');
  const [submitted, setSubmitted] = useState(false);
  
  const handleSubmit = (e) => {
    e.preventDefault();
    if (email) setSubmitted(true);
  };
  
  if (submitted) {
    return (
      <div style={{
        padding: '20px 24px',
        backgroundColor: 'rgba(34, 197, 94, 0.1)',
        border: '1px solid rgba(34, 197, 94, 0.3)',
        borderRadius: '8px',
        textAlign: 'center'
      }}>
        <div style={{ color: '#22c55e', fontSize: '16px', fontWeight: 500, marginBottom: '4px' }}>
          You're on the list
        </div>
        <div style={{ color: '#71717a', fontSize: '14px' }}>
          We'll reach out within 24 hours
        </div>
      </div>
    );
  }
  
  return (
    <form onSubmit={handleSubmit} style={{ display: 'flex', gap: '12px' }}>
      <input
        type="email"
        value={email}
        onChange={(e) => setEmail(e.target.value)}
        placeholder="you@company.com"
        required
        style={{
          flex: 1,
          padding: '14px 18px',
          backgroundColor: variant === 'light' ? '#27272a' : '#18181b',
          border: '1px solid #3f3f46',
          borderRadius: '8px',
          color: '#f4f4f5',
          fontSize: '15px',
          outline: 'none'
        }}
      />
      <button
        type="submit"
        style={{
          padding: '14px 28px',
          backgroundColor: '#f59e0b',
          color: '#18181b',
          fontWeight: 600,
          fontSize: '15px',
          border: 'none',
          borderRadius: '8px',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          whiteSpace: 'nowrap'
        }}
      >
        Get Early Access
        <ArrowRight />
      </button>
    </form>
  );
};
