          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Owner</span><span className="text-gray-900">{agent.owner}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Sponsor</span><span className="text-gray-900">{agent.sponsor}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Vendor</span><span className="text-gray-900">{agent.vendor}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Created</span><span className="text-gray-900">{agent.created}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Last SOX Audit</span><span className="text-gray-900">{agent.lastAudit}</span></div>
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Scope & Permissions</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">Can Propose</span><span className={agent.scope.canPropose ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canPropose ? '✓' : '✗'}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Can Execute</span><span className={agent.scope.canExecute ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canExecute ? '✓' : '✗'}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">Can Approve</span><span className={agent.scope.canApprove ? 'text-green-600' : 'text-gray-400'}>{agent.scope.canApprove ? '✓' : '✗'}</span></div>
            {agent.scope.invoiceLimit && <div className="flex justify-between"><span className="text-gray-500">Invoice Limit</span><span className="text-gray-900">${agent.scope.invoiceLimit.toLocaleString()}</span></div>}
            {agent.scope.entryLimit && <div className="flex justify-between"><span className="text-gray-500">Entry Limit</span><span className="text-gray-900">${agent.scope.entryLimit.toLocaleString()}</span></div>}
            {agent.scope.adjustmentLimit && <div className="flex justify-between"><span className="text-gray-500">Adjustment Limit</span><span className="text-gray-900">${agent.scope.adjustmentLimit.toLocaleString()}</span></div>}
          </div>
          <div className="mt-3 pt-3 border-t border-gray-100">
            <p className="text-xs text-gray-500 mb-1">Segregation of Duties</p>
            <p className="text-sm text-red-600 font-medium">{agent.scope.segregation}</p>
          </div>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">System Access</h3>
          <div className="space-y-3">
            <div>
              <p className="text-xs text-gray-500 mb-1">Connected Systems</p>
              <div className="flex flex-wrap gap-1">
                {agent.scope.systems.map((system, i) => (
                  <span key={i} className="px-2 py-0.5 bg-blue-50 text-blue-700 text-xs rounded">{system}</span>
                ))}
              </div>
            </div>
            <div>
              <p className="text-xs text-gray-500 mb-1">GL Access</p>
              <div className="flex flex-wrap gap-1">
                {agent.scope.glAccess.map((access, i) => (
                  <span key={i} className="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">{access}</span>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-6">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Credentials & Security</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-gray-500">API Key</span><span className="text-gray-900 font-mono">****...{agent.credentials.keyLast4}</span></div>
            <div className="flex justify-between">
              <span className="text-gray-500">Expires</span>
              <span className={getDaysUntilExpiry(agent.credentials.expires) < 30 ? 'text-orange-600' : 'text-gray-900'}>
                {agent.credentials.expires} ({getDaysUntilExpiry(agent.credentials.expires)}d)
              </span>
            </div>
            <div className="flex justify-between"><span className="text-gray-500">Last Rotated</span><span className="text-gray-900">{agent.credentials.lastRotated}</span></div>
            <div className="flex justify-between"><span className="text-gray-500">MFA Enabled</span><span className={agent.credentials.mfaEnabled ? 'text-green-600' : 'text-red-600'}>{agent.credentials.mfaEnabled ? '✓ Yes' : '✗ No'}</span></div>
          </div>
          <button className="mt-3 w-full px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50">Rotate Credentials</button>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-medium text-gray-500 mb-3">Performance Metrics</h3>
          <div className="space-y-2 text-sm">
            {agent.metrics.invoicesProcessed && <div className="flex justify-between"><span className="text-gray-500">Invoices Processed</span><span className="text-gray-900">{agent.metrics.invoicesProcessed}</span></div>}
            {agent.metrics.autoMatchRate && <div className="flex justify-between"><span className="text-gray-500">Auto-Match Rate</span><span className="text-gray-900">{agent.metrics.autoMatchRate}%</span></div>}
            {agent.metrics.transactionsReconciled && <div className="flex justify-between"><span className="text-gray-500">Txns Reconciled</span><span className="text-gray-900">{agent.metrics.transactionsReconciled.toLocaleString()}</span></div>}
            {agent.metrics.entriesProposed && <div className="flex justify-between"><span className="text-gray-500">Entries Proposed</span><span className="text-gray-900">{agent.metrics.entriesProposed}</span></div>}
            {agent.metrics.entriesApproved && <div className="flex justify-between"><span className="text-gray-500">Entries Approved</span><span className="text-gray-900">{agent.metrics.entriesApproved}</span></div>}
            {agent.metrics.exceptionsGenerated !== undefined && <div className="flex justify-between"><span className="text-gray-500">Exceptions</span><span className="text-gray-900">{agent.metrics.exceptionsGenerated}</span></div>}
            {agent.metrics.falsePositiveRate && <div className="flex justify-between"><span className="text-gray-500">False Positive Rate</span><span className={agent.metrics.falsePositiveRate > 15 ? 'text-red-600' : 'text-gray-900'}>{agent.metrics.falsePositiveRate}%</span></div>}
            {agent.metrics.accuracyRate && <div className="flex justify-between"><span className="text-gray-500">Accuracy Rate</span><span className="text-gray-900">{agent.metrics.accuracyRate}%</span></div>}
          </div>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <div className="flex justify-between items-center mb-3">
          <h3 className="text-sm font-medium text-gray-500">Activity Log</h3>
          <button className="text-sm text-blue-600 hover:text-blue-800">Export for Audit →</button>
        </div>
        <div className="space-y-2">
          {agent.events.map((event, i) => (
            <div key={i} className="flex items-start gap-3 py-2 border-b border-gray-50 last:border-0">
              <span className="text-lg">{getEventIcon(event.type)}</span>
              <div className="flex-1 min-w-0">
                <div className="flex justify-between">
                  <span className="text-sm font-medium text-gray-900">{event.type.replace(/_/g, ' ')}</span>
                  <span className="text-xs text-gray-500">{event.date}</span>
                </div>
                <p className="text-sm text-gray-600">{event.detail}</p>
                <span className="text-xs text-gray-500">{event.status}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap-3">
        <button onClick={() => setShowRevokeModal(true)} className="px-4 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50">
          {agent.status === 'SUSPENDED' ? 'Revoke Access' : 'Suspend Agent'}
        </button>
        <button className="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">Modify Scope</button>
        <button className="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">Schedule SOX Review</button>
        <button className="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50">Transfer Ownership</button>
      </div>

      {showRevokeModal && <RevokeModal agent={agent} onClose={() => setShowRevokeModal(false)} />}
    </div>
  );

  const AgentList = () => (
    <div className="space-y-6">
      <div className="flex justify-between items-center">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">Finance Agent Registry</h1>
          <p className="text-gray-500 mt-1">Manage outsourced F&A agents with SOX-compliant controls</p>
        </div>
        <button className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">
          + Onboard Agent
        </button>
      </div>

      <div className="flex gap-4 items-center bg-white border border-gray-200 rounded-lg p-4">
        <div>
          <label className="text-xs text-gray-500 block mb-1">Status</label>
          <select 
            value={filter.status} 
            onChange={(e) => setFilter({...filter, status: e.target.value})}
            className="border border-gray-300 rounded px-3 py-1.5 text-sm"
          >
            <option value="all">All</option>
            <option value="ACTIVE">Active</option>
            <option value="SUSPENDED">Suspended</option>
            <option value="REVOKED">Revoked</option>
          </select>
        </div>
        <div>
          <label className="text-xs text-gray-500 block mb-1">Type</label>
          <select 
            value={filter.type} 
            onChange={(e) => setFilter({...filter, type: e.target.value})}
            className="border border-gray-300 rounded px-3 py-1.5 text-sm"
          >
            <option value="all">All</option>
            <option value="AUTONOMOUS">Autonomous</option>
            <option value="PROPOSAL_BASED">Proposal Based</option>
            <option value="HUMAN_IN_LOOP">Human in Loop</option>
          </select>
        </div>
        <div>
          <label className="text-xs text-gray-500 block mb-1">Function</label>
          <select 
            value={filter.function} 
            onChange={(e) => setFilter({...filter, function: e.target.value})}
            className="border border-gray-300 rounded px-3 py-1.5 text-sm"
          >
            <option value="all">All Functions</option>
            <option value="ACCOUNTS_PAYABLE">Accounts Payable</option>
            <option value="ACCOUNTS_RECEIVABLE">Accounts Receivable</option>
            <option value="RECONCILIATION">Reconciliation</option>
            <option value="GENERAL_LEDGER">General Ledger</option>
            <option value="EXPENSE_MANAGEMENT">Expense Management</option>
            <option value="CLOSE_MANAGEMENT">Close Management</option>
            <option value="TAX_COMPLIANCE">Tax Compliance</option>
            <option value="FP&A">FP&A</option>
          </select>
        </div>
        <div className="flex-1">
          <label className="text-xs text-gray-500 block mb-1">Search</label>
          <input type="text" placeholder="Search agents, vendors..." className="w-full border border-gray-300 rounded px-3 py-1.5 text-sm" />
        </div>
      </div>

      <div className="grid grid-cols-5 gap-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Total Agents</p>
          <p className="text-2xl font-bold text-gray-900">{agents.length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Active</p>
          <p className="text-2xl font-bold text-green-600">{agents.filter(a => a.status === 'ACTIVE').length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Suspended</p>
          <p className="text-2xl font-bold text-yellow-600">{agents.filter(a => a.status === 'SUSPENDED').length}</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">SOX Review Due</p>
          <p className="text-2xl font-bold text-orange-600">2</p>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <p className="text-sm text-gray-500">Creds Expiring</p>
          <p className="text-2xl font-bold text-red-600">{agents.filter(a => getDaysUntilExpiry(a.credentials.expires) < 30).length}</p>
        </div>
      </div>

      <div className="space-y-3">
        {filteredAgents.map(agent => (
          <div 
            key={agent.id} 
            onClick={() => setSelectedAgent(agent)}
            className="bg-white border border-gray-200 rounded-lg p-4 hover:border-blue-300 hover:shadow-sm cursor-pointer transition-all"
          >
            <div className="flex items-start justify-between">
              <div className="flex items-start gap-4">
                <div className={`w-3 h-3 rounded-full mt-1.5 ${agent.status === 'ACTIVE' ? 'bg-green-500' : agent.status === 'SUSPENDED' ? 'bg-yellow-500' : 'bg-red-500'}`}></div>
                <div>
                  <div className="flex items-center gap-2">
                    <h3 className="font-medium text-gray-900">{agent.id}</h3>
                    <span className={`px-2 py-0.5 rounded text-xs font-medium ${getFunctionColor(agent.function)}`}>
                      {getFunctionLabel(agent.function)}
                    </span>
                    <span className={`px-2 py-0.5 rounded text-xs font-medium ${getTypeColor(agent.type)}`}>
                      {agent.type.replace('_', ' ')}
                    </span>
                  </div>
                  <p className="text-sm text-gray-600">{agent.name}</p>
                  <p className="text-xs text-gray-500 mt-1">Vendor: {agent.vendor} · Owner: {agent.owner}</p>
                </div>
              </div>
              <div className="text-right">
                <div className="flex gap-4 text-sm">
                  {agent.metrics.autoMatchRate && (
                    <div>
                      <p className="text-gray-900 font-medium">{agent.metrics.autoMatchRate}%</p>
                      <p className="text-xs text-gray-500">Auto-match</p>
                    </div>
                  )}
                  {agent.metrics.invoicesProcessed && (
                    <div>
                      <p className="text-gray-900 font-medium">{agent.metrics.invoicesProcessed}</p>
                      <p className="text-xs text-gray-500">Processed</p>
                    </div>
                  )}
                  {agent.metrics.entriesProposed && (
                    <div>
                      <p className="text-gray-900 font-medium">{agent.metrics.entriesApproved}/{agent.metrics.entriesProposed}</p>
                      <p className="text-xs text-gray-500">Approved</p>
                    </div>
                  )}
                  {agent.metrics.accuracyRate && (
                    <div>
                      <p className="text-gray-900 font-medium">{agent.metrics.accuracyRate}%</p>
                      <p className="text-xs text-gray-500">Accuracy</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
            {agent.status === 'SUSPENDED' && (
              <div className="mt-3 pt-3 border-t border-gray-100">
                <p className="text-sm text-yellow-700">
                  ⚠️ Suspended {agent.suspendedAt} by {agent.suspendedBy}
                </p>
                <p className="text-xs text-yellow-600">{agent.suspendReason}</p>
              </div>
            )}
            <div className="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
              <div className="flex gap-4 text-xs text-gray-500">
                <span>Last SOX audit: {agent.lastAudit}</span>
                <span>Creds expire: {agent.credentials.expires}</span>
                <span>Systems: {agent.scope.systems.join(', ')}</span>
              </div>
              <div className="flex gap-2">
                <button onClick={(e) => { e.stopPropagation(); }} className="px-3 py-1 text-xs text-gray-600 border border-gray-200 rounded hover:bg-gray-50">
                  {agent.status === 'ACTIVE' ? 'Suspend' : 'Reinstate'}
                </button>
                <button onClick={(e) => { e.stopPropagation(); }} className="px-3 py-1 text-xs text-gray-600 border border-gray-200 rounded hover:bg-gray-50">
                  View Logs
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-50 p-6">
      <div className="max-w-7xl mx-auto">
        {selectedAgent ? (
          <AgentDetail agent={selectedAgent} onBack={() => setSelectedAgent(null)} />
        ) : (
          <AgentList />
        )}
      </div>
    </div>
  );
};

// export default FinanceAgentRegistry;

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(FinanceAgentRegistry));
</script>
</body>
</html>
