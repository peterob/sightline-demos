                  <div>
                    <span className="text-xs bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full">MEDIUM RISK</span>
                    <h1 className="font-display text-2xl font-semibold text-stone-800 mt-2">Premium Landscaping LLC</h1>
                    <p className="text-stone-600">Grounds · December 8, 2024</p>
                  </div>
                  <div className="text-right">
                    <div className="font-display text-3xl font-semibold">$28,000</div>
                    <div className="text-amber-600 text-sm">Pending Review</div>
                  </div>
                </div>
              </div>
              <div className="p-6 grid grid-cols-3 gap-6">
                <div className="col-span-2 space-y-4">
                  <h3 className="font-medium text-stone-800">Risk Flags</h3>
                  {[
                    { sev: 'high', title: 'Missing Documentation', desc: 'No contract on file' },
                    { sev: 'medium', title: 'New Vendor', desc: 'No payment history' },
                    { sev: 'medium', title: 'Above Average', desc: '2.3x higher than similar vendors' },
                  ].map((f, i) => (
                    <div key={i} className={`p-4 rounded-xl severity-${f.sev}`}>
                      <div className="font-medium text-stone-800">{f.title}</div>
                      <div className="text-sm text-stone-600">{f.desc}</div>
                    </div>
                  ))}
                </div>
                <div className="space-y-4">
                  <div className="bg-amber-50 rounded-xl p-4 text-center border border-amber-100">
                    <div className="text-xs text-stone-500 uppercase">Risk Score</div>
                    <div className="font-display text-4xl font-semibold text-amber-600">72</div>
                    <div className="text-sm text-stone-500">out of 100</div>
                  </div>
                  <button className="w-full py-3 btn-primary rounded-xl font-medium">Approve</button>
                  <button className="w-full py-3 border border-stone-200 rounded-xl font-medium">Request Docs</button>
                  <button className="w-full py-3 border border-red-200 text-red-600 rounded-xl font-medium">Flag</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ===== DOCUMENTS ===== */}
        {screen === 'documents' && (
          <div className="fade-in">
            <div className="flex justify-between mb-6">
              <div>
                <h1 className="font-display text-2xl font-semibold text-stone-800">Document Linking</h1>
                <p className="text-stone-500">Link invoices to transactions</p>
              </div>
              <button className="px-4 py-2 btn-primary rounded-xl font-medium">+ Upload</button>
            </div>
            <div className="grid grid-cols-2 gap-6">
              <div className="card p-6">
                <h3 className="font-medium text-stone-800 mb-4">Transactions</h3>
                {transactions.map(tx => (
                  <div key={tx.id} onClick={() => setSelectedTx(tx.id)} className={`p-3 rounded-xl mb-2 cursor-pointer border-2 ${selectedTx === tx.id ? 'border-stone-800 bg-stone-50' : 'border-transparent hover:bg-stone-50'}`}>
                    <div className="flex justify-between">
                      <span className="font-medium text-stone-800">{tx.vendor}</span>
                      <span className={tx.hasDoc ? 'text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded' : 'text-xs bg-stone-100 text-stone-500 px-2 py-0.5 rounded'}>{tx.hasDoc ? 'Doc' : 'No doc'}</span>
                    </div>
                    <div className="text-sm text-stone-500">{tx.fullDate}</div>
                  </div>
                ))}
              </div>
              <div className="card p-6">
                <h3 className="font-medium text-stone-800 mb-4">Documents</h3>
                {documents.map(d => (
                  <div key={d.id} className="flex justify-between items-center p-3 border border-stone-200 rounded-xl mb-2 hover:border-blue-300 hover:bg-blue-50 cursor-pointer group">
                    <div className="flex items-center gap-3">
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${d.type === 'Invoice' ? 'bg-blue-100 text-blue-600' : d.type === 'Contract' ? 'bg-purple-100 text-purple-600' : 'bg-emerald-100 text-emerald-600'}`}>📄</div>
                      <div>
                        <div className="text-sm font-medium text-stone-800">{d.name}</div>
                        <div className="text-xs text-stone-500">{d.type} · {d.size}</div>
                      </div>
                    </div>
                    <button className="opacity-0 group-hover:opacity-100 px-3 py-1 bg-stone-800 text-white text-xs rounded-lg">Link</button>
                  </div>
                ))}
                <div className="mt-4 p-4 border-2 border-dashed border-stone-300 rounded-xl text-center text-stone-500">Drop files to upload</div>
              </div>
            </div>
          </div>
        )}

        {/* ===== BUDGET ===== */}
        {screen === 'budget' && (
          <div className="fade-in">
            <div className="flex justify-between mb-6">
              <div>
                <h1 className="font-display text-2xl font-semibold text-stone-800">Budget vs Actual</h1>
                <p className="text-stone-500">YTD through November 2024</p>
              </div>
              <button className="px-4 py-2 btn-primary rounded-xl text-sm font-medium">Export</button>
            </div>
            <div className="grid grid-cols-4 gap-4 mb-6">
              {[{ l: 'Budget', v: '$6.24M' }, { l: 'Actual', v: '$6.50M' }, { l: 'Variance', v: '+$262K', amber: true }, { l: '% Used', v: '104.2%' }].map((s, i) => (
                <div key={i} className={`card p-4 ${s.amber ? 'bg-amber-50 border border-amber-200' : ''}`}>
                  <div className="text-xs text-stone-500 uppercase">{s.l}</div>
                  <div className={`font-display text-xl font-semibold ${s.amber ? 'text-amber-600' : 'text-stone-800'}`}>{s.v}</div>
                </div>
              ))}
            </div>
            <div className="card overflow-hidden">
              {budgetData.map((b, i) => (
                <div key={i} className="border-b border-stone-100 last:border-0">
                  <div onClick={() => setExpandedBudget(expandedBudget === i ? null : i)} className="p-4 flex items-center justify-between cursor-pointer hover:bg-stone-50">
                    <div className="flex items-center gap-3">
                      <span className="text-xl">{b.icon}</span>
                      <div>
                        <div className="font-medium text-stone-800">{b.category}</div>
                        <div className="text-sm text-stone-500">{fmt(b.actual)} of {fmt(b.budget)}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-4">
                      <div className="w-32 h-2 bg-stone-100 rounded-full overflow-hidden">
                        <div className={`h-full ${b.variance > 0 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min((b.actual / b.budget) * 100, 100)}%` }} />
                      </div>
                      <span className={`w-16 text-right font-medium ${b.variance > 0 ? 'text-amber-600' : 'text-emerald-600'}`}>{b.variance > 0 ? '+' : ''}{fmt(b.variance)}</span>
                      <span className={`transition-transform ${expandedBudget === i ? 'rotate-90' : ''}`}>→</span>
                    </div>
                  </div>
                  {expandedBudget === i && (
                    <div className="px-4 pb-4 bg-stone-50">
                      {b.subs.map((s, j) => (
                        <div key={j} className="flex justify-between py-2 border-b border-stone-100 last:border-0 text-sm">
                          <span className="text-stone-700">{s.name}</span>
                          <span className={s.actual > s.budget ? 'text-amber-600' : 'text-emerald-600'}>{fmt(s.actual - s.budget)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ===== SETTINGS ===== */}
        {screen === 'settings' && (
          <div className="max-w-3xl mx-auto fade-in">
            <h1 className="font-display text-2xl font-semibold text-stone-800 mb-6">Settings</h1>
            <div className="card divide-y divide-stone-100">
              <div className="p-6">
                <h3 className="font-medium text-stone-800 mb-4">Club Profile</h3>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-sm text-stone-500">Name</label><input defaultValue="Palm Harbor CC" className="w-full mt-1 px-3 py-2 border border-stone-200 rounded-xl" /></div>
                  <div><label className="text-sm text-stone-500">Type</label><select className="w-full mt-1 px-3 py-2 border border-stone-200 rounded-xl bg-white"><option>Country Club</option></select></div>
                </div>
              </div>
              <div className="p-6">
                <h3 className="font-medium text-stone-800 mb-4">Notifications</h3>
                {[{ k: 'anomaly', l: 'Anomaly Alerts' }, { k: 'weekly', l: 'Weekly Summary' }, { k: 'budget', l: 'Budget Alerts' }, { k: 'large', l: 'Large Transactions' }].map(n => (
                  <div key={n.k} className="flex justify-between items-center py-2">
                    <span className="text-stone-700">{n.l}</span>
                    <button onClick={() => setNotifs(p => ({ ...p, [n.k]: !p[n.k] }))} className={`w-10 h-6 rounded-full relative ${notifs[n.k] ? 'bg-emerald-500' : 'bg-stone-300'}`}>
                      <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${notifs[n.k] ? 'left-5' : 'left-1'}`} />
                    </button>
                  </div>
                ))}
              </div>
              <div className="p-6">
                <h3 className="font-medium text-stone-800 mb-4">Banks</h3>
                <div className="p-3 bg-stone-50 rounded-xl flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-bold text-blue-700">T</div>
                    <span className="text-stone-800">Truist ****4521</span>
                  </div>
                  <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">Connected</span>
                </div>
              </div>
              <div className="p-6 bg-red-50">
                <h3 className="font-medium text-red-800 mb-2">Danger Zone</h3>
                <button className="px-4 py-2 border border-red-300 text-red-600 rounded-lg text-sm">Delete All Data</button>
              </div>
            </div>
          </div>
        )}

        {/* ===== USERS ===== */}
        {screen === 'users' && (
          <div className="max-w-4xl mx-auto fade-in">
            <div className="flex justify-between mb-6">
              <div>
                <h1 className="font-display text-2xl font-semibold text-stone-800">Team Members</h1>
                <p className="text-stone-500">Manage access</p>
              </div>
              <button className="px-4 py-2 btn-primary rounded-xl font-medium">+ Invite</button>
            </div>
            <div className="card p-3 mb-4 flex gap-4 text-sm">
              <span className="text-stone-500">Roles:</span>
              <span className="px-2 py-0.5 bg-purple-100 text-purple-700 rounded">Admin</span>
              <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">Treasurer</span>
              <span className="px-2 py-0.5 bg-stone-100 text-stone-700 rounded">Board</span>
            </div>
            <div className="card divide-y divide-stone-100">
              {users.map(u => (
                <div key={u.id} className="p-4 flex items-center justify-between hover:bg-stone-50">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-medium ${u.role === 'Admin' ? 'bg-purple-600' : u.role === 'Treasurer' ? 'bg-blue-600' : 'bg-stone-600'}`}>{u.initials}</div>
                    <div>
                      <div className="font-medium text-stone-800">{u.name}</div>
                      <div className="text-sm text-stone-500">{u.email}</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className={`px-2 py-0.5 rounded text-xs font-medium ${u.role === 'Admin' ? 'bg-purple-100 text-purple-700' : u.role === 'Treasurer' ? 'bg-blue-100 text-blue-700' : 'bg-stone-100 text-stone-700'}`}>{u.role}</span>
                    <span className={`text-sm ${u.status === 'pending' ? 'text-amber-600' : 'text-stone-500'}`}>{u.lastSeen}</span>
                  </div>
                </div>
              ))}
            </div>
            <div className="card p-6 mt-6">
              <h3 className="font-medium text-stone-800 mb-4">Recent Activity</h3>
              {[
                { u: 'JW', action: 'approved Toro Equipment', time: '2h ago' },
                { u: 'MC', action: 'viewed Budget report', time: '1d ago' },
                { u: 'RP', action: 'downloaded Q3 Summary', time: '3d ago' },
              ].map((a, i) => (
                <div key={i} className="flex items-center gap-3 py-2">
                  <div className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-xs text-stone-600">{a.u}</div>
                  <span className="flex-1 text-sm text-stone-700">{a.action}</span>
                  <span className="text-xs text-stone-400">{a.time}</span>
                </div>
              ))}
            </div>
          </div>
        )}

      </main>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(SightlinePrototype));
</script>
</body>
</html>
