<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SightlineSeriesUI</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:#0e0e10; color:#e7e7ea; min-height:100vh; }
  .loader { display:flex; align-items:center; justify-content:center; min-height:100vh; color:#9b9ba2; font-size:13px; }
</style>
</head>
<body>
<div id="root"><div class="loader">Compiling React component…</div></div>
<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback, useLayoutEffect, useReducer, Fragment } = React;


function SightlineSeriesUI() {
  const queue = [
    {
      id: "PAY-1042",
      title: "Vendor payment release",
      state: "Blocked",
      failed: ["Event sum consistency", "Recursion consistency"],
      nextProof: "Upload matched receipt or confirm quantity variance",
      amount: "$18,400",
      age: "2h",
    },
    {
      id: "COH-220",
      title: "Cohort revenue projection",
      state: "Warning",
      failed: ["Bounded growth"],
      nextProof: "Refresh retention factor r from latest cohort data",
      amount: "$92,000 ARR",
      age: "5h",
    },
    {
      id: "CASH-317",
      title: "Cash state update",
      state: "Cleared",
      failed: [],
      nextProof: "None",
      amount: "$245,300",
      age: "12m",
    },
  ];

  const timeline = [
    { label: "Event 0", term: "a", value: "$10,000", status: "Proven" },
    { label: "Event 1", term: "ar", value: "$8,000", status: "Proven" },
    { label: "Event 2", term: "ar²", value: "$6,400", status: "Missing receipt" },
    { label: "Event 3", term: "ar³", value: "$5,120", status: "Pending" },
  ];

  const invariants = [
    {
      name: "Event sum consistency",
      rule: "state = Σ(event.amount)",
      status: "Failed",
      detail: "Materialized payable balance differs from summed events by $1,280.",
    },
    {
      name: "Recursion consistency",
      rule: "x(t+1) = r·x(t) + a",
      status: "Failed",
      detail: "Current state transition used r = 0.86, policy snapshot requires r = 0.80.",
    },
    {
      name: "Bounded growth",
      rule: "x ≤ a / (1-r)",
      status: "Pass",
      detail: "Projected balance remains within allowed system bound.",
    },
  ];

  const pills = {
    Blocked: "bg-red-100 text-red-700 border-red-200",
    Warning: "bg-amber-100 text-amber-700 border-amber-200",
    Cleared: "bg-emerald-100 text-emerald-700 border-emerald-200",
    Failed: "bg-red-100 text-red-700 border-red-200",
    Pass: "bg-emerald-100 text-emerald-700 border-emerald-200",
    Proven: "bg-emerald-100 text-emerald-700 border-emerald-200",
    Pending: "bg-slate-100 text-slate-700 border-slate-200",
    "Missing receipt": "bg-red-100 text-red-700 border-red-200",
  };

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900 p-6 md:p-8">
      <div className="max-w-7xl mx-auto space-y-6">
        <div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
          <div>
            <div className="text-sm uppercase tracking-[0.2em] text-slate-500">Sightline</div>
            <h1 className="text-3xl md:text-4xl font-semibold tracking-tight">Event → State → Invariant</h1>
            <p className="text-slate-600 mt-2 max-w-3xl">
              Queue-first control view for recursive financial systems. Each state is derived from events,
              checked against invariants, and blocked until the next required proof is present.
            </p>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <MetricCard label="Blocked" value="14" sub="Needs proof" />
            <MetricCard label="Warnings" value="6" sub="Out of tolerance" />
            <MetricCard label="Cleared" value="182" sub="Last 24h" />
          </div>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
          <section className="xl:col-span-4 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-5 border-b border-slate-200 flex items-center justify-between">
              <div>
                <h2 className="text-lg font-semibold">Control Queue</h2>
                <p className="text-sm text-slate-500">Items sorted by proof urgency</p>
              </div>
              <input
                className="w-40 rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none"
                placeholder="Search"
              />
            </div>
            <div className="divide-y divide-slate-200">
              {queue.map((item) => (
                <div key={item.id} className="p-5 hover:bg-slate-50 transition-colors cursor-pointer">
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <div className="text-xs font-medium tracking-wide text-slate-500">{item.id}</div>
                      <div className="text-base font-semibold mt-1">{item.title}</div>
                      <div className="text-sm text-slate-500 mt-1">{item.amount} · {item.age}</div>
                    </div>
                    <span className={`text-xs border rounded-full px-2.5 py-1 font-medium ${pills[item.state]}`}>
                      {item.state}
                    </span>
                  </div>
                  <div className="mt-3 space-y-2">
                    <div>
                      <div className="text-xs uppercase tracking-wide text-slate-500 mb-1">Failed conditions</div>
                      <div className="flex flex-wrap gap-2">
                        {item.failed.length ? item.failed.map((f) => (
                          <span key={f} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-700 border border-slate-200">
                            {f}
                          </span>
                        )) : <span className="text-sm text-slate-400">None</span>}
                      </div>
                    </div>
                    <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                      <div className="text-xs uppercase tracking-wide text-slate-500">Next required proof</div>
                      <div className="text-sm mt-1">{item.nextProof}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="xl:col-span-8 space-y-6">
            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
              <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div>
                  <div className="text-sm text-slate-500">Selected item</div>
                  <h2 className="text-2xl font-semibold mt-1">PAY-1042 · Vendor payment release</h2>
                  <p className="text-slate-600 mt-2 max-w-3xl">
                    Payment is blocked because the derived state cannot be proven from event history under the
                    current policy snapshot.
                  </p>
                </div>
                <div className="rounded-2xl border border-red-200 bg-red-50 px-4 py-3">
                  <div className="text-xs uppercase tracking-wide text-red-700">Status</div>
                  <div className="text-lg font-semibold text-red-700">Blocked</div>
                </div>
              </div>

              <div className="grid md:grid-cols-3 gap-4 mt-6">
                <DetailStat label="Current state" value="$29,520" sub="Derived payable balance" />
                <DetailStat label="Expected state" value="$28,240" sub="From proven event chain" />
                <DetailStat label="Variance" value="$1,280" sub="Unexplained" />
              </div>
            </div>

            <div className="grid lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <h3 className="text-lg font-semibold">Causal Timeline</h3>
                <p className="text-sm text-slate-500 mt-1">Terms from the recursive chain mapped to concrete events</p>
                <div className="mt-5 space-y-4">
                  {timeline.map((step, idx) => (
                    <div key={step.label} className="flex gap-4">
                      <div className="flex flex-col items-center">
                        <div className="w-10 h-10 rounded-2xl bg-slate-900 text-white flex items-center justify-center text-sm font-semibold">
                          {idx}
                        </div>
                        {idx < timeline.length - 1 && <div className="w-px h-12 bg-slate-200 mt-2" />}
                      </div>
                      <div className="flex-1 pb-4">
                        <div className="flex items-center justify-between gap-3">
                          <div>
                            <div className="font-medium">{step.label}</div>
                            <div className="text-sm text-slate-500">Term {step.term} · Contribution {step.value}</div>
                          </div>
                          <span className={`text-xs border rounded-full px-2.5 py-1 font-medium ${pills[step.status]}`}>
                            {step.status}
                          </span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <h3 className="text-lg font-semibold">Invariant Panel</h3>
                <p className="text-sm text-slate-500 mt-1">Rules evaluated against the current state transition</p>
                <div className="mt-5 space-y-4">
                  {invariants.map((rule) => (
                    <div key={rule.name} className="rounded-2xl border border-slate-200 p-4">
                      <div className="flex items-start justify-between gap-3">
                        <div>
                          <div className="font-medium">{rule.name}</div>
                          <div className="text-sm text-slate-500 mt-1">{rule.rule}</div>
                        </div>
                        <span className={`text-xs border rounded-full px-2.5 py-1 font-medium ${pills[rule.status]}`}>
                          {rule.status}
                        </span>
                      </div>
                      <p className="text-sm text-slate-700 mt-3">{rule.detail}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
              <h3 className="text-lg font-semibold">Next Required Proof</h3>
              <div className="grid md:grid-cols-3 gap-4 mt-4">
                <ProofCard
                  title="1. Matched receiving evidence"
                  body="Attach receipt, delivery confirmation, or quantity variance explanation for Event 2."
                />
                <ProofCard
                  title="2. Policy snapshot confirmation"
                  body="Confirm the approved retention factor r = 0.80 for this transition and lock policy version."
                />
                <ProofCard
                  title="3. Recompute state"
                  body="Replay event chain, recompute derived state, and re-run invariant checks before release."
                />
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  );
}

function MetricCard({ label, value, sub }) {
  return (
    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm px-4 py-3 min-w-[120px]">
      <div className="text-xs uppercase tracking-wide text-slate-500">{label}</div>
      <div className="text-2xl font-semibold mt-1">{value}</div>
      <div className="text-xs text-slate-500 mt-1">{sub}</div>
    </div>
  );
}

function DetailStat({ label, value, sub }) {
  return (
    <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
      <div className="text-xs uppercase tracking-wide text-slate-500">{label}</div>
      <div className="text-2xl font-semibold mt-2">{value}</div>
      <div className="text-sm text-slate-500 mt-1">{sub}</div>
    </div>
  );
}

function ProofCard({ title, body }) {
  return (
    <div className="rounded-2xl border border-slate-200 p-4 bg-slate-50">
      <div className="font-medium">{title}</div>
      <p className="text-sm text-slate-600 mt-2">{body}</p>
      <button className="mt-4 rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium bg-white hover:bg-slate-50 transition-colors cursor-pointer">
        Open task
      </button>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(SightlineSeriesUI));
</script>
</body>
</html>
