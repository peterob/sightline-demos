// Derive current state from events
function deriveState(events) {
  const state = {
    commitment: null,
    totalDelivered: 0,
    totalConfirmed: 0,
    totalBilled: 0,
    totalPaid: 0,
    openVariances: [],
    status: 'DRAFT'
  };

  events.forEach(event => {
    switch (event.type) {
      case 'COMMITMENT_CREATED':
        state.commitment = event.data;
        state.status = 'PENDING_ACCEPTANCE';
        break;
      case 'COMMITMENT_ACCEPTED':
        state.status = 'ACTIVE';
        break;
      case 'USAGE_REPORTED':
        state.totalDelivered += event.data.gpuHoursDelivered;
        state.totalBilled += event.data.amountDue;
        break;
      case 'USAGE_CONFIRMED':
        state.totalConfirmed += event.data.confirmedHours;
        break;
      case 'VARIANCE_FLAGGED':
        state.openVariances.push(event.data);
        state.status = 'VARIANCE_OPEN';
        break;
      case 'VARIANCE_RESOLVED':
        state.openVariances = state.openVariances.filter(
          v => v.varianceType !== event.data.varianceType
        );
        if (state.openVariances.length === 0) state.status = 'ACTIVE';
        break;
      case 'PAYMENT_MADE':
        state.totalPaid += event.data.amount;
        break;
    }
  });

  return state;
}

// Status badge component
function StatusBadge({ status }) {
  const statusConfig = {
    DRAFT: { bg: '#f3f4f6', text: '#6b7280', label: 'Draft' },
    PENDING_ACCEPTANCE: { bg: '#fef3c7', text: '#92400e', label: 'Pending Acceptance' },
    ACTIVE: { bg: '#d1fae5', text: '#065f46', label: 'Active' },
    VARIANCE_OPEN: { bg: '#fee2e2', text: '#991b1b', label: 'Variance Open' },
    COMPLETED: { bg: '#dbeafe', text: '#1e40af', label: 'Completed' }
  };
  const config = statusConfig[status] || statusConfig.DRAFT;
  
  return (
    <span style={{
      padding: '4px 12px',
      borderRadius: '9999px',
      fontSize: '12px',
      fontWeight: '600',
      backgroundColor: config.bg,
      color: config.text,
      textTransform: 'uppercase',
      letterSpacing: '0.05em'
    }}>
      {config.label}
    </span>
  );
}

// Shared Event Log Component

        const style = eventStyles[event.type] || { bg: '#f3f4f6', border: '#9ca3af', icon: '•' };
        const isOwnEvent = event.party === perspective;
        
        return (
          <div
            key={event.id}
            style={{
              backgroundColor: style.bg,
              borderLeft: `4px solid ${style.border}`,
              borderRadius: '8px',
              padding: '16px',
              opacity: isOwnEvent ? 1 : 0.85
            }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span style={{ fontSize: '18px' }}>{style.icon}</span>
                <span style={{ fontWeight: '600', fontSize: '14px', color: '#1f2937' }}>
                  {event.type.replace(/_/g, ' ')}
                </span>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '12px', color: '#6b7280' }}>{formatDate(event.timestamp)}</div>
                <div style={{ fontSize: '11px', color: '#9ca3af' }}>{formatTime(event.timestamp)}</div>
              </div>
            </div>
            
            <div style={{ fontSize: '13px', color: '#4b5563', marginBottom: '8px' }}>
              <span style={{ fontWeight: '500' }}>{event.partyName}</span>
              {isOwnEvent ? ' (you)' : ''}
            </div>

              {Object.entries(event.data).map(([key, value]) => (
                <div key={key} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}>
                  <span style={{ color: '#9ca3af' }}>{key}:</span>
                  <span style={{ color: '#374151' }}>
                    {typeof value === 'number' && key.toLowerCase().includes('amount') 
                      ? formatCurrency(value)
                      : typeof value === 'number'

                {event.signature}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Summary Card Component
function SummaryCard({ label, value, subtext, variant = 'default' }) {
  const variants = {
    default: { bg: '#ffffff', border: '#e5e7eb' },
    success: { bg: '#f0fdf4', border: '#86efac' },
    warning: { bg: '#fffbeb', border: '#fcd34d' },
    danger: { bg: '#fef2f2', border: '#fca5a5' }
  };
  const v = variants[variant];
  
  return (
    <div style={{
      backgroundColor: v.bg,
      border: `1px solid ${v.border}`,
      borderRadius: '12px',
      padding: '20px',
      flex: 1,
      minWidth: '140px'
    }}>
      <div style={{ fontSize: '12px', color: '#6b7280', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
        {label}
      </div>
      <div style={{ fontSize: '24px', fontWeight: '700', color: '#111827', marginBottom: '4px' }}>
        {value}
      </div>
      {subtext && (
        <div style={{ fontSize: '12px', color: '#9ca3af' }}>{subtext}</div>
      )}
    </div>
  );
}

                ['Quantity', `${commitment?.quantity} GPUs`],
                ['Duration', `${commitment?.hours} hours`],
                ['Rate', `${formatCurrency(commitment?.ratePerGpuHour || 0)}/GPU-hour`],
                ['Period', `${formatDate(commitment?.startDate)} – ${formatDate(commitment?.endDate)}`],
                ['Invoice Schedule', 'Weekly']
              ].map(([label, value]) => (
                <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #f3f4f6' }}>
                  <span style={{ color: '#6b7280', fontSize: '14px' }}>{label}</span>
                  <span style={{ color: '#111827', fontSize: '14px', fontWeight: '500' }}>{value}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Event Log */}
          <div style={{
            backgroundColor: 'white',
            borderRadius: '12px',
            border: '1px solid #e5e7eb',
            padding: '24px',
            maxHeight: '500px',
            overflow: 'auto'
          }}>
            <h2 style={{ fontSize: '16px', fontWeight: '600', marginBottom: '20px', color: '#111827' }}>
              Shared Event Log
            </h2>
            <EventLog events={events} perspective="seller" />
          </div>
        </div>
      </div>
    </div>
  );
}

// Main App with View Toggle
function SightlinePrototype() {
  const [view, setView] = useState('buyer');
  const [events, setEvents] = useState(initialEvents);
  const state = deriveState(events);

  const addEvent = (eventData) => {
    const newEvent = {
      id: `evt_${String(events.length + 1).padStart(3, '0')}`,
      timestamp: new Date().toISOString(),
      ...eventData,
      signature: `0x${Math.random().toString(16).slice(2, 6)}...${Math.random().toString(16).slice(2, 6)}`,
      verified: true
    };
    setEvents([...events, newEvent]);
  };

  return (
    <div style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif' }}>
      {/* View Toggle Header */}
      <div style={{
        position: 'sticky',
        top: 0,
        zIndex: 100,
        backgroundColor: '#1f2937',
        padding: '12px 32px',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
          <span style={{ color: 'white', fontWeight: '700', fontSize: '18px' }}>◈ Sightline</span>
          <span style={{ color: '#9ca3af', fontSize: '13px' }}>Coordination Protocol</span>
        </div>
        
        <div style={{ display: 'flex', gap: '4px', backgroundColor: '#374151', borderRadius: '8px', padding: '4px' }}>
          <button
            onClick={() => setView('buyer')}
            style={{
              backgroundColor: view === 'buyer' ? '#3b82f6' : 'transparent',
              color: view === 'buyer' ? 'white' : '#9ca3af',
              border: 'none',
              padding: '8px 20px',
              borderRadius: '6px',
              cursor: 'pointer',
              fontWeight: '500',
              fontSize: '14px',
              transition: 'all 0.15s'
            }}
          >
            Buyer View
          </button>
          <button
            onClick={() => setView('seller')}
            style={{
              backgroundColor: view === 'seller' ? '#10b981' : 'transparent',
              color: view === 'seller' ? 'white' : '#9ca3af',
              border: 'none',
              padding: '8px 20px',
              borderRadius: '6px',
              cursor: 'pointer',
              fontWeight: '500',
              fontSize: '14px',
              transition: 'all 0.15s'
            }}
          >
            Seller View
          </button>
        </div>

        <div style={{ color: '#6b7280', fontSize: '12px' }}>
          {events.length} events • State derived in real-time
        </div>
      </div>

      {/* Dashboard Views */}
      {view === 'buyer' ? (
        <BuyerDashboard events={events} state={state} onAddEvent={addEvent} />
      ) : (
        <SellerDashboard events={events} state={state} onAddEvent={addEvent} />
      )}
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(SightlinePrototype));
</script>
</body>
</html>
