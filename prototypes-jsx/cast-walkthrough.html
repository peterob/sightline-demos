    {label&&<span style={{color:"rgba(255,255,255,0.25)",marginRight:2}}>{label}</span>}<span>{hash}</span>
  </span>
);

const SigBadge = ({sig}) => {
  const auto = sig.includes("auto")||sig.includes("bot")||sig.includes("monitor");
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,background:auto?"rgba(155,111,232,0.1)":"rgba(45,127,249,0.1)",border:`1px solid ${auto?"rgba(155,111,232,0.25)":"rgba(45,127,249,0.25)"}`,borderRadius:3,padding:"1px 6px",fontSize:10,color:auto?"#B89AEF":"#6BA3F9",fontFamily:mono}}>
    <span style={{fontSize:8}}>{auto?"⚙":"✍"}</span> {sig}
  </span>;
};

const Lbl = ({children}) => <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1,marginBottom:8,fontWeight:600}}>{children}</div>;

const Crd = ({children,accent,style={}}) => <div style={{background:"rgba(255,255,255,0.02)",borderRadius:8,border:`1px solid ${accent||"rgba(255,255,255,0.06)"}`,padding:14,marginBottom:14,...style}}>{children}</div>;

// Event card for the timeline
const EvtCard = ({event,isSelected,onClick,isHighlighted}) => {
  const p = PARTIES[event.party];
  const disp = event.type.includes("DISPUTE");
  const settl = event.type==="SETTLEMENT_COMPLETE";
  const acc = event.type.includes("VIEW_ACCESS");
  const bc = acc?"#F5A623":disp?"#E8553A":settl?"#18A86B":"rgba(255,255,255,0.08)";
  const dc = acc?"#F5A623":(p?.color||"#666");

  return (
    <div onClick={onClick} style={{
      padding:"12px 14px",cursor:"pointer",position:"relative",
      background: isSelected ? "rgba(255,255,255,0.06)" : isHighlighted ? "rgba(245,166,35,0.04)" : "transparent",
      borderLeft:`2px solid ${isHighlighted ? "#F5A623" : bc}`,
      transition:"all 0.15s",borderBottom:"1px solid rgba(255,255,255,0.04)",
    }}>
      <div style={{position:"absolute",left:-5,top:16,width:8,height:8,borderRadius:"50%",background:dc,border:isSelected?"2px solid #fff":"2px solid #0D1117",zIndex:2}}/>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <span style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.25)",letterSpacing:1}}>{event.id}</span>
            <span style={{fontSize:9,color:acc?"#F5A623":p?.color,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>{acc?"ACCESS":p?.name}</span>
          </div>
          <div style={{fontSize:12,fontWeight:600,color:acc?"#F5A623":disp?"#E8553A":"#E8E8ED",letterSpacing:-0.2}}>
            {acc&&(event.type==="VIEW_ACCESS_GRANTED"?"🔓 ":"🔒 ")}{disp&&"⚠ "}{LABELS[event.type]}
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}}>{fmtD(event.ts)}</div>
          <div style={{display:"flex",gap:2,marginTop:5}}>
            {event.visibility.map(pk=><span key={pk} style={{width:4,height:4,borderRadius:"50%",background:ACCESS_GRANTS[pk]?.color||"#666",opacity:pk==="sightline"?1:0.5}}/>)}
          </div>
        </div>
        {event.data.netAmount&&<div style={{fontSize:12,fontWeight:700,color:"#E8E8ED",fontFamily:mono,whiteSpace:"nowrap"}}>{fmt$(event.data.netAmount)}</div>}
        {event.data.revisedNetAmount&&<div style={{fontSize:12,fontWeight:700,color:"#F5A623",fontFamily:mono,whiteSpace:"nowrap"}}>{fmt$(event.data.revisedNetAmount)}</div>}
      </div>
    </div>
  );
};

// Event detail inspector
const EvtDetail = ({event,viewAs}) => {
  if(!event) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"rgba(255,255,255,0.15)",fontSize:13,padding:40,textAlign:"center",lineHeight:1.8}}>
    <div><div style={{fontSize:24,marginBottom:8,opacity:0.3}}>◉</div>Select an event to inspect<br/>provenance, visibility & encryption</div>
  </div>;

  const p = PARTIES[event.party];
  const acc = event.type.includes("VIEW_ACCESS");
  const hasSL = event.visibility.includes("sightline");

  return (
    <div style={{padding:"18px 22px",overflowY:"auto",height:"100%"}}>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{width:10,height:10,borderRadius:"50%",background:p?.color,display:"inline-block"}}/>
          <span style={{fontSize:11,color:p?.color,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{p?.name} — {p?.role}</span>
        </div>
        <h2 style={{fontSize:18,fontWeight:700,margin:0,marginBottom:6,fontFamily:serif,letterSpacing:-0.5,color:acc?"#F5A623":"#E8E8ED"}}>{LABELS[event.type]}</h2>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{fmtD(event.ts)}</div>
      </div>

      {/* Visibility */}
      <Crd accent={acc?"rgba(245,166,35,0.25)":undefined}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <Lbl>Visibility Manifest</Lbl>
          <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:hasSL?"rgba(245,166,35,0.12)":"rgba(24,168,107,0.12)",color:hasSL?"#F5A623":"#18A86B",fontWeight:600}}>{hasSL?"OPERATOR HAS VIEW":"COUNTERPARTIES ONLY"}</span>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {event.visibility.map(pk=>{const g=ACCESS_GRANTS[pk];if(!g)return null;const op=pk==="sightline";const me=pk===viewAs;return(
            <div key={pk} style={{display:"flex",alignItems:"center",gap:5,background:op?"rgba(245,166,35,0.08)":me?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",border:`1px solid ${op?"rgba(245,166,35,0.2)":me?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.06)"}`,borderRadius:5,padding:"5px 8px"}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:g.color}}/>
              <div><div style={{fontSize:10,fontWeight:600,color:"#E8E8ED"}}>{g.name}</div><div style={{fontSize:8,fontFamily:mono,color:"rgba(255,255,255,0.25)"}}>{g.keyFp}</div></div>
              {op&&<span style={{fontSize:7,background:"rgba(245,166,35,0.15)",color:"#F5A623",padding:"1px 4px",borderRadius:2,fontWeight:700}}>GRANTED</span>}
              {me&&<span style={{fontSize:7,background:"rgba(255,255,255,0.1)",color:"#E8E8ED",padding:"1px 4px",borderRadius:2,fontWeight:700}}>YOU</span>}
            </div>
          );})}
        </div>
        <div style={{display:"flex",gap:10,fontSize:9,color:"rgba(255,255,255,0.25)",fontFamily:mono,flexWrap:"wrap"}}>
          <span>enc: {event.encryption.algo}</span><span>wrap: {event.encryption.envelope}</span>
          {event.encryption.fieldLevel&&<span style={{color:"#F5A623"}}>field-level active</span>}
        </div>
        {event.encryption.fieldLevel&&event.encryption.redactedFields&&(
          <div style={{marginTop:8,padding:"6px 8px",background:"rgba(255,255,255,0.02)",borderRadius:5}}>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Field-Level Access</div>
            {Object.entries(event.encryption.redactedFields).map(([f,ap])=>(
              <div key={f} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"2px 0"}}>
                <span style={{fontSize:10,fontFamily:mono,color:"rgba(255,255,255,0.4)"}}>{f}</span>
                <div style={{display:"flex",gap:2}}>{ap.map(pk=><span key={pk} style={{width:5,height:5,borderRadius:"50%",background:ACCESS_GRANTS[pk]?.color||"#666"}}/>)}</div>
              </div>
            ))}
          </div>
        )}
      </Crd>

      {/* Hash */}
      <Crd><Lbl>Hash Chain</Lbl><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><HashChip hash={event.prevHash} label="prev"/><span style={{color:"rgba(255,255,255,0.12)",fontSize:13}}>→</span><HashChip hash={event.hash} label="this"/></div></Crd>

      {/* Sigs */}
      <Crd><Lbl>Signatures ({event.signatures.length})</Lbl><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{event.signatures.map((s,i)=><SigBadge key={i} sig={s}/>)}</div></Crd>

      {/* Proof chain */}
      {event.data.proofChain&&(
        <Crd accent="rgba(245,166,35,0.15)"><Lbl>Provenance Chain</Lbl>
          <div style={{fontFamily:mono,fontSize:11,color:"rgba(255,255,255,0.55)",letterSpacing:0.5,lineHeight:1.8}}>{event.data.proofChain.map((c,i)=><div key={i}>{c}</div>)}</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:6,fontStyle:"italic"}}>Every dollar traces to a machine-generated event co-signed by both parties.</div>
        </Crd>
      )}

      {/* Data */}
      <Crd><Lbl>Event Data</Lbl>
        {Object.entries(event.data).filter(([k])=>k!=="proofChain").map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.03)",gap:10}}>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:mono,flexShrink:0}}>{k}</span>
            <span style={{fontSize:11,textAlign:"right",wordBreak:"break-all",maxWidth:"65%",fontFamily:typeof v==="number"||k.includes("hash")||k.includes("Hash")||k.includes("tx")||k.includes("Fingerprint")?mono:"inherit",color:k.includes("mount")||k.includes("Credit")||k==="rate"||k==="ratePerGpuHr"?"#F5A623":k.includes("hash")||k.includes("Hash")||k.includes("tx")?"#9B6FE8":"#E8E8ED"}}>
              {typeof v==="number"&&k.includes("mount")?fmt$(v):typeof v==="number"&&k.includes("tilization")?fmtP(v):typeof v==="number"&&k.includes("Credit")?fmt$(v):Array.isArray(v)?v.join(", "):typeof v==="boolean"?(v?"Yes":"No"):String(v)}
            </span>
          </div>
        ))}
      </Crd>
    </div>
  );
};

  const s = STEPS[step];
  const isBookend = s.phase === "context" || s.phase === "thesis";

  return (
    <div style={{padding:"24px 28px",overflowY:"auto",height:"100%"}}>
      {/* Step counter */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>

        <span style={{fontSize:10,color:"rgba(255,255,255,0.15)"}}>·</span>

      {s.statusQuo && (
        <div style={{
          background:"rgba(255,80,80,0.04)",border:"1px solid rgba(255,80,80,0.12)",

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>

          <div style={{fontSize:13,fontWeight:600,color:"#E8E8ED",marginBottom:12,lineHeight:1.4}}>{s.statusQuo.title}</div>

              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>

            <span style={{fontSize:14,color:"#F5A623"}}>◈</span>

// Main Application
// ═══════════════════════════════════════════════════════════════════════

function CASTWalkthrough() {
  const [step, setStep] = useState(0);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [viewAs, setViewAs] = useState("helios");
  const listRef = useRef(null);

  const s = STEPS[step];
  const showLedger = s.highlightEvents.length > 0 || s.phase === "thesis";

  // Auto-select focus event and viewAs when step changes
  useEffect(() => {
    if (s.focusEvent) {
      const ev = EVENTS.find(e => e.id === s.focusEvent);
      if (ev) setSelectedEvent(ev);
    } else {
      setSelectedEvent(null);
    }
    if (s.viewAs) setViewAs(s.viewAs);
  }, [step]);

  // Scroll highlighted event into view
  useEffect(() => {
    if (listRef.current && s.focusEvent) {
      const el = listRef.current.querySelector(`[data-eid="${s.focusEvent}"]`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, [step]);

  const prev = () => setStep(p => Math.max(0, p - 1));
  const next = () => setStep(p => Math.min(STEPS.length - 1, p + 1));

  // Keyboard nav
  useEffect(() => {
    const h = (e) => { if(e.key==="ArrowRight"||e.key==="ArrowDown")next(); if(e.key==="ArrowLeft"||e.key==="ArrowUp")prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  return (
    <div style={{fontFamily:sans,background:"#0D1117",color:"#E8E8ED",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

      {/* ── Header ── */}
      <div style={{padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.01)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:3,color:"#F5A623",fontFamily:mono}}>CAST</span>
          <div style={{height:14,width:1,background:"rgba(255,255,255,0.08)"}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontWeight:500}}>Investor Walkthrough</span>
          <div style={{height:14,width:1,background:"rgba(255,255,255,0.08)"}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>GPU Compute Financing — CTR-4401</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,color:"rgba(255,255,255,0.2)",letterSpacing:0.5}}>VIEWING AS</span>
          <div style={{display:"flex",gap:2,background:"rgba(255,255,255,0.04)",borderRadius:6,padding:2}}>
            {[{k:"axion",l:"Axion",c:"#E8553A"},{k:"helios",l:"Helios",c:"#2D7FF9"},{k:"norwest",l:"Norwest",c:"#18A86B"},{k:"sightline",l:"Sightline",c:"#F5A623"}].map(p=>(
              <button key={p.k} onClick={()=>setViewAs(p.k)} style={{display:"flex",alignItems:"center",gap:3,padding:"3px 9px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,transition:"all 0.15s",background:viewAs===p.k?"rgba(255,255,255,0.1)":"transparent",color:viewAs===p.k?p.c:"rgba(255,255,255,0.25)"}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:viewAs===p.k?p.c:"rgba(255,255,255,0.12)"}}/>
                {p.l}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Progress bar ── */}
      <div style={{height:2,background:"rgba(255,255,255,0.04)",flexShrink:0}}>
        <div style={{height:"100%",background:"#F5A623",width:`${((step+1)/STEPS.length)*100}%`,transition:"width 0.4s ease"}}/>
      </div>

      {/* ── Body: 3-column layout ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Left: Narrative */}
        <div style={{width:showLedger?420:600,flexShrink:0,borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",overflow:"hidden",transition:"width 0.3s"}}>
          <div style={{flex:1,overflowY:"auto"}}>
            <NarrativePanel step={step}/>
          </div>

          {/* Nav buttons */}
          <div style={{padding:"12px 24px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick={prev} disabled={step===0} style={{padding:"8px 20px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:step===0?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.5)",cursor:step===0?"default":"pointer",fontSize:12,fontWeight:600,transition:"all 0.15s"}}>
              ← Previous
            </button>
            <div style={{display:"flex",gap:4}}>
              {STEPS.map((_,i) => (
                <button key={i} onClick={()=>setStep(i)} style={{width:i===step?20:6,height:6,borderRadius:3,border:"none",cursor:"pointer",background:i===step?"#F5A623":i<step?"rgba(245,166,35,0.3)":"rgba(255,255,255,0.1)",transition:"all 0.3s"}}/>
              ))}
            </div>
            <button onClick={next} disabled={step===STEPS.length-1} style={{padding:"8px 20px",borderRadius:6,border:"none",background:step===STEPS.length-1?"rgba(255,255,255,0.05)":"#F5A623",color:step===STEPS.length-1?"rgba(255,255,255,0.15)":"#0D1117",cursor:step===STEPS.length-1?"default":"pointer",fontSize:12,fontWeight:700,transition:"all 0.15s"}}>
              Next →
            </button>
          </div>
        </div>

        {/* Center: Event ledger */}
        {showLedger && (
          <div style={{width:300,flexShrink:0,borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:10,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,flexShrink:0}}>
              Event Ledger
            </div>
            <div ref={listRef} style={{flex:1,overflowY:"auto"}}>
              {EVENTS.map(ev => (
                <div key={ev.id} data-eid={ev.id}>
                  <EvtCard
                    event={ev}
                    isSelected={selectedEvent?.id===ev.id}
                    isHighlighted={s.highlightEvents.includes(ev.id)}
                    onClick={()=>setSelectedEvent(ev)}
                  />
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Right: Event detail */}
        {showLedger && (
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:"rgba(255,255,255,0.01)"}}>
            <div style={{padding:"8px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:10,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,flexShrink:0}}>
              Event Inspector
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              <EvtDetail event={selectedEvent} viewAs={viewAs}/>
            </div>
          </div>
        )}
      </div>

      {/* ── Footer ── */}
      <div style={{padding:"6px 20px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.01)",flexShrink:0}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.15)",fontFamily:mono}}>
          {EVENTS.length} events · {EVENTS.filter(e=>e.type.includes("VIEW_ACCESS")).length} access · {EVENTS.filter(e=>e.type.includes("DISPUTE")).length} disputes · chain verified
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:"#18A86B",display:"inline-block",animation:"pulse 2s infinite"}}/>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>enc: AES-256-GCM · Use ← → arrow keys to navigate</span>
        </div>
      </div>

      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
        *{box-sizing:border-box}
        button:hover{filter:brightness(1.1)}
      `}</style>
    </div>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(CASTWalkthrough));
</script>
</body>
</html>
