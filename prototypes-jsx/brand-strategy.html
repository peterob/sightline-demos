            {/* Position Framework */}
            <div style={{
              display: 'grid',
              gridTemplateColumns: 'repeat(2, 1fr)',

              marginBottom: '24px'

            }}>

                <div style={{ fontSize: '12px', color: '#999' }}>{selectedArch.risk}</div>
              </div>
            </div>

            {/* Recommendation */}
            <div style={{
              background: 'rgba(255,255,255,0.02)',

                <div key={i} style={{
                  display: 'grid',

              padding: '24px',
              marginBottom: '24px'
            }}>

              }}>
                <div style={{
                  display: 'flex',

                  alignItems: 'flex-start',

                }}>

                  <div style={{
                    background: 'rgba(245, 158, 11, 0.15)',

        {/* BRAND ASSETS */}
        {activeTab === 'assets' && (
          <div style={{ animation: 'fadeIn 0.3s ease' }}>
            {/* Name Options */}
            <div style={{
              background: 'rgba(255,255,255,0.02)',
              border: '1px solid rgba(255,255,255,0.08)',
              borderRadius: '8px',
              padding: '24px',
              marginBottom: '24px'
            }}>
              <div style={{ fontSize: '10px', letterSpacing: '2px', color: '#ec4899', marginBottom: '20px' }}>
                NAME OPTIONS
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
                {brandAssets.name_options.map((n, i) => (
                  <div key={i} style={{
                    background: 'rgba(255,255,255,0.03)',
                    padding: '16px',
                    borderRadius: '6px',
                    border: '1px solid rgba(255,255,255,0.05)'
                  }}>
                    <div style={{ fontSize: '18px', color: '#fff', marginBottom: '8px' }}>{n.name}</div>
                    <div style={{ fontSize: '11px', color: '#888', marginBottom: '8px' }}>{n.vibe}</div>
                    <div style={{ fontSize: '10px', color: '#f59e0b' }}>⚠ {n.concern}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Taglines */}
            <div style={{
              background: 'rgba(139, 92, 246, 0.1)',
              border: '1px solid rgba(139, 92, 246, 0.3)',
              borderRadius: '8px',
              padding: '24px',
              marginBottom: '24px'
            }}>
              <div style={{ fontSize: '10px', letterSpacing: '2px', color: '#8b5cf6', marginBottom: '20px' }}>
                TAGLINE OPTIONS
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
                {brandAssets.tagline_options.map((t, i) => (
                  <div key={i} style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    padding: '12px 16px',
                    background: 'rgba(255,255,255,0.03)',
                    borderRadius: '4px'
                  }}>
                    <div style={{ fontSize: '13px', color: '#fff' }}>"{t.line}"</div>
                    <div style={{ fontSize: '9px', color: '#666', letterSpacing: '1px' }}>{t.tone.toUpperCase()}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Visual Principles */}
            <div style={{
              background: 'rgba(255,255,255,0.02)',
              border: '1px solid rgba(255,255,255,0.08)',
              borderRadius: '8px',
              padding: '24px'
            }}>
              <div style={{ fontSize: '10px', letterSpacing: '2px', color: '#888', marginBottom: '20px' }}>
                VISUAL PRINCIPLES
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '10px' }}>
                {brandAssets.visual_principles.map((v, i) => (
                  <div key={i} style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '10px',
                    fontSize: '12px',
                    color: '#aaa'
                  }}>
                    <span style={{ color: '#ec4899' }}>◆</span>
                    {v}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      <style>{`
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
};

// export default BrandStrategy;

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(BrandStrategy));
</script>
</body>
</html>
