    function CashFlowSummaryTable() {
      // Build the 13-week cash flow from the data tables
      const openingCash = 125000;
      
      const cashFlowWeeks = salesData.map((sales, idx) => {
        // Inflows
        const netRevenue = sales.netRevenue;
        
        // PO Payments due this week
        const weekStart = new Date(sales.weekStart);
        const weekEnd = new Date(sales.weekEnd);
        const poDue = purchaseOrders.filter(po => {
          const dueDate = new Date(po.paymentDueDate);
          return dueDate >= weekStart && dueDate <= weekEnd && !po.paymentDate;
        });
        const poPayments = poDue.reduce((s, po) => s + (po.invoiceAmount || po.amount) - (po.varianceAmount || 0), 0);
        
        // Operating expenses
        const weeklyOpex = operatingExpenses.weekly.reduce((s, e) => s + e.amount, 0);
        const scheduledThisWeek = operatingExpenses.scheduled
          .filter(e => {
            const d = new Date(e.date);
            return d >= weekStart && d <= weekEnd;
          })
          .reduce((s, e) => s + e.amount, 0);
        
        // Fulfillment costs (pick/pack + shipping)
        const pickPack = sales.orders * (fulfillmentRates.pickAndPack.base + 0.8 * fulfillmentRates.pickAndPack.perItem);
        const shipping = sales.orders * fulfillmentRates.shipping.avgCostPerOrder;
        
        const totalOutflows = poPayments + weeklyOpex + scheduledThisWeek + pickPack + shipping;
        const netCash = netRevenue - totalOutflows;
        
        return {
          week: sales.weekStart,
          weekLabel: getWeekLabel(sales.weekStart),
          type: sales.type,
          netRevenue,
          poPayments,
          poDue: poDue.map(po => po.id),
          weeklyOpex,
          scheduledOpex: scheduledThisWeek,
          fulfillmentCosts: pickPack + shipping,
          totalOutflows,
          netCash
        };
      });

      // Calculate running balances
      let balance = openingCash;
      cashFlowWeeks.forEach(week => {
        week.openingBalance = balance;
        week.closingBalance = balance + week.netCash;
        balance = week.closingBalance;
      });

      const minCash = Math.min(...cashFlowWeeks.map(w => w.closingBalance));
      const minCashWeek = cashFlowWeeks.find(w => w.closingBalance === minCash);

      return (
        <div>
          <div className="section-header">💵 13-Week Cash Flow Summary</div>
          <div className="data-card">
            {/* Summary metrics */}
            <div style={{ padding: '20px', borderBottom: '1px solid #e5e7eb' }}>
              <div className="summary-grid">
                <SummaryCard label="Opening Cash" value={formatCurrency(openingCash)} sub="Week 1" />
                <SummaryCard label="Total Net Revenue" value={formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.netRevenue, 0))} sub="13-week projected" variant="success" />
                <SummaryCard label="Total Outflows" value={formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.totalOutflows, 0))} sub="PO + Opex + Fulfillment" variant="danger" />
                <SummaryCard label="Ending Cash" value={formatCurrency(cashFlowWeeks[cashFlowWeeks.length - 1]?.closingBalance)} sub={cashFlowWeeks[cashFlowWeeks.length - 1]?.weekLabel} variant={cashFlowWeeks[cashFlowWeeks.length - 1]?.closingBalance > openingCash ? 'success' : 'warning'} />
                <SummaryCard label="Minimum Cash" value={formatCurrency(minCash)} sub={minCashWeek?.weekLabel} variant={minCash > 50000 ? 'success' : minCash > 0 ? 'warning' : 'danger'} />
              </div>
            </div>
            
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    <th>Week</th>
                    <th className="text-center">Type</th>
                    <th className="text-right">Opening</th>
                    <th className="text-right">Net Revenue</th>
                    <th className="text-right">PO Payments</th>
                    <th className="text-right">Operating</th>
                    <th className="text-right">Fulfillment</th>
                    <th className="text-right">Net Cash</th>
                    <th className="text-right">Closing</th>
                    <th>POs Due</th>
                  </tr>
                </thead>
                <tbody>
                  {cashFlowWeeks.map((week, idx) => (
                    <tr key={idx} className={week.type === 'CURRENT' ? 'bg-amber-50' : week.type === 'PROJECTED' ? '' : ''}>
                      <td className="font-semibold">{week.weekLabel}</td>
                      <td className="text-center">
                        <span className={`status-badge ${getStatusBadge(week.type)}`}>{week.type}</span>
                      </td>
                      <td className="text-right font-mono">{formatCurrency(week.openingBalance)}</td>
                      <td className="text-right font-mono text-green">{formatCurrency(week.netRevenue)}</td>
                      <td className="text-right font-mono">{week.poPayments > 0 ? <span className="text-red">({formatCurrency(week.poPayments)})</span> : '—'}</td>
                      <td className="text-right font-mono text-red">({formatCurrency(week.weeklyOpex + week.scheduledOpex)})</td>
                      <td className="text-right font-mono text-red">({formatCurrency(week.fulfillmentCosts)})</td>
                      <td className="text-right font-mono font-semibold">
                        <span className={week.netCash >= 0 ? 'text-green' : 'text-red'}>{formatCurrency(week.netCash)}</span>
                      </td>
                      <td className="text-right font-mono font-semibold">
                        <span className={week.closingBalance < 50000 ? 'text-amber' : ''}>{formatCurrency(week.closingBalance)}</span>
                      </td>
                      <td className="font-mono text-gray" style={{ fontSize: '10px' }}>{week.poDue.join(', ') || '—'}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{ background: '#e0e7ff', fontWeight: 700 }}>
                    <td>TOTAL</td>
                    <td></td>
                    <td></td>
                    <td className="text-right font-mono text-green">{formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.netRevenue, 0))}</td>
                    <td className="text-right font-mono text-red">({formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.poPayments, 0))})</td>
                    <td className="text-right font-mono text-red">({formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.weeklyOpex + w.scheduledOpex, 0))})</td>
                    <td className="text-right font-mono text-red">({formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.fulfillmentCosts, 0))})</td>
                    <td className="text-right font-mono">{formatCurrency(cashFlowWeeks.reduce((s, w) => s + w.netCash, 0))}</td>
                    <td className="text-right font-mono">{formatCurrency(cashFlowWeeks[cashFlowWeeks.length - 1]?.closingBalance)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function VendorSummaryTable() {
      return (
        <div>
          <div className="section-header">🏭 Vendor Master</div>
          <div className="data-card">
            <table>
              <thead>
                <tr>
                  <th>Vendor ID</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Country</th>
                  <th className="text-right">Payment Terms</th>
                  <th className="text-right">Credit Limit</th>
                  <th className="text-right">YTD Spend</th>
                  <th className="text-right">Open POs</th>
                </tr>
              </thead>
              <tbody>
                {vendors.map(vendor => {
                  const openPOs = purchaseOrders.filter(po => po.vendorId === vendor.id && po.status !== 'CLOSED');
                  const openPOValue = openPOs.reduce((s, po) => s + po.amount, 0);
                  return (
                    <tr key={vendor.id}>
                      <td className="font-mono">{vendor.id}</td>
                      <td className="font-semibold">{vendor.name}</td>
                      <td>{vendor.category}</td>
                      <td>{vendor.country}</td>
                      <td className="text-right">Net {vendor.paymentTerms}</td>
                      <td className="text-right font-mono">{vendor.creditLimit ? formatCurrency(vendor.creditLimit) : '—'}</td>
                      <td className="text-right font-mono">{formatCurrency(vendor.ytdSpend)}</td>
                      <td className="text-right font-mono">{formatCurrency(openPOValue)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================

    function App() {
      const [activeTab, setActiveTab] = useState('summary');

      const tabs = [
        { id: 'summary', label: '📊 Cash Flow Summary' },
        { id: 'sales', label: '💰 Sales Data' },
        { id: 'purchase-orders', label: '📦 Purchase Orders' },
        { id: 'ap', label: '📑 Accounts Payable' },
        { id: 'opex', label: '🏢 Operating Expenses' },
        { id: 'fulfillment', label: '🚚 Fulfillment Costs' },
        { id: 'vendors', label: '🏭 Vendors' },
      ];

      return (
        <div>
          {/* Header */}
          <div style={{ background: '#1f2937', color: 'white', padding: '20px 32px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
              <span style={{ fontSize: '24px' }}>◈</span>
              <h1 style={{ fontSize: '24px', fontWeight: '700', margin: 0 }}>Sightline - 13 Week Cash Flow Model</h1>
            </div>
            <div style={{ color: '#9ca3af', fontSize: '14px' }}>
              Lumina Home & Co. • Supporting Data Tables • Generated {new Date().toLocaleDateString()}
            </div>
          </div>

          {/* Main Content */}
          <div style={{ padding: '24px 32px', maxWidth: '1600px', margin: '0 auto' }}>
            {/* Tabs */}
            <div className="tab-container">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  className={`tab ${activeTab === tab.id ? 'active' : ''}`}
                  onClick={() => setActiveTab(tab.id)}
                >
                  {tab.label}
                </button>
              ))}
            </div>

            {/* Tab Content */}
            {activeTab === 'summary' && <CashFlowSummaryTable />}
            {activeTab === 'sales' && <SalesDataTable />}
            {activeTab === 'purchase-orders' && <PurchaseOrdersTable />}
            {activeTab === 'ap' && <AccountsPayableTable />}
            {activeTab === 'opex' && <OperatingExpensesTable />}
            {activeTab === 'fulfillment' && <FulfillmentCostsTable />}
            {activeTab === 'vendors' && <VendorSummaryTable />}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
