    function StatusBadge({ status }) {
      const statusConfig = {

        SHIPPED: { bg: '#d1fae5', text: '#065f46', label: 'Shipped' },
        PROCESSING: { bg: '#fef3c7', text: '#92400e', label: 'Processing' },
        VARIANCE_FLAGGED: { bg: '#fee2e2', text: '#991b1b', label: 'Issue' }
      };
      const config = statusConfig[status] || statusConfig.DRAFT;
      
      return (
        <span style={{
          padding: '4px 10px',
          borderRadius: '9999px',
          fontSize: '11px',
          fontWeight: '600',
          backgroundColor: config.bg,
          color: config.text,

    function MetricCard({ label, value, subtext, trend, variant = 'default', large = false }) {
      const variants = {
        default: { bg: '#ffffff', border: '#e5e7eb' },
        success: { bg: '#f0fdf4', border: '#86efac' },
        warning: { bg: '#fffbeb', border: '#fcd34d' },
        danger: { bg: '#fef2f2', border: '#fca5a5' },
        info: { bg: '#eff6ff', border: '#93c5fd' }
      };
      const v = variants[variant];
      
      return (
        <div style={{
          backgroundColor: v.bg,
          border: `1px solid ${v.border}`,
          borderRadius: '12px',
          padding: large ? '24px' : '20px',
          flex: 1,
          minWidth: large ? '200px' : '140px'
        }}>
          <div style={{ fontSize: '12px', color: '#6b7280', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
            {label}
          </div>
          <div style={{ fontSize: large ? '32px' : '24px', fontWeight: '700', color: '#111827', marginBottom: '4px', display: 'flex', alignItems: 'baseline', gap: '8px' }}>
            {value}
            {trend && (
              <span style={{ 
                fontSize: '14px', 
                fontWeight: '500',
                color: trend > 0 ? '#059669' : trend < 0 ? '#dc2626' : '#6b7280'
              }}>
                {trend > 0 ? '↑' : trend < 0 ? '↓' : '→'} {Math.abs(trend)}%
              </span>
            )}
          </div>
          {subtext && (
            <div style={{ fontSize: '12px', color: '#9ca3af' }}>{subtext}</div>
          )}
        </div>
      );
    }

    function ProgressBar({ value, max, color = '#3b82f6', height = 8 }) {
      const pct = Math.min((value / max) * 100, 100);
      return (
        <div style={{ backgroundColor: '#e5e7eb', borderRadius: height/2, height, width: '100%', overflow: 'hidden' }}>
          <div style={{ backgroundColor: color, height: '100%', width: `${pct}%`, borderRadius: height/2, transition: 'width 0.3s' }} />
        </div>
      );
    }

    function ComparisonBar({ before, after, label, format = 'number', invertColors = false }) {
      const improvement = before > 0 ? ((before - after) / before) * 100 : 0;
      const isImproved = invertColors ? after > before : after < before;
      
      return (
        <div style={{ marginBottom: '20px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
            <span style={{ fontSize: '14px', color: '#374151', fontWeight: '500' }}>{label}</span>

        laborDollars: (before.hoursSpentReconciling - after.hoursSpentReconciling) * 4 * 85, // $85/hr for ops staff
        recoveredVariances: (after.poVariancesValue - before.poVariancesValue) * 4,
        fulfillmentSavings: (before.fulfillmentErrorsCost - after.fulfillmentErrorsCost) * 4,
        chargebackSavings: (before.chargebacksLost - after.chargebacksLost) * 4,
        totalValue: 0
      };
      annualizedSavings.totalValue = annualizedSavings.laborDollars + annualizedSavings.recoveredVariances + annualizedSavings.fulfillmentSavings + annualizedSavings.chargebackSavings;

        <div style={{ padding: '32px', backgroundColor: '#f9fafb', minHeight: '100vh' }}>

                    <div style={{ fontSize: '14px', fontWeight: '600', color: '#92400e', marginTop: '8px' }}>{formatCurrency(695)} at risk</div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '32px' }}>

      );
    }

    // ============================================

            <div style={{ marginBottom: '32px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
                <h1 style={{ fontSize: '28px', fontWeight: '700', color: '#111827', margin: 0 }}>Fulfillment Operations</h1>
              </div>
              <div style={{ color: '#6b7280' }}>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <div style={{ padding: '16px', backgroundColor: '#fef3c7', borderRadius: '8px', border: '1px solid #fcd34d' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                      <div>
                        <div style={{ fontWeight: '600', color: '#111827' }}>PO-2025-0847</div>
                        <div style={{ fontSize: '12px', color: '#6b7280' }}>Luminaire Factory Co.</div>
                      </div>
                      <StatusBadge status="VARIANCE_OPEN" />
                    </div>
                    <div style={{ fontSize: '12px', color: '#92400e' }}>
                      ⚠ Receiving variance: 8 short + 5 damaged
                    </div>
                  </div>
                  
                  <div style={{ padding: '16px', backgroundColor: '#f0fdf4', borderRadius: '8px', border: '1px solid #86efac' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                      <div>
                        <div style={{ fontWeight: '600', color: '#111827' }}>PO-2025-0852</div>
                        <div style={{ fontSize: '12px', color: '#6b7280' }}>HomeStyle Textiles</div>
                      </div>
                      <StatusBadge status="ACTIVE" />
                    </div>
                    <div style={{ fontSize: '12px', color: '#166534' }}>

              {/* Outbound Issues */}

                <div style={{ padding: '16px', backgroundColor: '#fef2f2', borderRadius: '8px', border: '1px solid #fca5a5' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                    <div>
                      <div style={{ fontWeight: '600', color: '#991b1b', marginBottom: '4px' }}>⚠ Wrong Item Shipped</div>
                      <div style={{ fontSize: '12px', color: '#7f1d1d' }}>FO-2025-12855 • Jennifer Adams</div>
                    </div>
                    <StatusBadge status="VARIANCE_FLAGGED" />
                  </div>
                  <div style={{ fontSize: '12px', color: '#6b7280', marginBottom: '12px' }}>
                    Picker: T. Williams • Allocated from BIN-A4-23<br/>
                    Expected: BLK-LIN-011 (Linen Duvet)<br/>

                  <div style={{ display: 'flex', gap: '8px' }}>

    // ============================================
    // EVENT LOG COMPONENT
    // ============================================

    function EventLog({ events, perspective }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {events.slice().reverse().map(event => {
            const style = eventStyles[event.type] || { bg: '#f3f4f6', border: '#9ca3af', icon: '•' };
            const isOwnEvent = event.party === perspective;
            
            return (
              <div key={event.id} style={{ backgroundColor: style.bg, borderLeft: `4px solid ${style.border}`, borderRadius: '8px', padding: '16px', opacity: isOwnEvent ? 1 : 0.85 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span style={{ fontSize: '18px' }}>{style.icon}</span>
                    <span style={{ fontWeight: '600', fontSize: '14px', color: '#1f2937' }}>{event.type.replace(/_/g, ' ')}</span>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: '12px', color: '#6b7280' }}>{formatDate(event.timestamp)}</div>
                    <div style={{ fontSize: '11px', color: '#9ca3af' }}>{formatTime(event.timestamp)}</div>
                  </div>
                </div>
                <div style={{ fontSize: '13px', color: '#4b5563', marginBottom: '8px' }}>
                  <span style={{ fontWeight: '500' }}>{event.partyName}</span>{isOwnEvent ? ' (you)' : ''}
                </div>
                <div style={{ fontSize: '12px', color: '#6b7280', fontFamily: 'monospace', backgroundColor: 'rgba(255,255,255,0.5)', padding: '8px', borderRadius: '4px' }}>
                  {Object.entries(event.data).slice(0, 6).map(([key, value]) => (
                    <div key={key} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0' }}>
                      <span style={{ color: '#9ca3af' }}>{key}:</span>
                      <span style={{ color: '#374151', maxWidth: '180px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {typeof value === 'number' && (key.toLowerCase().includes('value') || key.toLowerCase().includes('amount') || key.toLowerCase().includes('total'))
                          ? formatCurrency(value)
                          : typeof value === 'object' 
                          ? JSON.stringify(value).slice(0, 30) + '...'
                          : String(value)}
                      </span>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: '8px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                  <span style={{ width: '8px', height: '8px', borderRadius: '50%', backgroundColor: event.verified ? '#10b981' : '#f59e0b', display: 'inline-block' }} />
                  <span style={{ fontSize: '11px', color: '#6b7280', fontFamily: 'monospace' }}>{event.signature}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================

    function SightlinePrototype() {
      const [view, setView] = useState('reconciliation');
      const [events, setEvents] = useState(initialEvents);

      const addEvent = (eventData) => {
        const newEvent = {
          id: `evt_${String(events.length + 1).padStart(3, '0')}`,
          timestamp: new Date().toISOString(),
          ...eventData,
          signature: `0x${Math.random().toString(16).slice(2, 6)}...${Math.random().toString(16).slice(2, 6)}`,
          verified: true
        };
        setEvents([...events, newEvent]);
      };

      const views = [
        { id: 'reconciliation', label: 'Reconciliation ROI', color: '#059669' },
        { id: 'cashflow', label: 'Cash Flow', color: '#6366f1' },
        { id: 'buyer', label: 'Brand View', color: '#3b82f6' },
        { id: 'seller', label: 'Vendor View', color: '#f59e0b' },
        { id: '3pl', label: '3PL View', color: '#10b981' }
      ];

      return (
        <div>
          {/* Navigation Header */}
          <div style={{
            position: 'sticky',
            top: 0,
            zIndex: 100,
            backgroundColor: '#1f2937',
            padding: '12px 32px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <span style={{ color: 'white', fontWeight: '700', fontSize: '18px' }}>◈ Sightline</span>
              <span style={{ color: '#9ca3af', fontSize: '13px' }}>Ecommerce Supply Chain</span>
            </div>
            
            <div style={{ display: 'flex', gap: '4px', backgroundColor: '#374151', borderRadius: '8px', padding: '4px' }}>
              {views.map(v => (
                <button
                  key={v.id}
                  onClick={() => setView(v.id)}
                  style={{
                    backgroundColor: view === v.id ? v.color : 'transparent',
                    color: view === v.id ? 'white' : '#9ca3af',
                    border: 'none',
                    padding: '8px 14px',
                    borderRadius: '6px',
                    cursor: 'pointer',
                    fontWeight: '500',
                    fontSize: '12px',
                    transition: 'all 0.15s'
                  }}
                >
                  {v.label}
                </button>
              ))}
            </div>

            <div style={{ color: '#6b7280', fontSize: '12px' }}>
              {events.length} events • {purchaseOrders.length} POs • {fulfillmentOrders.length} orders
            </div>
          </div>

          {/* Dashboard Views */}
          {view === 'reconciliation' && <ReconciliationDashboard events={events} />}
          {view === 'cashflow' && <CashFlowDashboard events={events} />}
          {view === 'buyer' && <BuyerDashboard events={events} onAddEvent={addEvent} />}
          {view === 'seller' && <SellerDashboard events={events} onAddEvent={addEvent} />}
          {view === '3pl' && <ThreePLDashboard events={events} onAddEvent={addEvent} />}
        </div>
      );
    }

    ReactDOM.render(<SightlinePrototype />, document.getElementById('root'));
  </script>
