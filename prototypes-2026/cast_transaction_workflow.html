<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAST — End-to-End Transaction Workflow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f9f9f7;color:#1a1a1a}

.shell{max-width:900px;margin:0 auto;padding:20px 20px 40px}
.doc-title{font-size:13px;font-weight:500;color:#888;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:16px}

.progress-bar{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid #e0ddd6;margin-bottom:0;scrollbar-width:none}
.progress-bar::-webkit-scrollbar{display:none}
.step-pip{flex:1;min-width:68px;padding:10px 6px 8px;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;position:relative}
.step-pip:hover{background:#f4f4f0}
.step-pip.active{border-bottom-color:#0E7C7B}
.step-pip.done{border-bottom-color:#9FE1CB}
.pip-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin:0 auto 4px;background:#f4f4f0;color:#888;border:0.5px solid #e0ddd6;transition:all 0.15s}
.step-pip.active .pip-num{background:#0E7C7B;color:#fff;border-color:#0E7C7B}
.step-pip.done .pip-num{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.step-pip.pivot .pip-num{background:#1B2A4A;color:#fff;border-color:#1B2A4A}
.step-pip.pivot.active .pip-num{background:#0E7C7B;color:#fff}
.pip-label{font-size:10px;color:#888;line-height:1.3}
.step-pip.active .pip-label{color:#1a1a1a;font-weight:500}

.step-content{padding:20px 0 0}

.step-header{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:#f4f4f0;border-radius:10px;border:0.5px solid #e0ddd6;margin-bottom:18px}
.step-header.pivot-header{background:#1B2A4A;border-color:#1B2A4A}
.step-num-lg{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;background:#E1F5EE;color:#085041}
.pivot-header .step-num-lg{background:#0E7C7B;color:#fff}
.step-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.pivot-header .step-title{color:#fff}
.step-subtitle{font-size:12px;color:#888}
.pivot-header .step-subtitle{color:rgba(255,255,255,0.55)}
.pivot-tag{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;background:#0DCFCE;color:#04342C}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}

.card{background:#fff;border:0.5px solid #e0ddd6;border-radius:10px;padding:14px}
.card-label{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}

.who-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e0ddd6;font-size:13px;color:#1a1a1a}
.who-row:last-child{border-bottom:none}
.who-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;flex-shrink:0}
.badge-buyer{background:#E6F1FB;color:#0C447C}
.badge-vendor{background:#FAEEDA;color:#633806}
.badge-system{background:#E1F5EE;color:#085041}
.badge-policy{background:#EEEDFE;color:#3C3489}

.event-record{background:#f4f4f0;border:0.5px solid #e0ddd6;border-radius:8px;padding:12px 14px;font-family:'Courier New',monospace;font-size:11px;line-height:1.9;margin-bottom:14px;color:#888}
.ef{color:#1a1a1a;font-weight:500}
.ev{color:#0F6E56}
.eh{color:#854F0B;word-break:break-all}
.em{color:#aaa}

.state-tracks{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.track-row{display:flex;align-items:center;gap:10px}
.track-name{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;width:72px;flex-shrink:0}
.track-steps{display:flex;gap:3px;flex:1}
.ts{height:22px;flex:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;background:#f4f4f0;color:#888}
.ts.done{background:#E1F5EE;color:#085041}
.ts.active{background:#0E7C7B;color:#fff}
.ts.blocked{background:#FCEBEB;color:#A32D2D}
.ts.pending{background:#FAEEDA;color:#633806}

.tm-phone{background:#1B2A4A;border-radius:12px;padding:18px;color:#fff;max-width:280px}
.tm-co{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px}
.tm-inv{font-size:14px;font-weight:500;margin-bottom:3px}
.tm-amt{font-size:26px;font-weight:500;color:#0DCFCE;margin-bottom:2px}
.tm-det{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:2px}
.tm-dl{font-size:11px;color:rgba(255,255,255,0.35);margin:10px 0 14px}
.tm-btns{display:flex;gap:7px}
.tm-btn{flex:1;padding:9px 4px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);font-size:12px;font-weight:500;color:#fff;text-align:center;cursor:pointer}
.tm-btn.primary{background:#0E7C7B;border-color:#0E7C7B}

.check-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;border:0.5px solid #e0ddd6;font-size:12px;background:#fff;color:#1a1a1a}
.chk{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-left:12px}
.chk-pass{background:#E1F5EE;color:#085041}
.chk-pend{background:#FAEEDA;color:#633806}
.chk-gray{background:#f4f4f0;color:#888}

.posting-block{background:#f4f4f0;border:0.5px solid #e0ddd6;border-radius:8px;padding:14px;margin-bottom:14px}
.pb-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #e0ddd6;font-size:12px}
.pb-row:last-child{border-bottom:none}
.pb-key{color:#888}
.pb-val{color:#1a1a1a;font-weight:500}
.pb-hash{color:#854F0B;font-family:'Courier New',monospace;font-size:10px}

.timeline-line{display:flex;flex-direction:column;gap:0;border-left:2px solid #e0ddd6;margin-left:10px;padding-left:16px;margin-bottom:14px}
.tl-item{position:relative;padding:6px 0 12px;font-size:12px;color:#888}
.tl-item::before{content:'';position:absolute;left:-22px;top:9px;width:8px;height:8px;border-radius:50%;background:#e0ddd6}
.tl-item.done::before{background:#0E7C7B}
.tl-item.pivot::before{background:#1B2A4A;width:10px;height:10px;left:-23px}
.tl-title{font-weight:500;color:#1a1a1a;margin-bottom:2px}

.nav-btns{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:0.5px solid #e0ddd6;margin-top:4px}
.nav-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;transition:background 0.1s}
.nav-btn:hover{background:#f4f4f0}
.nav-btn.primary{background:#0E7C7B;color:#fff;border-color:#0E7C7B}
.nav-btn.primary:hover{background:#0fa8a7}
.nav-btn:disabled{opacity:0.3;cursor:default}
.step-counter{font-size:12px;color:#888}

.callout{padding:12px 14px;border-radius:0;border-left:3px solid #0E7C7B;background:#E1F5EE;font-size:12px;color:#085041;line-height:1.6;margin-bottom:14px}
.callout.amber{border-left-color:#C17B2F;background:#FFF8E8;color:#633806}
.callout.navy{border-left-color:#1B2A4A;background:#EEF1F7;color:#1B2A4A}
.callout.strong{font-size:13px;font-weight:500}

.label-row{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 6px}
</style>
</head>
<body>
<div class="shell">
  <div class="doc-title">CAST — end-to-end transaction workflow · Apex Electrical · INV-1048 · $47,200</div>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="step-content" id="step-content"></div>
</div>

<script>

let current = 0;

function renderProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = STEPS.map((s,i) => `
    <div class="step-pip ${i===current?'active':''} ${i<current?'done':''} ${s.pivot?'pivot':''}"
         onclick="goTo(${i})">
      <div class="pip-num">${i===current&&s.pivot?'★':s.id}</div>
      <div class="pip-label">${s.label}</div>
    </div>
  `).join('');
}

function renderStep() {
  const s = STEPS[current];
  const isPivot = s.pivot;
  document.getElementById('step-content').innerHTML = `
    <div class="step-header ${isPivot?'pivot-header':''}">
      <div class="step-num-lg">${isPivot?'★':s.id}</div>
      <div style="flex:1">
        <div class="step-title">${s.label}</div>
        <div class="step-subtitle">${s.subtitle}</div>
      </div>
      <div style="flex-shrink:0;font-size:11px;padding:3px 8px;border-radius:20px;${isPivot?'background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7)':'background:#f4f4f0;color:#888'}">
        ${s.who}
      </div>
      ${isPivot?'<div class="pivot-tag">Architectural pivot</div>':''}
    </div>
    ${s.render()}
    <div class="nav-btns">
      <button class="nav-btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Previous</button>
      <span class="step-counter">Step ${current+1} of ${STEPS.length}</span>
      <button class="nav-btn primary" onclick="goTo(${current+1})" ${current===STEPS.length-1?'disabled':''}>Next →</button>
    </div>
  `;
}

function goTo(i) {
  if(i<0||i>=STEPS.length) return;
  current = i;
  renderProgress();
  renderStep();
}

renderProgress();
renderStep();
</script>
