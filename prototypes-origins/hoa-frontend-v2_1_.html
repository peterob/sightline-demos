<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Payment System - AI Powered</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        // ============================================================================
        // CONFIGURATION - Update these with your Supabase credentials
        // ============================================================================
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        // Initialize Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // React hooks
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // ============================================================================
        // MAIN APP COMPONENT
        // ============================================================================
        function App() {
            const [session, setSession] = useState(null);
            const [loading, setLoading] = useState(true);
            const [userProfile, setUserProfile] = useState(null);
            
            useEffect(() => {
                // Check initial session
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (session) loadUserProfile(session.user.id);
                    setLoading(false);
                });
                
                // Listen for auth changes
                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (session) loadUserProfile(session.user.id);
                });
                
                return () => subscription.unsubscribe();
            }, []);
            
            const loadUserProfile = async (userId) => {
                const { data, error } = await supabaseClient
                    .from('hoa_users')
                    .select('*, hoas(*)')
                    .eq('id', userId)
                    .single();
                
                if (data) setUserProfile(data);
            };
            
            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="animate-pulse-slow">
                            <lucide.Loader className="h-8 w-8 text-blue-600 animate-spin" />
                        </div>
                    </div>
                );
            }
            
            if (!session) {
                return <LoginPage />;
            }
            
            return <Dashboard userProfile={userProfile} session={session} />;
        }
        
        // ============================================================================
        // LOGIN PAGE
        // ============================================================================
        function LoginPage() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                
                const { error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    setError(error.message);
                    setLoading(false);
                }
            };
            
            const handleDemoLogin = async (role) => {
                const demoCredentials = {
                    treasurer: { email: 'treasurer@demo.com', password: 'demo123' },
                    president: { email: 'president@demo.com', password: 'demo123' },
                    resident: { email: 'resident@demo.com', password: 'demo123' }
                };
                
                const creds = demoCredentials[role];
                setEmail(creds.email);
                setPassword(creds.password);
                
                setLoading(true);
                const { error } = await supabaseClient.auth.signInWithPassword(creds);
                
                if (error) {
                    setError('Demo user not set up. Please create demo users first.');
                    setLoading(false);
                }
            };
            
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                    <div className="max-w-md w-full">
                        <div className="bg-white rounded-2xl shadow-xl p-8 animate-slide-up">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4">
                                    <lucide.Shield className="h-8 w-8 text-white" />
                                </div>
                                <h1 className="text-3xl font-bold text-gray-900">HOA Payment System</h1>
                                <p className="text-gray-600 mt-2">Cryptographically Secure • AI Powered</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Email Address
                                    </label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="you@example.com"
                                        required
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Password
                                    </label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>
                                
                                {error && (
                                    <div className="bg-red-50 text-red-800 p-3 rounded-lg text-sm">
                                        {error}
                                    </div>
                                )}
                                
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors disabled:opacity-50"
                                >
                                    {loading ? 'Signing in...' : 'Sign In'}
                                </button>
                            </form>
                            
                            <div className="mt-8 pt-8 border-t border-gray-200">
                                <p className="text-center text-sm text-gray-600 mb-4">Quick demo login:</p>
                                <div className="grid grid-cols-3 gap-2">
                                    <button
                                        onClick={() => handleDemoLogin('treasurer')}
                                        className="px-3 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-medium hover:bg-green-200 transition-colors"
                                    >
                                        Treasurer
                                    </button>
                                    <button
                                        onClick={() => handleDemoLogin('president')}
                                        className="px-3 py-2 bg-purple-100 text-purple-700 rounded-lg text-sm font-medium hover:bg-purple-200 transition-colors"
                                    >
                                        President
                                    </button>
                                    <button
                                        onClick={() => handleDemoLogin('resident')}
                                        className="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors"
                                    >
                                        Resident
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div className="mt-8 text-center">
                            <div className="flex items-center justify-center space-x-6 text-sm text-gray-600">
                                <div className="flex items-center">
                                    <lucide.Lock className="h-4 w-4 mr-1" />
                                    Cryptographic Audit Trail
                                </div>
                                <div className="flex items-center">
                                    <lucide.Brain className="h-4 w-4 mr-1" />
                                    AI Categorization
                                </div>
                                <div className="flex items-center">
                                    <lucide.Shield className="h-4 w-4 mr-1" />
                                    Fraud Detection
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // ============================================================================
        // DASHBOARD COMPONENT
        // ============================================================================
        function Dashboard({ userProfile, session }) {
            const [activeView, setActiveView] = useState('overview');
            const [notifications, setNotifications] = useState([]);
            
            useEffect(() => {
                if (userProfile) {
                    loadNotifications();
                }
            }, [userProfile]);
            
            const loadNotifications = async () => {
                const { data } = await supabaseClient
                    .from('notifications')
                    .select('*')
                    .eq('recipient_id', userProfile.id)
                    .is('read_at', null)
                    .order('sent_at', { ascending: false })
                    .limit(5);
                
                setNotifications(data || []);
            };
            
            const handleSignOut = async () => {
                await supabaseClient.auth.signOut();
            };
            
            const menuItems = [
                { id: 'overview', label: 'Overview', icon: 'LayoutDashboard', roles: ['all'] },
                { id: 'payments', label: 'Payments', icon: 'DollarSign', roles: ['all'] },
                { id: 'submit', label: 'Submit Request', icon: 'Plus', roles: ['all'] },
                { id: 'approve', label: 'Approve Payments', icon: 'CheckCircle', roles: ['treasurer', 'board_president'] },
                { id: 'verify', label: 'Verify Chain', icon: 'Shield', roles: ['treasurer', 'board_president'] },
                { id: 'analytics', label: 'AI Analytics', icon: 'Brain', roles: ['treasurer', 'board_president'] },
            ];
            
            const availableMenuItems = menuItems.filter(item => 
                item.roles.includes('all') || item.roles.includes(userProfile?.role)
            );
            
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center">
                                    <h1 className="text-xl font-semibold text-gray-900">
                                        {userProfile?.hoas?.name || 'HOA Payment System'}
                                    </h1>
                                    <span className="ml-3 px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">
                                        AI Powered
                                    </span>
                                </div>
                                
                                <div className="flex items-center space-x-4">
                                    {/* Notifications */}
                                    <div className="relative">
                                        <button className="p-2 text-gray-600 hover:text-gray-900">
                                            <lucide.Bell className="h-5 w-5" />
                                            {notifications.length > 0 && (
                                                <span className="absolute top-0 right-0 h-2 w-2 bg-red-500 rounded-full"></span>
                                            )}
                                        </button>
                                    </div>
                                    
                                    {/* User Menu */}
                                    <div className="flex items-center space-x-3">
                                        <div className="text-right">
                                            <p className="text-sm font-medium text-gray-900">{userProfile?.full_name}</p>
                                            <p className="text-xs text-gray-600 capitalize">{userProfile?.role?.replace('_', ' ')}</p>
                                        </div>
                                        <button
                                            onClick={handleSignOut}
                                            className="p-2 text-gray-600 hover:text-gray-900"
                                        >
                                            <lucide.LogOut className="h-5 w-5" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>
                    
                    <div className="flex">
                        {/* Sidebar */}
                        <nav className="w-64 bg-white shadow-sm h-[calc(100vh-4rem)] border-r border-gray-200">
                            <div className="p-4 space-y-1">
                                {availableMenuItems.map(item => {
                                    const Icon = lucide[item.icon];
                                    return (
                                        <button
                                            key={item.id}
                                            onClick={() => setActiveView(item.id)}
                                            className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg transition-colors ${
                                                activeView === item.id
                                                    ? 'bg-blue-50 text-blue-700'
                                                    : 'text-gray-700 hover:bg-gray-50'
                                            }`}
                                        >
                                            <Icon className="h-5 w-5" />
                                            <span className="font-medium">{item.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </nav>
                        
                        {/* Main Content */}
                        <main className="flex-1 p-8">
                            {activeView === 'overview' && <Overview userProfile={userProfile} />}
                            {activeView === 'payments' && <PaymentsList userProfile={userProfile} />}
                            {activeView === 'submit' && <SubmitPayment userProfile={userProfile} />}
                            {activeView === 'approve' && <ApprovePayments userProfile={userProfile} />}
                            {activeView === 'verify' && <VerifyChain userProfile={userProfile} />}
                            {activeView === 'analytics' && <AIAnalytics userProfile={userProfile} />}
                        </main>
                    </div>
                </div>
            );
        }
        
        // ============================================================================
        // OVERVIEW COMPONENT
        // ============================================================================
        function Overview({ userProfile }) {
            const [stats, setStats] = useState({
                totalBudget: 0,
                totalSpent: 0,
                pendingPayments: 0,
                aiCategorized: 0
            });
            
            useEffect(() => {
                loadStats();
            }, []);
            
            const loadStats = async () => {
                // Get budget summary
                const { data: budgets } = await supabaseClient
                    .from('budget_categories')
                    .select('allocated_amount, spent_amount')
                    .eq('hoa_id', userProfile.hoa_id);
                
                const totalBudget = budgets?.reduce((sum, b) => sum + parseFloat(b.allocated_amount), 0) || 0;
                const totalSpent = budgets?.reduce((sum, b) => sum + parseFloat(b.spent_amount), 0) || 0;
                
                // Get pending payments count
                const { count: pendingCount } = await supabaseClient
                    .from('payments')
                    .select('*', { count: 'exact', head: true })
                    .eq('hoa_id', userProfile.hoa_id)
                    .eq('status', 'pending');
                
                // Get AI categorized count
                const { count: aiCount } = await supabaseClient
                    .from('payments')
                    .select('*', { count: 'exact', head: true })
                    .eq('hoa_id', userProfile.hoa_id)
                    .not('ai_suggested_category_id', 'is', null);
                
                setStats({
                    totalBudget,
                    totalSpent,
                    pendingPayments: pendingCount || 0,
                    aiCategorized: aiCount || 0
                });
            };
            
            const statCards = [
                {
                    title: 'Total Budget',
                    value: `$${stats.totalBudget.toLocaleString()}`,
                    icon: 'Wallet',
                    color: 'blue'
                },
                {
                    title: 'Total Spent',
                    value: `$${stats.totalSpent.toLocaleString()}`,
                    icon: 'TrendingUp',
                    color: 'green'
                },
                {
                    title: 'Pending Approvals',
                    value: stats.pendingPayments,
                    icon: 'Clock',
                    color: 'yellow'
                },
                {
                    title: 'AI Categorized',
                    value: stats.aiCategorized,
                    icon: 'Brain',
                    color: 'purple'
                }
            ];
            
            return (
                <div className="space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-gray-900">Dashboard Overview</h2>
                        <p className="text-gray-600 mt-1">Welcome back, {userProfile.full_name}</p>
                    </div>
                    
                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {statCards.map((stat, index) => {
                            const Icon = lucide[stat.icon];
                            const colorClasses = {
                                blue: 'bg-blue-50 text-blue-600',
                                green: 'bg-green-50 text-green-600',
                                yellow: 'bg-yellow-50 text-yellow-600',
                                purple: 'bg-purple-50 text-purple-600'
                            };
                            
                            return (
                                <div key={index} className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                                    <div className="flex items-center justify-between mb-4">
                                        <div className={`p-2 rounded-lg ${colorClasses[stat.color]}`}>
                                            <Icon className="h-6 w-6" />
                                        </div>
                                    </div>
                                    <h3 className="text-sm font-medium text-gray-600">{stat.title}</h3>
                                    <p className="text-2xl font-bold text-gray-900 mt-1">{stat.value}</p>
                                </div>
                            );
                        })}
                    </div>
                    
                    {/* Features */}
                    <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                        <h3 className="text-lg font-semibold text-gray-900 mb-4">System Features</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="flex items-start space-x-3">
                                <div className="p-2 bg-green-100 text-green-600 rounded-lg">
                                    <lucide.Shield className="h-5 w-5" />
                                </div>
                                <div>
                                    <h4 className="font-medium text-gray-900">Cryptographic Security</h4>
                                    <p className="text-sm text-gray-600">Every transaction is secured with SHA-256 hash chain</p>
                                </div>
                            </div>
                            <div className="flex items-start space-x-3">
                                <div className="p-2 bg-blue-100 text-blue-600 rounded-lg">
                                    <lucide.Brain className="h-5 w-5" />
                                </div>
                                <div>
                                    <h4 className="font-medium text-gray-900">AI Categorization</h4>
                                    <p className="text-sm text-gray-600">Automatic expense categorization with 95%+ accuracy</p>
                                </div>
                            </div>
                            <div className="flex items-start space-x-3">
                                <div className="p-2 bg-red-100 text-red-600 rounded-lg">
                                    <lucide.AlertTriangle className="h-5 w-5" />
                                </div>
                                <div>
                                    <h4 className="font-medium text-gray-900">Anomaly Detection</h4>
                                    <p className="text-sm text-gray-600">AI-powered fraud detection on all payments</p>
                                </div>
                            </div>
                            <div className="flex items-start space-x-3">
                                <div className="p-2 bg-purple-100 text-purple-600 rounded-lg">
                                    <lucide.FileText className="h-5 w-5" />
                                </div>
                                <div>
                                    <h4 className="font-medium text-gray-900">Document Processing</h4>
                                    <p className="text-sm text-gray-600">Extract data from invoices automatically</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        // ============================================================================
        // SUBMIT PAYMENT COMPONENT
        // ============================================================================
        function SubmitPayment({ userProfile }) {
            const [formData, setFormData] = useState({
                vendor_name: '',
                amount: '',
                category_name: '',
                description: '',
                invoice_number: '',
                urgency: 'standard',
                notes: ''
            });
            
            const [categories, setCategories] = useState([]);
            const [aiSuggestion, setAiSuggestion] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [success, setSuccess] = useState(false);
            
            useEffect(() => {
                loadCategories();
            }, []);
            
            // AI categorization when description changes
            useEffect(() => {
                if (formData.description.length > 15 && formData.amount) {
                    const timer = setTimeout(() => {
                        suggestCategory();
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [formData.description, formData.vendor_name]);
            
            const loadCategories = async () => {
                const { data } = await supabaseClient
                    .from('budget_categories')
                    .select('id, name, available_amount')
                    .eq('hoa_id', userProfile.hoa_id)
                    .eq('is_active', true);
                
                setCategories(data || []);
            };
            
            const suggestCategory = async () => {
                // Simulate AI categorization for demo
                // In production, this would call your Edge Function
                const description = formData.description.toLowerCase();
                const vendor = formData.vendor_name.toLowerCase();
                
                let suggestion = null;
                let confidence = 0;
                
                if (description.includes('landscap') || vendor.includes('landscap')) {
                    suggestion = 'Landscaping';
                    confidence = 0.92;
                } else if (description.includes('electric') || description.includes('utility')) {
                    suggestion = 'Utilities';
                    confidence = 0.88;
                } else if (description.includes('repair') || description.includes('maint')) {
                    suggestion = 'Maintenance';
                    confidence = 0.85;
                }
                
                if (suggestion) {
                    setAiSuggestion({ category: suggestion, confidence });
                    if (confidence > 0.85 && !formData.category_name) {
                        setFormData({ ...formData, category_name: suggestion });
                    }
                }
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                
                try {
                    // Generate digital signature (simplified for demo)
                    const digitalSignature = btoa(JSON.stringify({
                        ...formData,
                        timestamp: new Date().toISOString(),
                        user: userProfile.id
                    }));
                    
                    const { data, error } = await supabaseClient.rpc('submit_payment_request', {
                        p_hoa_id: userProfile.hoa_id,
                        p_vendor_name: formData.vendor_name,
                        p_amount: parseFloat(formData.amount),
                        p_category_name: formData.category_name,
                        p_description: formData.description,
                        p_urgency: formData.urgency,
                        p_submitted_by: userProfile.id,
                        p_digital_signature: digitalSignature,
                        p_invoice_number: formData.invoice_number || null,
                        p_notes: formData.notes || null
                    });
                    
                    if (error) throw error;
                    
                    setSuccess(true);
                    setFormData({
                        vendor_name: '',
                        amount: '',
                        category_name: '',
                        description: '',
                        invoice_number: '',
                        urgency: 'standard',
                        notes: ''
                    });
                    setAiSuggestion(null);
                    
                    setTimeout(() => setSuccess(false), 5000);
                } catch (error) {
                    console.error('Error submitting payment:', error);
                    alert('Error submitting payment request');
                } finally {
                    setSubmitting(false);
                }
            };
            
            return (
                <div className="max-w-2xl">
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Submit Payment Request</h2>
                    
                    {success && (
                        <div className="mb-6 bg-green-50 border border-green-200 text-green-800 p-4 rounded-lg flex items-center">
                            <lucide.CheckCircle className="h-5 w-5 mr-2" />
                            Payment request submitted successfully!
                        </div>
                    )}
                    
                    <form onSubmit={handleSubmit} className="space-y-6 bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Vendor Name
                                </label>
                                <input
                                    type="text"
                                    value={formData.vendor_name}
                                    onChange={(e) => setFormData({ ...formData, vendor_name: e.target.value })}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    required
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Amount
                                </label>
                                <div className="relative">
                                    <span className="absolute left-3 top-2 text-gray-500">$</span>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={formData.amount}
                                        onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                        className="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Description
                            </label>
                            <textarea
                                value={formData.description}
                                onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                rows="3"
                                required
                            />
                        </div>
                        
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                Category
                            </label>
                            <select
                                value={formData.category_name}
                                onChange={(e) => setFormData({ ...formData, category_name: e.target.value })}
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                required

        // ============================================================================
        // APPROVE PAYMENTS COMPONENT
        // ============================================================================
        function ApprovePayments({ userProfile }) {
            const [pendingPayments, setPendingPayments] = useState([]);
            const [selectedPayment, setSelectedPayment] = useState(null);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                loadPendingPayments();
            }, []);
            
            const loadPendingPayments = async () => {
                const { data } = await supabaseClient
                    .from('payment_dashboard')
                    .select('*')
                    .eq('hoa_id', userProfile.hoa_id)
                    .in('status', ['pending', 'treasurer_approved'])
                    .order('urgency', { ascending: false })
                    .order('created_at', { ascending: true });
                
                setPendingPayments(data || []);
                setLoading(false);
            };
            
            const handleApprove = async (paymentId) => {
                const payment = pendingPayments.find(p => p.id === paymentId);
                const newStatus = payment.status === 'pending' ? 'treasurer_approved' : 'fully_approved';
                
                const { error } = await supabaseClient
                    .from('payments')
                    .update({
                        status: newStatus,
                        [userProfile.role === 'treasurer' ? 'treasurer_approved_by' : 'president_approved_by']: userProfile.id,
                        [userProfile.role === 'treasurer' ? 'treasurer_approved_at' : 'president_approved_at']: new Date().toISOString()
                    })
                    .eq('id', paymentId);
                
                if (!error) {
                    loadPendingPayments();
                    setSelectedPayment(null);
                }
            };
            
            const handleReject = async (paymentId, reason) => {
                const { error } = await supabaseClient
                    .from('payments')
                    .update({
                        status: 'rejected',
                        rejected_by: userProfile.id,
                        rejected_at: new Date().toISOString(),
                        rejection_reason: reason
                    })
                    .eq('id', paymentId);
                
                if (!error) {
                    loadPendingPayments();
                    setSelectedPayment(null);
                }
            };
            
            const urgencyColors = {
                standard: 'bg-gray-100 text-gray-800',
                urgent: 'bg-orange-100 text-orange-800',
                emergency: 'bg-red-100 text-red-800'
            };
            
            if (loading) {
                return <div className="text-center py-8">Loading pending payments...</div>;
            }
            
            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Approve Payments</h2>
                    
                    {pendingPayments.length === 0 ? (
                        <div className="bg-white rounded-xl shadow-sm p-8 text-center border border-gray-200">
                            <lucide.CheckCircle className="h-12 w-12 text-green-500 mx-auto mb-4" />
                            <p className="text-gray-600">No payments pending approval</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="space-y-4">
                                {pendingPayments.map((payment) => (
                                    <div
                                        key={payment.id}
                                        onClick={() => setSelectedPayment(payment)}
                                        className={`bg-white rounded-lg shadow-sm p-4 border cursor-pointer transition-all ${
                                            selectedPayment?.id === payment.id
                                                ? 'border-blue-500 ring-2 ring-blue-200'
                                                : 'border-gray-200 hover:border-gray-300'
                                        }`}
                                    >
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="font-semibold text-gray-900">{payment.vendor_name}</h3>
                                                <p className="text-sm text-gray-600">{payment.transaction_id}</p>
                                            </div>
                                            <span className={`px-2 py-1 rounded-full text-xs font-medium ${urgencyColors[payment.urgency]}`}>
                                                {payment.urgency}
                                            </span>
                                        </div>
                                        
                                        <div className="text-2xl font-bold text-gray-900 mb-2">
                                            ${parseFloat(payment.amount).toLocaleString()}
                                        </div>
                                        
                                        <p className="text-sm text-gray-600 mb-2">{payment.description}</p>
                                        
                                        <div className="flex items-center justify-between text-xs">
                                            <span className="text-gray-500">
                                                {payment.category_name || 'Uncategorized'}
                                            </span>
                                            {payment.ai_anomaly_detected && (
                                                <span className="flex items-center text-red-600">
                                                    <lucide.AlertTriangle className="h-3 w-3 mr-1" />
                                                    Anomaly
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {selectedPayment && (
                                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                                    <h3 className="text-lg font-semibold text-gray-900 mb-4">Payment Details</h3>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-sm font-medium text-gray-600">Vendor</label>
                                            <p className="text-gray-900">{selectedPayment.vendor_name}</p>
                                        </div>
                                        
                                        <div>
                                            <label className="text-sm font-medium text-gray-600">Amount</label>
                                            <p className="text-2xl font-bold text-gray-900">
                                                ${parseFloat(selectedPayment.amount).toLocaleString()}
                                            </p>
                                        </div>
                                        
                                        <div>
                                            <label className="text-sm font-medium text-gray-600">Description</label>
                                            <p className="text-gray-900">{selectedPayment.description}</p>
                                        </div>
                                        
                                        <div>
                                            <label className="text-sm font-medium text-gray-600">Category</label>
                                            <p className="text-gray-900">{selectedPayment.category_name || 'Uncategorized'}</p>
                                        </div>
                                        
                                        <div>
                                            <label className="text-sm font-medium text-gray-600">Submitted by</label>
                                            <p className="text-gray-900">{selectedPayment.submitted_by_name}</p>
                                        </div>
                                        
                                        {selectedPayment.ai_confidence_score && (
                                            <div>
                                                <label className="text-sm font-medium text-gray-600">AI Categorization</label>
                                                <p className="text-gray-900">
                                                    {Math.round(selectedPayment.ai_confidence_score * 100)}% confidence
                                                </p>
                                            </div>
                                        )}
                                        
                                        {selectedPayment.ai_anomaly_detected && (
                                            <div className="bg-red-50 p-4 rounded-lg">
                                                <div className="flex items-center text-red-800 mb-2">
                                                    <lucide.AlertTriangle className="h-5 w-5 mr-2" />
                                                    <span className="font-medium">Anomaly Detected</span>
                                                </div>
                                                <ul className="text-sm text-red-700 list-disc list-inside">
                                                    {selectedPayment.ai_anomaly_reasons?.map((reason, i) => (
                                                        <li key={i}>{reason}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                        
                                        <div className="pt-4 space-y-3">
                                            <button
                                                onClick={() => handleApprove(selectedPayment.id)}
                                                className="w-full px-4 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-colors"
                                            >
                                                Approve Payment
                                            </button>
                                            <button
                                                onClick={() => {
                                                    const reason = prompt('Rejection reason:');
                                                    if (reason) handleReject(selectedPayment.id, reason);
                                                }}
                                                className="w-full px-4 py-2 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition-colors"
                                            >
                                                Reject Payment
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }
        
        // ============================================================================
        // VERIFY CHAIN COMPONENT
        // ============================================================================
        function VerifyChain({ userProfile }) {
            const [verificationResult, setVerificationResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [recentEvents, setRecentEvents] = useState([]);
            
            useEffect(() => {
                loadRecentEvents();
            }, []);
            
            const loadRecentEvents = async () => {
                const { data } = await supabaseClient
                    .from('audit_trail')
                    .select('*')
                    .eq('hoa_id', userProfile.hoa_id)
                    .order('sequence_id', { ascending: false })
                    .limit(10);
                
                setRecentEvents(data || []);
            };
            
            const verifyChain = async () => {
                setLoading(true);
                
                const { data, error } = await supabaseClient.rpc('verify_hash_chain', {
                    p_hoa_id: userProfile.hoa_id,
                    p_limit: 100
                });
                
                if (data) {
                    setVerificationResult(data[0]);
                }
                setLoading(false);
            };
            
            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Cryptographic Verification</h2>
                    
                    <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200 mb-6">
                        <div className="text-center">
                            <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                                <lucide.Shield className="h-8 w-8 text-blue-600" />
                            </div>
                            <h3 className="text-lg font-semibold text-gray-900 mb-2">Verify Audit Trail Integrity</h3>
                            <p className="text-gray-600 mb-6">
                                Cryptographically verify that no transactions have been tampered with
                            </p>
                            
                            <button
                                onClick={verifyChain}
                                disabled={loading}
                                className="px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors disabled:opacity-50"
                            >
                                {loading ? 'Verifying...' : 'Run Verification'}
                            </button>
                        </div>
                        
                        {verificationResult && (
                            <div className={`mt-6 p-4 rounded-lg ${
                                verificationResult.is_valid
                                    ? 'bg-green-50 text-green-800'
                                    : 'bg-red-50 text-red-800'
                            }`}>
                                <div className="flex items-center mb-2">
                                    {verificationResult.is_valid ? (
                                        <lucide.CheckCircle className="h-5 w-5 mr-2" />
                                    ) : (
                                        <lucide.XCircle className="h-5 w-5 mr-2" />
                                    )}
                                    <span className="font-semibold">
                                        {verificationResult.error_message}
                                    </span>
                                </div>
                                <p className="text-sm">
                                    Verified {verificationResult.total_verified} events in the hash chain
                                </p>
                            </div>
                        )}
                    </div>
                    
                    <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                        <h3 className="text-lg font-semibold text-gray-900 mb-4">Recent Audit Events</h3>
                        
                        <div className="space-y-3">
                            {recentEvents.map((event) => (
                                <div key={event.sequence_id} className="border-l-4 border-blue-400 pl-4 py-2">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-medium text-gray-900">
                                                {event.event_type.replace('_', ' ')}
                                            </p>
                                            <p className="text-sm text-gray-600">
                                                Sequence: {event.sequence_id}
                                            </p>
                                        </div>
                                        <span className="text-xs text-gray-500">
                                            {new Date(event.created_at).toLocaleString()}
                                        </span>
                                    </div>
                                    <div className="mt-2">
                                        <p className="text-xs font-mono text-gray-500">
                                            Hash: {event.current_hash.substring(0, 16)}...
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        
        // ============================================================================
        // AI ANALYTICS COMPONENT
        // ============================================================================
        function AIAnalytics({ userProfile }) {
            const [analytics, setAnalytics] = useState({
                categorization_accuracy: 0,
                total_categorized: 0,
                anomalies_detected: 0,
                categories_performance: []
            });
            
            useEffect(() => {
                loadAnalytics();
            }, []);
            
            const loadAnalytics = async () => {
                // Get AI categorization stats
                const { data: aiStats } = await supabaseClient
                    .from('payments')
                    .select('ai_confidence_score, ai_suggested_category_id')
                    .eq('hoa_id', userProfile.hoa_id)
                    .not('ai_suggested_category_id', 'is', null);
                
                const avgConfidence = aiStats?.reduce((sum, p) => sum + parseFloat(p.ai_confidence_score || 0), 0) / (aiStats?.length || 1);
                
                // Get anomaly count
                const { count: anomalyCount } = await supabaseClient
                    .from('payments')
                    .select('*', { count: 'exact', head: true })
                    .eq('hoa_id', userProfile.hoa_id)
                    .eq('ai_anomaly_detected', true);
                
                // Get category performance
                const { data: categoryStats } = await supabaseClient
                    .from('budget_status')
                    .select('*')
                    .eq('hoa_id', userProfile.hoa_id);
                
                setAnalytics({
                    categorization_accuracy: avgConfidence || 0,
                    total_categorized: aiStats?.length || 0,
                    anomalies_detected: anomalyCount || 0,
                    categories_performance: categoryStats || []
                });
            };
            
            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">AI Analytics</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <lucide.Brain className="h-8 w-8 text-purple-600" />
                                <span className="text-3xl font-bold text-gray-900">
                                    {Math.round(analytics.categorization_accuracy * 100)}%
                                </span>
                            </div>
                            <h3 className="font-semibold text-gray-900">Average Confidence</h3>
                            <p className="text-sm text-gray-600">AI categorization accuracy</p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <lucide.Tag className="h-8 w-8 text-blue-600" />
                                <span className="text-3xl font-bold text-gray-900">
                                    {analytics.total_categorized}
                                </span>
                            </div>
                            <h3 className="font-semibold text-gray-900">Auto-Categorized</h3>
                            <p className="text-sm text-gray-600">Payments categorized by AI</p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <lucide.AlertTriangle className="h-8 w-8 text-red-600" />
                                <span className="text-3xl font-bold text-gray-900">
                                    {analytics.anomalies_detected}
                                </span>
                            </div>
                            <h3 className="font-semibold text-gray-900">Anomalies Detected</h3>
                            <p className="text-sm text-gray-600">Potential fraud prevented</p>
                        </div>
                    </div>
                    
                    <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                        <h3 className="text-lg font-semibold text-gray-900 mb-4">Category Performance</h3>
                        
                        <div className="space-y-4">
                            {analytics.categories_performance.map((category) => (
                                <div key={category.id} className="flex items-center justify-between">
                                    <div className="flex-1">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="font-medium text-gray-900">{category.name}</span>
                                            <span className="text-sm text-gray-600">
                                                {category.ai_categorized_count} AI categorized
                                            </span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div
                                                className="bg-blue-600 h-2 rounded-full transition-all"
                                                style={{ width: `${Math.min((category.actual_spent / category.allocated_amount) * 100, 100)}%` }}
                                            ></div>
                                        </div>
                                        <div className="flex justify-between items-center mt-1">
                                            <span className="text-xs text-gray-500">
                                                ${parseFloat(category.actual_spent).toLocaleString()} / ${parseFloat(category.allocated_amount).toLocaleString()}
                                            </span>
                                            {category.avg_ai_confidence && (
                                                <span className="text-xs text-gray-500">
                                                    {Math.round(category.avg_ai_confidence * 100)}% avg confidence
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        
    </script>
</body>
</html>
