
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Policy Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-4">
    <h1 class="text-2xl font-bold mb-4">Mobile Policy Builder</h1>

    <!-- Invoice Approval Policy -->
    <div class="bg-white shadow rounded-lg mb-4 p-4">
        <h2 class="text-lg font-semibold mb-2">Invoice Approval Policy</h2>
        <div class="mb-2">
            <label class="block text-sm">Workflow Type</label>
            <select class="w-full border rounded p-2">
                <option>pay_invoice</option>
                <option>community_vote</option>
                <option>disburse_escrow</option>
            </select>
        </div>
        <div class="mb-2">
            <label class="block text-sm">Invoice Amount</label>
            <input type="number" class="w-full border rounded p-2" placeholder="e.g., 5000">
        </div>
        <div class="mb-2">
            <label class="block text-sm"># of Board Approvals</label>
            <input type="number" class="w-full border rounded p-2" placeholder="e.g., 2">
        </div>
        <button class="mt-2 w-full bg-blue-600 text-white py-2 rounded">Evaluate Policy</button>
    </div>

    <!-- Voting Policy -->
    <div class="bg-white shadow rounded-lg mb-4 p-4">
        <h2 class="text-lg font-semibold mb-2">Community Voting Policy</h2>
        <div class="mb-2">
            <label class="block text-sm">Workflow Type</label>
            <select class="w-full border rounded p-2">
                <option>community_vote</option>
                <option>pay_invoice</option>
                <option>disburse_escrow</option>
            </select>
        </div>
        <div class="mb-2">
            <label class="block text-sm">Proposal Amount</label>
            <input type="number" class="w-full border rounded p-2" placeholder="e.g., 20000">
        </div>
        <div class="mb-2">
            <label class="block text-sm">Vote Result</label>
            <select class="w-full border rounded p-2">
                <option>majority_yes</option>
                <option>majority_no</option>
            </select>
        </div>
        <button class="mt-2 w-full bg-green-600 text-white py-2 rounded">Evaluate Policy</button>
    </div>

    <!-- Escrow Disbursement Policy -->
    <div class="bg-white shadow rounded-lg mb-4 p-4">
        <h2 class="text-lg font-semibold mb-2">Escrow Disbursement Policy</h2>
        <div class="mb-2">
            <label class="block text-sm">Trigger Event</label>
            <select class="w-full border rounded p-2">
                <option>project_completed</option>
                <option>project_pending</option>
            </select>
        </div>
        <div class="mb-2">
            <label class="block text-sm">Validator Status</label>
            <select class="w-full border rounded p-2">
                <option>confirmed</option>
                <option>unconfirmed</option>
            </select>
        </div>
        <div class="mb-2">
            <label class="block text-sm"># of Board Approvals</label>
            <input type="number" class="w-full border rounded p-2" placeholder="e.g., 1">
        </div>
        <button class="mt-2 w-full bg-purple-600 text-white py-2 rounded">Evaluate Policy</button>
    </div>
</body>
</html>
