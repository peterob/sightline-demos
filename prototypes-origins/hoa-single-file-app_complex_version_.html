<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // Initialize Supabase - REPLACE WITH YOUR CREDENTIALS
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Icons as SVG components
        const Icons = {
            Shield: () => (
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.618 5.984A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            ),
            Check: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
            ),
            X: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                </svg>
            ),
            DollarSign: () => (
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            Clock: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            )
        };

        // Digital Signature Implementation
        async function generateDigitalSignature(data, userId) {
            const message = JSON.stringify({
                data: data,
                userId: userId,
                timestamp: new Date().toISOString(),
                nonce: crypto.randomUUID()
            });

            const encoder = new TextEncoder();
            const messageBuffer = encoder.encode(message);
            
            const hashBuffer = await crypto.subtle.digest('SHA-256', messageBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            return {
                signature: btoa(hashHex),
                message: message,
                algorithm: 'SHA256'
            };
        }

        // Login Component
        function Login({ onLogin }) {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            const demoUsers = [
                { email: 'treasurer@demo.com', password: 'demo123', role: 'Treasurer' },
                { email: 'president@demo.com', password: 'demo123', role: 'Board President' },
                { email: 'maintenance@demo.com', password: 'demo123', role: 'Maintenance' },
                { email: 'resident@demo.com', password: 'demo123', role: 'Resident' }
            ];

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    setError(error.message);
                } else {
                    onLogin(data.user);
                }
                setLoading(false);
            };

            const quickLogin = async (demoUser) => {
                setEmail(demoUser.email);
                setPassword(demoUser.password);
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: demoUser.email,
                    password: demoUser.password
                });

                if (error) {
                    // Try to create the user
                    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                        email: demoUser.email,
                        password: demoUser.password,
                        options: {
                            data: {
                                full_name: demoUser.role,
                                role: demoUser.role.toLowerCase().replace(' ', '_'),
                                hoa_id: '123e4567-e89b-12d3-a456-426614174000'
                            }
                        }
                    });

                    if (signUpError) {
                        setError(signUpError.message);
                    } else {
                        setError('User created! Please try logging in again.');
                    }
                } else {
                    onLogin(data.user);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                    <div className="max-w-md w-full space-y-8">
                        <div className="text-center">
                            <div className="flex justify-center mb-4">
                                <Icons.Shield />
                            </div>
                            <h2 className="text-3xl font-bold text-gray-900">HOA Payment System</h2>
                            <p className="mt-2 text-gray-600">Cryptographically Verified</p>
                        </div>

                        <div className="bg-blue-50 rounded-lg p-4">
                            <p className="text-sm font-medium text-blue-900 mb-3">Quick Demo Login:</p>
                            <div className="grid grid-cols-2 gap-2">
                                {demoUsers.map((user) => (
                                    <button
                                        key={user.email}
                                        onClick={() => quickLogin(user)}
                                        className="text-xs bg-white px-3 py-2 rounded border border-blue-200 hover:bg-blue-50"
                                    >
                                        {user.role}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <form onSubmit={handleLogin} className="mt-8 space-y-6">
                            <div>
                                <input
                                    type="email"
                                    required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md"
                                    placeholder="Email address"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                />
                            </div>
                            <div>
                                <input
                                    type="password"
                                    required
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md"
                                    placeholder="Password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                />
                            </div>

                            {error && (
                                <div className="text-sm text-red-600 text-center">{error}</div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400"
                            >
                                {loading ? 'Signing in...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard({ user, userProfile, onNavigate }) {
            const [summary, setSummary] = React.useState(null);
            const [recentPayments, setRecentPayments] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                loadDashboardData();
            }, []);

            const loadDashboardData = async () => {
                try {
                    // Load dashboard summary
                    const { data: summaryData } = await supabase
                        .from('dashboard_summary')
                        .select('*')
                        .single();
                    
                    setSummary(summaryData || {
                        pending_approvals: 0,
                        completed_today: 0,
                        total_budget: 135000,
                        total_spent: 34700,
                        total_audit_events: 0
                    });

                    // Load recent payments
                    const { data: payments } = await supabase
                        .from('payment_tracking')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(5);
                    
                    setRecentPayments(payments || []);
                } catch (error) {
                    console.error('Error loading dashboard:', error);
                }
                setLoading(false);
            };

            if (loading) return <div className="p-8 text-center">Loading dashboard...</div>;

            const budgetUsed = summary ? (summary.total_spent / summary.total_budget) * 100 : 0;

            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-blue-600 to-blue-700 rounded-lg p-6 text-white">
                        <h1 className="text-2xl font-bold mb-2">Welcome, {userProfile?.full_name || user.email}</h1>
                        <p className="text-blue-100">Role: {userProfile?.role?.replace('_', ' ').toUpperCase() || 'User'}</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white rounded-lg shadow p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-gray-500 text-sm">Pending Approvals</p>
                                    <p className="text-2xl font-bold">{summary?.pending_approvals || 0}</p>
                                </div>
                                <Icons.Clock />
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-lg shadow p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-gray-500 text-sm">Completed Today</p>
                                    <p className="text-2xl font-bold">{summary?.completed_today || 0}</p>
                                </div>
                                <Icons.Check />
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-lg shadow p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-gray-500 text-sm">Budget Used</p>
                                    <p className="text-2xl font-bold">{budgetUsed.toFixed(1)}%</p>
                                </div>
                                <Icons.DollarSign />
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-lg shadow p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-gray-500 text-sm">Verified Events</p>
                                    <p className="text-2xl font-bold">{summary?.total_audit_events || 0}</p>
                                </div>
                                <Icons.Shield />
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg shadow">
                        <div className="p-6 border-b">
                            <h2 className="text-lg font-semibold">Recent Payment Requests</h2>
                        </div>
                        <div className="divide-y">
                            {recentPayments.length === 0 ? (
                                <div className="p-6 text-center text-gray-500">No recent payments</div>
                            ) : (
                                recentPayments.map((payment) => (
                                    <div key={payment.id} className="p-6 hover:bg-gray-50">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="font-medium">{payment.vendor_name}</h3>
                                                <p className="text-sm text-gray-500 mt-1">{payment.description}</p>
                                                <div className="flex items-center mt-2 text-xs text-gray-500 space-x-2">
                                                    <span>${payment.amount}</span>
                                                    <span>•</span>
                                                    <span>{payment.category}</span>
                                                    <span>•</span>
                                                    <span>{payment.transaction_id}</span>
                                                </div>
                                            </div>
                                            <span className={`px-2 py-1 text-xs rounded-full ${
                                                payment.status === 'completed' ? 'bg-green-100 text-green-800' :
                                                payment.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                                'bg-gray-100 text-gray-800'
                                            }`}>
                                                {payment.status}
                                            </span>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Payment Request Component
        function PaymentRequest({ user, userProfile }) {
            const [formData, setFormData] = React.useState({
                vendor_name: '',
                amount: '',
                category: 'Maintenance',
                description: '',
                urgency: 'standard'
            });
            const [submitting, setSubmitting] = React.useState(false);
            const [success, setSuccess] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);

                try {
                    // Generate digital signature
                    const signature = await generateDigitalSignature(formData, user.id);

                    // Submit payment request
                    const { data, error } = await supabase.rpc('submit_payment_request', {
                        p_hoa_id: userProfile.hoa_id,
                        p_vendor_name: formData.vendor_name,
                        p_amount: parseFloat(formData.amount),
                        p_category: formData.category,
                        p_description: formData.description,
                        p_urgency: formData.urgency,
                        p_submitter_id: user.id,
                        p_digital_signature: JSON.stringify(signature)
                    });

                    if (error) throw error;

                    setSuccess(true);
                    setTimeout(() => {
                        setSuccess(false);
                        setFormData({
                            vendor_name: '',
                            amount: '',
                            category: 'Maintenance',
                            description: '',
                            urgency: 'standard'
                        });
                    }, 3000);
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error submitting payment: ' + error.message);
                }
                setSubmitting(false);
            };

            if (success) {
                return (
                    <div className="max-w-2xl mx-auto">
                        <div className="bg-green-50 border border-green-200 rounded-lg p-6 text-center">
                            <Icons.Check />
                            <h3 className="text-lg font-medium text-green-900 mt-2">Payment Request Submitted!</h3>
                            <p className="text-green-700">Your request has been digitally signed and sent for approval.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="bg-white shadow rounded-lg">
                        <div className="p-6 border-b">
                            <h2 className="text-lg font-semibold">Submit Payment Request</h2>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-2">Vendor Name</label>
                                <input
                                    type="text"
                                    required
                                    className="w-full px-3 py-2 border rounded-md"
                                    value={formData.vendor_name}
                                    onChange={(e) => setFormData({...formData, vendor_name: e.target.value})}
                                />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium mb-2">Amount</label>
                                    <input
                                        type="number"
                                        required
                                        step="0.01"
                                        className="w-full px-3 py-2 border rounded-md"
                                        value={formData.amount}
                                        onChange={(e) => setFormData({...formData, amount: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-2">Category</label>
                                    <select
                                        className="w-full px-3 py-2 border rounded-md"
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                    >
                                        <option value="Landscaping">Landscaping</option>
                                        <option value="Maintenance">Maintenance</option>
                                        <option value="Emergency Repairs">Emergency Repairs</option>
                                        <option value="Utilities">Utilities</option>
                                        <option value="Insurance">Insurance</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">Description</label>
                                <textarea
                                    required
                                    rows={3}
                                    className="w-full px-3 py-2 border rounded-md"
                                    value={formData.description}
                                    onChange={(e) => setFormData({...formData, description: e.target.value})}
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium mb-2">Urgency</label>
                                <select
                                    className="w-full px-3 py-2 border rounded-md"
                                    value={formData.urgency}
                                    onChange={(e) => setFormData({...formData, urgency: e.target.value})}
                                >
                                    <option value="standard">Standard</option>
                                    <option value="urgent">Urgent</option>
                                    <option value="emergency">Emergency</option>
                                </select>
                            </div>

                            <div className="pt-4 border-t">
                                <div className="flex items-center text-sm text-gray-600 mb-4">
                                    <Icons.Shield />
                                    <span className="ml-2">This request will be digitally signed</span>
                                </div>
                                <button
                                    type="submit"
                                    disabled={submitting}
                                    className="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 disabled:bg-gray-400"
                                >
                                    {submitting ? 'Submitting...' : 'Sign & Submit Request'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Approval Queue Component
        function ApprovalQueue({ user, userProfile }) {
            const [payments, setPayments] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [processing, setProcessing] = React.useState(null);

            React.useEffect(() => {
                loadPayments();
            }, []);

            const loadPayments = async () => {
                try {
                    const { data } = await supabase
                        .from('payment_tracking')
                        .select('*')
                        .in('status', ['pending', 'treasurer_approved'])
                        .order('created_at', { ascending: false });
                    
                    setPayments(data || []);
                } catch (error) {
                    console.error('Error loading payments:', error);
                }
                setLoading(false);
            };

            const handleApprove = async (payment) => {
                setProcessing(payment.id);
                try {
                    const signature = await generateDigitalSignature(
                        { paymentId: payment.id, action: 'approve' },
                        user.id
                    );

                    const { error } = await supabase.rpc('approve_payment', {
                        p_payment_id: payment.id,
                        p_approver_id: user.id,
                        p_approval_notes: 'Approved via web interface',
                        p_digital_signature: JSON.stringify(signature)
                    });

                    if (error) throw error;

                    alert('Payment approved successfully!');
                    loadPayments();
                } catch (error) {
                    alert('Error approving payment: ' + error.message);
                }
                setProcessing(null);
            };

            const handleReject = async (payment) => {
                const reason = prompt('Please provide a reason for rejection:');
                if (!reason) return;

                setProcessing(payment.id);
                try {
                    const signature = await generateDigitalSignature(
                        { paymentId: payment.id, action: 'reject', reason },
                        user.id
                    );

                    const { error } = await supabase.rpc('reject_payment', {
                        p_payment_id: payment.id,
                        p_rejector_id: user.id,
                        p_rejection_reason: reason,
                        p_digital_signature: JSON.stringify(signature)
                    });

                    if (error) throw error;

                    alert('Payment rejected.');
                    loadPayments();
                } catch (error) {
                    alert('Error rejecting payment: ' + error.message);
                }
                setProcessing(null);
            };

            if (loading) return <div className="p-8 text-center">Loading approvals...</div>;

            return (
                <div className="space-y-6">
                    <div className="bg-white shadow rounded-lg">
                        <div className="p-6 border-b">
                            <h2 className="text-lg font-semibold">Pending Approvals</h2>
                        </div>
                        
                        {payments.length === 0 ? (
                            <div className="p-6 text-center text-gray-500">
                                No pending approvals
                            </div>
                        ) : (
                            <div className="divide-y">
                                {payments.map((payment) => (
                                    <div key={payment.id} className="p-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-lg font-medium">{payment.vendor_name}</h3>
                                                <p className="text-sm text-gray-500">{payment.transaction_id}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-bold">${payment.amount}</p>
                                                <p className="text-sm text-gray-500">{payment.category}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-gray-50 rounded p-3 mb-4">
                                            <p className="text-sm">{payment.description}</p>
                                        </div>

                                        {payment.urgency !== 'standard' && (
                                            <div className="mb-4">
                                                <span className={`px-2 py-1 text-xs rounded-full ${
                                                    payment.urgency === 'emergency' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'
                                                }`}>
                                                    {payment.urgency.toUpperCase()}
                                                </span>
                                            </div>
                                        )}
                                        
                                        <div className="flex justify-end space-x-3">
                                            <button
                                                onClick={() => handleReject(payment)}
                                                disabled={processing === payment.id}
                                                className="px-4 py-2 border border-red-300 text-red-700 rounded hover:bg-red-50 disabled:opacity-50"
                                            >
                                                Reject
                                            </button>
                                            <button
                                                onClick={() => handleApprove(payment)}
                                                disabled={processing === payment.id}
                                                className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:opacity-50"
                                            >
                                                {processing === payment.id ? 'Processing...' : 'Approve'}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Verification Component
        function Verification() {
            const [transactionId, setTransactionId] = React.useState('');
            const [verification, setVerification] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const handleVerify = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    const { data, error } = await supabase.rpc('get_transaction_verification', {
                        p_transaction_id: transactionId
                    });

                    if (error) throw error;
                    setVerification(data);
                } catch (error) {
                    alert('Error verifying transaction: ' + error.message);
                }
                setLoading(false);
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6">
                    <div className="bg-white shadow rounded-lg p-6">
                        <h2 className="text-lg font-semibold mb-4">Verify Transaction</h2>
                        <form onSubmit={handleVerify} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-2">Transaction ID</label>
                                <input
                                    type="text"
                                    required
                                    className="w-full px-3 py-2 border rounded-md"
                                    placeholder="e.g., PIN-2024-0042"
                                    value={transactionId}
                                    onChange={(e) => setTransactionId(e.target.value)}
                                />
                            </div>
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 disabled:bg-gray-400"
                            >
                                {loading ? 'Verifying...' : 'Verify Transaction'}
                            </button>
                        </form>
                    </div>

                    {verification && (
                        <div className="bg-white shadow rounded-lg p-6">
                            <div className={`p-4 rounded-lg mb-4 ${
                                verification.chain_valid ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'
                            }`}>
                                <div className="flex items-center">
                                    <Icons.Shield />
                                    <div className="ml-3">
                                        <p className={`font-medium ${verification.chain_valid ? 'text-green-900' : 'text-red-900'}`}>
                                            {verification.verification_result}
                                        </p>
                                        <p className={`text-sm ${verification.chain_valid ? 'text-green-700' : 'text-red-700'}`}>
                                            Chain Valid: {verification.chain_valid ? 'Yes' : 'No'}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Transaction ID:</span>
                                    <span className="font-medium">{verification.transaction_id}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Vendor:</span>
                                    <span className="font-medium">{verification.vendor_name}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Amount:</span>
                                    <span className="font-medium">${verification.amount}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Total Audit Events:</span>
                                    <span className="font-medium">{verification.total_events}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-600">Verification Time:</span>
                                    <span className="font-medium">{verification.verification_time_ms}ms</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Main App Component
        function App() {
            const [user, setUser] = React.useState(null);
            const [userProfile, setUserProfile] = React.useState(null);
            const [activeView, setActiveView] = React.useState('dashboard');
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                checkUser();
            }, []);

            const checkUser = async () => {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    setUser(user);
                    
                    // Get user profile
                    const { data: profile } = await supabase
                        .from('hoa_users')
                        .select('*')
                        .eq('id', user.id)
                        .single();
                    
                    if (profile) {
                        setUserProfile(profile);
                    }
                }
                setLoading(false);
            };

            const handleLogin = async (user) => {
                setUser(user);
                checkUser();
            };

            const handleLogout = async () => {
                await supabase.auth.signOut();
                setUser(null);
                setUserProfile(null);
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="spinner"></div>
                    </div>
                );
            }

            if (!user) {
                return <Login onLogin={handleLogin} />;
            }

            const canSubmitPayments = ['maintenance_contact', 'treasurer', 'board_president'].includes(userProfile?.role);
            const canApprove = ['treasurer', 'board_president'].includes(userProfile?.role);

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <Icons.Shield />
                                <h1 className="text-xl font-semibold">HOA Payment System</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="text-sm text-gray-600">{userProfile?.full_name || user.email}</span>
                                <button
                                    onClick={handleLogout}
                                    className="text-sm text-blue-600 hover:text-blue-800"
                                >
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 py-8">
                        <nav className="flex space-x-4 mb-8">
                            <button
                                onClick={() => setActiveView('dashboard')}
                                className={`px-4 py-2 rounded ${activeView === 'dashboard' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'}`}
                            >
                                Dashboard
                            </button>
                            {canSubmitPayments && (
                                <button
                                    onClick={() => setActiveView('request')}
                                    className={`px-4 py-2 rounded ${activeView === 'request' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'}`}
                                >
                                    Submit Request
                                </button>
                            )}
                            {canApprove && (
                                <button
                                    onClick={() => setActiveView('approvals')}
                                    className={`px-4 py-2 rounded ${activeView === 'approvals' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'}`}
                                >
                                    Approvals
                                </button>
                            )}
                            <button
                                onClick={() => setActiveView('verify')}
                                className={`px-4 py-2 rounded ${activeView === 'verify' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700'}`}
                            >
                                Verify
                            </button>
                        </nav>

                        <main>
                            {activeView === 'dashboard' && <Dashboard user={user} userProfile={userProfile} onNavigate={setActiveView} />}
                            {activeView === 'request' && <PaymentRequest user={user} userProfile={userProfile} />}
                            {activeView === 'approvals' && <ApprovalQueue user={user} userProfile={userProfile} />}
                            {activeView === 'verify' && <Verification />}
                        </main>
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
