<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget vs. Actual Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-under { background-color: #dcfce7; color: #166534; }
        .status-near { background-color: #fef9c3; color: #854d0e; }
        .status-over { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto py-6 px-4">
        <!-- Header -->
        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4">
            <h1 class="text-3xl font-bold text-gray-900">Budget vs. Actual</h1>
            <div class="flex items-center space-x-4">
                <select id="periodSelect" class="px-4 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-[280px]">
                    <option value="current">Current Period (Q2 2025)</option>
                    <option value="previous">Previous Period (Q1 2025)</option>
                    <option value="ytd">Year-to-Date 2025</option>
                </select>
                <button class="flex items-center px-4 py-2 border border-gray-300 rounded-lg bg-white hover:bg-gray-50 shadow-sm">
                    <svg class="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Export
                </button>
            </div>
        </div>

        <!-- Alert Banner -->
        <div id="alertBanner" class="mb-6 bg-red-50 border border-red-200 rounded-lg p-4 flex items-start">
            <svg class="h-5 w-5 text-red-600 mr-3 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <div>
                <h3 class="font-semibold text-red-800">Budget Alert</h3>
                <p id="alertText" class="text-red-700 text-sm">2 accounts exceeding budget</p>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-sm font-medium text-gray-500 mb-2">Total Budget</h3>
                <p id="totalBudget" class="text-2xl font-bold text-gray-900">$600,000.00</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-sm font-medium text-gray-500 mb-2">Total Actual</h3>
                <p id="totalActual" class="text-2xl font-bold text-gray-900">$567,602.00</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 id="varianceLabel" class="text-sm font-medium text-gray-500 mb-2">Remaining Budget</h3>
                <p id="totalVariance" class="text-2xl font-bold text-green-600">$32,398.00</p>
            </div>
        </div>

        <!-- Budget Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-6">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Budget vs. Actual by Account</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Account</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Budget</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actual</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Variance</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">%</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Progress</th>
                        </tr>
                    </thead>
                    <tbody id="budgetTableBody" class="divide-y divide-gray-200">
                        <!-- Table rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="p-6 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900">Budget Distribution</h2>
                </div>
                <div class="p-6">
                    <canvas id="pieChart" height="300"></canvas>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="p-6 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900">Budget vs. Actual by Account</h2>
                </div>
                <div class="p-6">
                    <canvas id="barChart" height="300"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Budget Data
        const budgetItems = [
            {
                account_id: '1',
                account_code: 1000,
                account_name: 'Operations',
                budget_amount: 125000,
                actual_amount: 98750.50,
                variance_amount: 26249.50,
                variance_percentage: 21.0,
                status: 'UNDER'
            },
            {
                account_id: '2',
                account_code: 2000,
                account_name: 'Marketing',
                budget_amount: 75000,
                actual_amount: 72500.25,
                variance_amount: 2499.75,
                variance_percentage: 3.3,
                status: 'NEAR'
            },
            {
                account_id: '3',
                account_code: 3000,
                account_name: 'Engineering',
                budget_amount: 200000,
                actual_amount: 212500,
                variance_amount: -12500,
                variance_percentage: -6.25,
                status: 'OVER'
            },
            {
                account_id: '4',
                account_code: 4000,
                account_name: 'Sales',
                budget_amount: 150000,
                actual_amount: 130650.75,
                variance_amount: 19349.25,
                variance_percentage: 12.9,
                status: 'UNDER'
            },
            {
                account_id: '5',
                account_code: 5000,
                account_name: 'Administrative',
                budget_amount: 50000,
                actual_amount: 53200.50,
                variance_amount: -3200.50,
                variance_percentage: -6.4,
                status: 'OVER'
            }
        ];

        // Format currency
        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        // Get status class
        function getStatusClass(status) {
            switch (status) {
                case 'UNDER': return 'status-under';
                case 'NEAR': return 'status-near';
                case 'OVER': return 'status-over';
                default: return '';
            }
        }

        // Get status text
        function getStatusText(status) {
            switch (status) {
                case 'UNDER': return 'Under Budget';
                case 'NEAR': return 'Near Limit';
                case 'OVER': return 'Over Budget';
                default: return '';
            }
        }

        // Get progress bar color
        function getProgressColor(status) {
            switch (status) {
                case 'UNDER': return 'bg-green-600';
                case 'NEAR': return 'bg-yellow-500';
                case 'OVER': return 'bg-red-600';
                default: return 'bg-gray-400';
            }
        }

        // Calculate progress percentage
        function calculateProgress(actual, budget) {
            const percentage = (actual / budget) * 100;
            return Math.min(percentage, 100);
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('budgetTableBody');
            tbody.innerHTML = '';

            budgetItems.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50';
                
                const progress = calculateProgress(item.actual_amount, item.budget_amount);
                const varianceClass = item.variance_amount >= 0 ? 'text-green-600' : 'text-red-600';
                const varianceSign = item.variance_percentage >= 0 ? '+' : '';

                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">
                        ${item.account_code} - ${item.account_name}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-gray-900">
                        ${formatCurrency(item.budget_amount)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-gray-900">
                        ${formatCurrency(item.actual_amount)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right ${varianceClass}">
                        ${formatCurrency(Math.abs(item.variance_amount))}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right ${varianceClass}">
                        ${varianceSign}${item.variance_percentage.toFixed(1)}%
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${getStatusClass(item.status)}">
                            ${getStatusText(item.status)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="w-full bg-gray-200 rounded-full h-2.5 min-w-[100px]">
                            <div class="h-2.5 rounded-full ${getProgressColor(item.status)}" style="width: ${progress}%"></div>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Update summary cards
        function updateSummary() {
            const totalBudget = budgetItems.reduce((sum, item) => sum + item.budget_amount, 0);
            const totalActual = budgetItems.reduce((sum, item) => sum + item.actual_amount, 0);
            const totalVariance = totalBudget - totalActual;
            const overBudgetCount = budgetItems.filter(item => item.status === 'OVER').length;

            document.getElementById('totalBudget').textContent = formatCurrency(totalBudget);
            document.getElementById('totalActual').textContent = formatCurrency(totalActual);
            
            const varianceEl = document.getElementById('totalVariance');
            const varianceLabelEl = document.getElementById('varianceLabel');
            
            if (totalVariance >= 0) {
                varianceEl.textContent = formatCurrency(totalVariance);
                varianceEl.className = 'text-2xl font-bold text-green-600';
                varianceLabelEl.textContent = 'Remaining Budget';
            } else {
                varianceEl.textContent = formatCurrency(Math.abs(totalVariance));
                varianceEl.className = 'text-2xl font-bold text-red-600';
                varianceLabelEl.textContent = 'Budget Deficit';
            }

            // Update alert
            const alertBanner = document.getElementById('alertBanner');
            const alertText = document.getElementById('alertText');
            if (overBudgetCount > 0) {
                alertBanner.style.display = 'flex';
                alertText.textContent = `${overBudgetCount} account${overBudgetCount > 1 ? 's' : ''} exceeding budget`;
            } else {
                alertBanner.style.display = 'none';
            }
        }

        // Render charts
        function renderCharts() {
            const labels = budgetItems.map(item => item.account_name);
            const budgetData = budgetItems.map(item => item.budget_amount);
            const actualData = budgetItems.map(item => item.actual_amount);

            // Pie Chart - Budget Distribution
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: budgetData,
                        backgroundColor: [
                            '#3b82f6',
                            '#10b981',
                            '#f59e0b',
                            '#ef4444',
                            '#8b5cf6'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return `${context.label}: ${formatCurrency(value)} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });

            // Bar Chart - Budget vs Actual
            const barCtx = document.getElementById('barChart').getContext('2d');
            new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Budget',
                            data: budgetData,
                            backgroundColor: '#93c5fd',
                            borderRadius: 4
                        },
                        {
                            label: 'Actual',
                            data: actualData,
                            backgroundColor: '#3b82f6',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${formatCurrency(context.raw)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + (value / 1000) + 'k';
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
            updateSummary();
            renderCharts();
        });

        // Period change handler
        document.getElementById('periodSelect').addEventListener('change', function(e) {
            // In a real app, this would fetch new data
            console.log('Period changed to:', e.target.value);
        });
    </script>
</body>
</html>
