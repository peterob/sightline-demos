<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface-hover: #1e1e22;
    --border: #27272a;
    --text: #e4e4e7;
    --text-muted: #71717a;
    --text-dim: #52525b;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.12);
    --tag-dashboard: #10b981;
    --tag-prototype: #f59e0b;
    --tag-methodology: #8b5cf6;
    --tag-tool: #ec4899;
    --tag-finance: #3b82f6;
    --tag-operations: #f97316;
    --tag-cast: #06b6d4;
    --tag-client: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
  }

  header .count {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus {
    border-color: var(--accent);
  }

  .search-box::placeholder {
    color: var(--text-dim);
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .filter-group .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-right: 6px;
    user-select: none;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }

  .filter-btn:hover {
    background: var(--surface);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.12s;
    text-decoration: none;
    display: block;
  }

  .card:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    margin-right: 8px;
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 1px 5px;
    border-radius: 2px;
    font-weight: 600;
    white-space: nowrap;
  }

  .tag-dashboard { color: var(--tag-dashboard); background: rgba(16,185,129,0.1); }
  .tag-prototype { color: var(--tag-prototype); background: rgba(245,158,11,0.1); }
  .tag-methodology { color: var(--tag-methodology); background: rgba(139,92,246,0.1); }
  .tag-tool { color: var(--tag-tool); background: rgba(236,72,153,0.1); }
  .tag-finance { color: var(--tag-finance); background: rgba(59,130,246,0.1); }
  .tag-operations { color: var(--tag-operations); background: rgba(249,115,22,0.1); }
  .tag-cast { color: var(--tag-cast); background: rgba(6,182,212,0.1); }
  .tag-client { color: var(--tag-client); background: rgba(167,139,250,0.1); }

  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Keyboard hint */
  .hint {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font-size: 10px;
    color: var(--text-dim);
  }

  .hint kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 4px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 10px;
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>Catalog</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="controls">
    <input type="text" class="search-box" id="search" placeholder="Search… ( / )" autocomplete="off">

    <div class="divider"></div>

    <div class="filter-group" id="type-filters">
      <span class="label">Type</span>
    </div>

    <div class="divider"></div>

    <div class="filter-group" id="domain-filters">
      <span class="label">Domain</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="hint"><kbd>/</kbd> search · click filters to toggle</div>

<script>
let catalog = [];
let activeTypes = new Set();
let activeDomains = new Set();

async function init() {
  try {
    const res = await fetch('catalog.json');
    catalog = await res.json();
  } catch (e) {
    catalog = [];
  }
  buildFilters();
  render();
}

function buildFilters() {
  const types = [...new Set(catalog.map(c => c.type))].sort();
  const domains = [...new Set(catalog.map(c => c.domain))].sort();

  const typeGroup = document.getElementById('type-filters');
  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.dataset.value = t;
    btn.addEventListener('click', () => toggleFilter('type', t, btn));
    typeGroup.appendChild(btn);
  });

  const domainGroup = document.getElementById('domain-filters');
  domains.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = d;
    btn.dataset.value = d;
    btn.addEventListener('click', () => toggleFilter('domain', d, btn));
    domainGroup.appendChild(btn);
  });
}

function toggleFilter(axis, value, btn) {
  const set = axis === 'type' ? activeTypes : activeDomains;
  if (set.has(value)) {
    set.delete(value);
    btn.classList.remove('active');
  } else {
    set.add(value);
    btn.classList.add('active');
  }
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = catalog.filter(item => {
    if (activeTypes.size && !activeTypes.has(item.type)) return false;
    if (activeDomains.size && !activeDomains.has(item.domain)) return false;
    if (q) {
      const haystack = `${item.title} ${item.description} ${item.type} ${item.domain}`.toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });

  document.getElementById('count').textContent = `${filtered.length} / ${catalog.length}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No matches</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${item.file}" title="${item.description || item.title}">
      <div class="card-top">
        <span class="card-title">${item.title}</span>
        <div class="card-tags">
          <span class="tag tag-${item.type}">${item.type}</span>
          <span class="tag tag-${item.domain}">${item.domain}</span>
        </div>
      </div>
      ${item.description ? `<div class="card-desc">${item.description}</div>` : ''}
    </a>
  `).join('');
}

document.getElementById('search').addEventListener('input', render);

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
    document.getElementById('search').value = '';
    render();
  }
});

init();
</script>
</body>
</html>
